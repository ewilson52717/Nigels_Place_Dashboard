  const sel=document.getElementById(selId);

}
function getBreedValue(selectId, otherInputId){
  const sel=document.getElementById(selectId)?.value;
  if(sel==='Other') return document.getElementById(otherInputId)?.value?.trim()||'Mixed';

}

  if(p>=0.8) return{bar:'#F97316',bg:'#FFF7ED',txt:'#EA580C',label:'Almost Full'};

let tokenClient=null;
function initGoogleAuth(){
  if(typeof google==='undefined'){setTimeout(initGoogleAuth,300);return;}
  tokenClient=google.accounts.oauth2.initTokenClient({
    client_id:CONFIG.CLIENT_ID,
    scope:'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/userinfo.email',
    callback:onToken,
  });
}
async function onToken(resp){
  if(resp.error){showToast('Sign-in failed: '+resp.error,'#EF4444');return;}
  state.accessToken=resp.access_token;
  state.tokenExpiry=Date.now()+(resp.expires_in*1000);
  state.mode='live'; state.isLoading=true; state.loadingMsg='Connecting to Google...'; render();
  try{
    const info=await fetch('https://www.googleapis.com/oauth2/v3/userinfo',
      {headers:{Authorization:`Bearer ${state.accessToken}`}}).then(r=>r.json());
    state.userEmail=info.email;
    if(!state.sheetId){
      state.loadingMsg='Creating your spreadsheet...'; render();
      state.sheetId=await createSpreadsheet();
      state.sheetUrl=`https://docs.google.com/spreadsheets/d/${state.sheetId}`;
      await initSheetHeaders();
      showToast('Spreadsheet created in your Google Drive!');
    } else {
      state.loadingMsg='Loading your data...'; render();
      state.sheetUrl=`https://docs.google.com/spreadsheets/d/${state.sheetId}`;
      await loadAllData();
    }
    const email=state.userEmail.toLowerCase();
    if(CONFIG.ADMIN_EMAILS.map(e=>e.toLowerCase()).includes(email)){
      state.role='admin'; state.view='dashboard';
    } else {
      const cl=clients.find(c=>c.email.toLowerCase()===email);
      if(cl){state.role='client';state.currentClientId=cl.id;}
      else{state.role='admin';state.view='dashboard';showToast('Welcome! Your email is not yet a registered client.');}
    }
  }catch(e){showToast('Error: '+e.message,'#EF4444');console.error(e);state.role='login';}
  state.isLoading=false; render();
}
function googleSignIn(){
  if(!tokenClient){showToast('Auth loading, try again','#EF4444');return;}
  tokenClient.requestAccessToken({prompt:'select_account'});
}
function enterDemo(roleChoice){
  state.mode='demo'; loadMockData();

}
function signOut(){
  if(state.accessToken&&typeof google!=='undefined') google.accounts.oauth2.revoke(state.accessToken);
  Object.assign(state,{role:'login',mode:null,accessToken:null,userEmail:null,
    sheetId:CONFIG.SHEET_ID||null,sheetUrl:null,showModal:null,currentClientId:null});
  clients=[];bookings=[];invoices=[];render();
}

// ═══════════════════════════════════════════════════
async function sheetsReq(url,opts={}){
  const r=await fetch(url,{...opts,headers:{Authorization:`Bearer ${state.accessToken}`,'Content-Type':'application/json',...(opts.headers||{})}});
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e?.error?.message||`HTTP ${r.status}`);}
  return r.json();
}
async function readRange(range){
  const d=await sheetsReq(`${CONFIG.API_BASE}/${state.sheetId}/values/${encodeURIComponent(range)}?valueRenderOption=UNFORMATTED_VALUE`);
  return d.values||[];
}
async function writeRange(range,values){
  await sheetsReq(`${CONFIG.API_BASE}/${state.sheetId}/values/${encodeURIComponent(range)}?valueInputOption=USER_ENTERED`,
    {method:'PUT',body:JSON.stringify({values})});
}
async function createSpreadsheet(){
  const d=await sheetsReq('https://sheets.googleapis.com/v4/spreadsheets',{method:'POST',body:JSON.stringify({
    properties:{title:"Nigel's Place - Live Data"},
    sheets:[
      {properties:{title:'Clients', sheetId:0}},{properties:{title:'Dogs',     sheetId:1}},
      {properties:{title:'Bookings',sheetId:2}},{properties:{title:'Invoices', sheetId:3}},
      {properties:{title:'Settings',sheetId:4}},
    ]
  })});
  return d.spreadsheetId;
}
async function initSheetHeaders(){
  await Promise.all([
    writeRange('Clients!A1:D1', [['id','name','email','phone']]),
    writeRange('Dogs!A1:G1',    [['id','clientId','name','breed','age','vaccinated','notes']]),
    writeRange('Bookings!A1:I1',[['id','clientId','dogId','dogName','clientName','date','status','service','price']]),
    writeRange('Invoices!A1:I1',[['id','clientId','clientName','amount','paid','status','dueDate','issueDate','items']]),
    writeRange('Settings!A1:B8',[
      ['key','value'],
      ['businessName', state.settings.businessName],['dailyCapacity',state.settings.dailyCapacity],
      ['fullDayRate',  state.settings.fullDayRate],  ['halfDayRate',  state.settings.halfDayRate],
      ['groomingAddOn',state.settings.groomingAddOn],['venmoHandle',''],['squareLink',''],
    ]),
  ]);
}
async function loadAllData(){
  const[cR,dR,bR,iR,sR]=await Promise.all([
    readRange('Clients!A2:D'),readRange('Dogs!A2:G'),readRange('Bookings!A2:I'),
    readRange('Invoices!A2:I'),readRange('Settings!A2:B'),
  ]);
  clients.length=0;
  (cR||[]).forEach(r=>{if(r[0])clients.push({id:+r[0],name:r[1]||'',email:r[2]||'',phone:r[3]||'',dogs:[]});});
  (dR||[]).forEach(r=>{
    if(!r[0])return;
    const dog={id:+r[0],name:r[2]||'',breed:r[3]||'',age:+r[4]||0,vaccinated:String(r[5]).toLowerCase()==='true',notes:r[6]||''};
    const cl=clients.find(c=>c.id===+r[1]); if(cl)cl.dogs.push(dog);
  });
  bookings.length=0;
  (bR||[]).forEach(r=>{if(r[0])bookings.push({id:+r[0],clientId:+r[1],dogId:+r[2],dogName:r[3]||'',clientName:r[4]||'',date:r[5]||'',status:r[6]||'confirmed',service:r[7]||'Full Day',price:+r[8]||0});});
  invoices.length=0;
  (iR||[]).forEach(r=>{if(r[0])invoices.push({id:+r[0],clientId:+r[1],clientName:r[2]||'',amount:+r[3]||0,paid:+r[4]||0,status:r[5]||'unpaid',dueDate:r[6]||'',issueDate:r[7]||'',items:r[8]||''});});
  (sR||[]).forEach(r=>{
    if(!r[0])return; const[k,v]=r;
    if(k==='dailyCapacity')state.settings.dailyCapacity=+v;
    else if(k==='businessName')state.settings.businessName=v;
    else if(k==='fullDayRate')state.settings.fullDayRate=+v;
    else if(k==='halfDayRate')state.settings.halfDayRate=+v;
    else if(k==='groomingAddOn')state.settings.groomingAddOn=+v;
    else if(k==='venmoHandle')state.settings.venmoHandle=v;
    else if(k==='squareLink')state.settings.squareLink=v;
  });
}
async function persistBookings(){
  if(state.mode!=='live')return;
  const rows=[['id','clientId','dogId','dogName','clientName','date','status','service','price'],
    ...bookings.map(b=>[b.id,b.clientId,b.dogId,b.dogName,b.clientName,b.date,b.status,b.service,b.price])];
  await writeRange(`Bookings!A1:I${rows.length}`,rows);
}
async function persistClients(){
  if(state.mode!=='live')return;
  const cRows=[['id','name','email','phone'],...clients.map(c=>[c.id,c.name,c.email,c.phone])];
  const dRows=[['id','clientId','name','breed','age','vaccinated','notes'],
    ...clients.flatMap(c=>c.dogs.map(d=>[d.id,c.id,d.name,d.breed,d.age,d.vaccinated,d.notes]))];
  await writeRange(`Clients!A1:D${cRows.length}`,cRows);
  await writeRange(`Dogs!A1:G${dRows.length}`,dRows);
}
async function persistInvoices(){
  if(state.mode!=='live')return;
  const rows=[['id','clientId','clientName','amount','paid','status','dueDate','issueDate','items'],
    ...invoices.map(i=>[i.id,i.clientId,i.clientName,i.amount,i.paid,i.status,i.dueDate,i.issueDate,i.items])];
  await writeRange(`Invoices!A1:I${rows.length}`,rows);
}
async function persistSettings(){
  if(state.mode!=='live')return;
  await writeRange('Settings!A1:B8',[
    ['key','value'],['businessName',state.settings.businessName],['dailyCapacity',state.settings.dailyCapacity],
    ['fullDayRate',state.settings.fullDayRate],['halfDayRate',state.settings.halfDayRate],
    ['groomingAddOn',state.settings.groomingAddOn],['venmoHandle',state.settings.venmoHandle||''],
    ['squareLink',state.settings.squareLink||''],
  ]);
}
async function refreshData(){
  if(state.mode!=='live')return;
  state.isLoading=true;state.loadingMsg='Refreshing data...';render();
  try{await loadAllData();showToast('Data refreshed from Google Sheets!');}
  catch(e){showToast('Refresh failed: '+e.message,'#EF4444');}
  state.isLoading=false;render();
}

  const m=state.showModal; if(!m)return'';

              </select></div>
          </div>
          <div class="mt-3"><label class="text-xs font-semibold text-gray-500 uppercase tracking-wide block mb-1">Notes</label>
            <textarea id="dog-notes" rows="2" placeholder="Allergies, temperament, special needs..."
              class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm resize-none"></textarea></div>
        </div>
        <div class="flex gap-2 pt-1">
          <button type="submit" class="flex-1 py-2.5 text-white rounded-xl text-sm font-semibold" style="background:#7B4015" onmouseover="this.style.background='#6A3511'" onmouseout="this.style.background='#7B4015'"">Add Client</button>
          <button type="button" onclick="closeModal()" class="px-4 py-2.5 border border-gray-200 rounded-xl text-sm text-gray-500 hover:bg-gray-50">Cancel</button>
        </div>
      </form>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════
//  ⑩  ACTION HANDLERS
// ═══════════════════════════════════════════════════
function setView(v)       {state.view=v;state.showModal=null;render();}
function setClientView(v) {state.clientView=v;state.showModal=null;render();}
function prevMonth()      {state.calendarDate=new Date(state.calendarDate.getFullYear(),state.calendarDate.getMonth()-1,1);render();}
function nextMonth()      {state.calendarDate=new Date(state.calendarDate.getFullYear(),state.calendarDate.getMonth()+1,1);render();}
function closeModal()     {state.showModal=null;render();}
function openDayModal(ds)     {state.showModal={type:'day',date:ds};render();}
function openBookingModal(ds) {state.showModal={type:'booking',date:ds};render();}
function openAddClientModal()  {state.showModal={type:'addClient'};render();}
function openAddInvoiceModal() {state.showModal={type:'addInvoice'};render();}
function populateInvoiceItems(){
  const cId=parseInt(document.getElementById('inv-client')?.value);
  if(!cId)return;
  const cl=clients.find(c=>c.id===cId); if(!cl)return;
  const recent=bookings.filter(b=>b.clientId===cId&&b.status==='confirmed')
    .sort((a,b)=>b.date.localeCompare(a.date)).slice(0,10);
  if(!recent.length)return;
  const counts={};
  recent.forEach(b=>{counts[b.service]=(counts[b.service]||0)+1;});
  const desc=Object.entries(counts).map(([svc,n])=>`${n}x ${svc}`).join(', ');
  const total=recent.reduce((s,b)=>s+b.price,0);
  const itemsEl=document.getElementById('inv-items');
  const amtEl=document.getElementById('inv-amount');
  if(itemsEl)itemsEl.value=desc;
  if(amtEl)amtEl.value=total;
}

function updateDogSelect(){
  const cId=parseInt(document.getElementById('bk-client')?.value);
  const sel=document.getElementById('bk-dog'); if(!sel)return;
  const cl=clients.find(c=>c.id===cId);
  sel.innerHTML=cl?cl.dogs.map(d=>`<option value="${d.id}">${d.name} (${d.breed})</option>`).join(''):'<option>Select client first...</option>';
}
function checkDateCapacity(){
  const ds=document.getElementById('bk-date')?.value;
  const warn=document.getElementById('cap-warning'); if(!warn||!ds)return;
  warn.classList.toggle('hidden',booksForDate(ds).length<state.settings.dailyCapacity);
}
async function submitBooking(e){
  e.preventDefault();
  const ds=document.getElementById('bk-date')?.value;
  const svc=document.querySelector('input[name="svc"]:checked')?.value||'Full Day';
  if(!ds){showToast('Please select a date.','#EF4444');return;}
  if(booksForDate(ds).length>=state.settings.dailyCapacity){showToast('That day is fully booked!','#EF4444');return;}
  let clientId,dogId,dogName,clientName;
  if(state.role==='client'){
    clientId=state.currentClientId; dogId=parseInt(document.getElementById('bk-dog')?.value);
    const cl=clients.find(c=>c.id===clientId),dg=cl?.dogs.find(d=>d.id===dogId);
    dogName=dg?.name||'Dog'; clientName=cl?.name||'Client';
  }else{
    clientId=parseInt(document.getElementById('bk-client')?.value);
    dogId=parseInt(document.getElementById('bk-dog')?.value);
    if(!clientId||!dogId){showToast('Please select a client and dog.','#EF4444');return;}
    const cl=clients.find(c=>c.id===clientId),dg=cl?.dogs.find(d=>d.id===dogId);
    dogName=dg?.name||'Dog'; clientName=cl?.name||'Client';
  }
  const price=svc==='Full Day'?state.settings.fullDayRate:state.settings.halfDayRate;
  bookings.push({id:nextId(bookings),clientId,dogId,dogName,clientName,date:ds,status:'confirmed',service:svc,price});
  state.showModal=null; render();
  showToast(`Booked ${dogName} for ${fmtDate(ds)}!`);
  try{await persistBookings();}catch(err){showToast('Saved locally; sheet sync failed.','#F97316');}
}
async function submitClient(e){
  e.preventDefault();
  const name=document.getElementById('cl-name')?.value?.trim();
  if(!name){showToast('Please enter a client name.','#EF4444');return;}
  const maxDogId=clients.flatMap(c=>c.dogs).reduce((m,d)=>Math.max(m,d.id),0);
  const nc={id:nextId(clients),name,
    email:document.getElementById('cl-email')?.value||'',
    phone:document.getElementById('cl-phone')?.value||'',
    dogs:[{id:maxDogId+1,
      name: document.getElementById('dog-name')?.value||'Dog',
      breed:getBreedValue('dog-breed','dog-breed-other'),
      age:  parseInt(document.getElementById('dog-age')?.value)||1,
      vaccinated:document.getElementById('dog-vacc')?.value==='true',
      notes:document.getElementById('dog-notes')?.value||'',
    }]
  };
  clients.push(nc); state.showModal=null; render();
  showToast(`${name} added as a client!`);
  try{await persistClients();}catch(err){showToast('Saved locally; sheet sync failed.','#F97316');}
}
function sendInvoiceText(invId){
  const inv=invoices.find(i=>i.id===invId); if(!inv)return;
  const cl=clients.find(c=>c.id===inv.clientId);
  const phone=(cl?.phone||'').replace(/\D/g,'');
  const owed=inv.amount-inv.paid;
  const venmo=state.settings.venmoHandle;
  const square=state.settings.squareLink;
  const payLines=(square?`\nPay by card: ${square}`:'')+(venmo?`\nPay by Venmo: venmo.com/${venmo} (@${venmo})`:'');
  const msg=`Hi ${inv.clientName}! 🐾 This is a payment reminder from Nigel's Place.`
    +`\n\nServices: ${inv.items}`
    +`\nAmount due: $${owed}`
    +`\nDue date: ${inv.dueDate}`
    +payLines
    +`\n\nThank you! 🐶`;
  const encoded=encodeURIComponent(msg);
  const smsLink=phone?`sms:${phone}?&body=${encoded}`:`sms:?&body=${encoded}`;
  window.open(smsLink,'_self');
}
async function submitInvoice(e){
  e.preventDefault();
  const cId=parseInt(document.getElementById('inv-client')?.value);
  if(!cId){showToast('Please select a client.','#EF4444');return;}
  const cl=clients.find(c=>c.id===cId);
  const amount=parseFloat(document.getElementById('inv-amount')?.value)||0;
  const paid=parseFloat(document.getElementById('inv-paid')?.value)||0;
  const items=document.getElementById('inv-items')?.value?.trim()||'';
  const issueDate=document.getElementById('inv-issue')?.value||'';
  const dueDate=document.getElementById('inv-due')?.value||'';
  if(!amount){showToast('Please enter an amount.','#EF4444');return;}
  let status='unpaid';
  if(paid>=amount) status='paid';
  else if(paid>0)  status='partial';
  else if(dueDate&&dueDate<TODAY) status='overdue';
  const ni={id:nextId(invoices),clientId:cId,clientName:cl?.name||'',
    amount,paid,status,dueDate,issueDate,items};
  invoices.push(ni);
  state.showModal=null; render();
  showToast(`Invoice created for ${cl?.name||'client'}!`);
  try{await persistInvoices();}catch(err){showToast('Saved locally; sheet sync failed.','#F97316');}
}
async function markInvoicePaid(id){
  const inv=invoices.find(i=>i.id===id);
  if(inv){inv.paid=inv.amount;inv.status='paid';}
  render(); showToast('Invoice marked as paid!');
  try{await persistInvoices();}catch(err){showToast('Saved locally; sheet sync failed.','#F97316');}
}
async function saveSettings(){
  const v=id=>document.getElementById(id)?.value;
  const cap=parseInt(v('set-cap')),full=parseFloat(v('set-full'));
  const half=parseFloat(v('set-half')),groom=parseFloat(v('set-groom'));
  const biz=v('set-biz')?.trim(),owner=v('set-owner')?.trim();
  if(cap>0)  state.settings.dailyCapacity=cap;
  if(full>0) state.settings.fullDayRate=full;
  if(half>0) state.settings.halfDayRate=half;
  if(groom>0)state.settings.groomingAddOn=groom;
  if(biz)    state.settings.businessName=biz;
  if(owner)  state.settings.ownerName=owner;
  const venmo=v('set-venmo')?.trim();
  if(venmo!==undefined) state.settings.venmoHandle=venmo;
  const sq=v('set-square')?.trim();
  if(sq!==undefined) state.settings.squareLink=sq;
  showToast('Settings saved!'); render();
  try{await persistSettings();}catch(err){showToast('Saved locally; sheet sync failed.','#F97316');}
}

// ═══════════════════════════════════════════════════
//  ⑪  INIT
// ═══════════════════════════════════════════════════
initGoogleAuth();
render();
</script>
