function capColor(n,cap){
  const p=n/cap;
  if(n>=cap)return{bar:'#EF4444',bg:'#FEF2F2',txt:'#DC2626',label:'Full'};
  if(p>=0.8) return{bar:'#F97316',bg:'#FFF7ED',txt:'#EA580C',label:'Almost Full'};
  if(p>=0.5) return{bar:'#EAB308',bg:'#FEFCE8',txt:'#CA8A04',label:'Filling Up'};
  return         {bar:'#10B981',bg:'#F0FDF4',txt:'#059669',label:'Available'};
}
function fmtDate(ds){return new Date(ds+'T00:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});}
function fmtDateShort(ds){return new Date(ds+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function mkDs(y,m,d){return`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
// Google Sheets sometimes returns dates as serial numbers (days since Dec 30 1899).
// Convert to YYYY-MM-DD string; pass through if already a string date.
function sheetsDateStr(val){
  if(!val&&val!==0)return'';
  if(typeof val==='string')return val;
  if(typeof val==='number'){
    const ms=(val-25569)*864e5; // Sheets epoch → Unix ms
    const d=new Date(ms);
    if(isNaN(d.getTime()))return String(val);
    return d.toISOString().split('T')[0];
  }
  return String(val);
}

function vaccDaysLeft(expiry){
  if(!expiry)return null;
  return Math.round((new Date(expiry+'T00:00:00')-new Date(TODAY+'T00:00:00'))/864e5);
}
// Returns one entry per vaccine TYPE — the one with the latest (highest) expiry date.
function getLatestVaccsByType(dog){
  const vx=dog.vaccines||[];
  const map={};
  vx.forEach(v=>{
    const k=(v.name||'Unknown').trim();
    if(!map[k]||(v.expiry||'0000')>(map[k].expiry||'0000'))map[k]=v;
  });
  return Object.values(map);
}
function vaccStatus(dog){
  const latest=getLatestVaccsByType(dog);
  if(!latest.length){return dog.vaccinated?'ok':'none';}
  let worst='ok';
  for(const v of latest){
    const d=vaccDaysLeft(v.expiry);
    if(d===null)continue;
    if(d<0){worst='expired';break;}
    if(d<=60&&worst==='ok')worst='expiring';
  }
  return worst;
}
// Returns effective daily capacity for a specific date (allows per-date overrides)
function getEffectiveCap(ds){
  return state.settings.capacityOverrides?.[ds]||state.settings.dailyCapacity;
}
function vaccBadge(dog){
  const s=vaccStatus(dog);
  if(s==='expired') return`<span class="inline-block text-xs px-2.5 py-0.5 rounded-full bg-red-50 text-red-600 border border-red-200 font-semibold">🚩 Vaccines expired</span>`;
  if(s==='expiring')return`<span class="inline-block text-xs px-2.5 py-0.5 rounded-full bg-amber-50 text-amber-700 border border-amber-200 font-semibold">⚠️ Expiring soon</span>`;
  if(s==='ok')      return`<span class="inline-block text-xs px-2.5 py-0.5 rounded-full bg-green-50 text-green-700 border border-green-200">✅ Vaccines current</span>`;
  return`<span class="inline-block text-xs px-2.5 py-0.5 rounded-full bg-gray-100 text-gray-500">No vaccine records</span>`;
}

// Builds the full vaccine records panel — compact rows, collapsible history,
// per-type Update button (📄), and SMS reminder (💬) for expired/expiring vaccines.
function buildVaccineRecordsHTML(dog){
  const vx=dog.vaccines||[];
  if(!vx.length)return`<div class="text-center py-6 text-gray-300"><div class="text-3xl mb-2">💉</div><p class="text-sm">No vaccination records yet.</p><p class="text-xs mt-1">Click "Upload Record" to scan &amp; add all vaccine types at once.</p></div>`;
  const cl=clients.find(c=>c.id===dog.clientId);
  const phone=cl?String(cl.phone||'').replace(/\D/g,''):'';
  // Group by vaccine type, sort each group descending by expiry (latest first)
  const groups={};
  vx.forEach(v=>{const k=(v.name||'Unknown').trim();if(!groups[k])groups[k]=[];groups[k].push(v);});
  Object.values(groups).forEach(g=>g.sort((a,b)=>((b.expiry||'0000')>(a.expiry||'0000')?1:-1)));
  const today=new Date();
  const typeCount=Object.keys(groups).length;
  const groupsHTML=Object.entries(groups).map(([typeName,records])=>{
    const latest=records[0];const prior=records.slice(1);
    const exp=latest.expiry?new Date(latest.expiry+'T00:00:00'):null;
    const daysLeft=exp?Math.round((exp-today)/864e5):null;
    const expired=daysLeft!==null&&daysLeft<0;
    const expiring=daysLeft!==null&&daysLeft>=0&&daysLeft<=60;
    // Thin left accent strip instead of heavy full-background color
    const accentCls=expired?'bg-red-400':expiring?'bg-amber-400':exp?'bg-green-400':'bg-gray-300';
    const statusIcon=expired?'🚩':expiring?'⚠️':exp?'✅':'📋';
    const expiryColor=expired?'text-red-600 font-semibold':expiring?'text-amber-600 font-semibold':'text-gray-500';
    const daysText=daysLeft!==null?(daysLeft<0?Math.abs(daysLeft)+'d ago':daysLeft===0?'today':'in '+daysLeft+'d'):'';
    const expandKey=String(dog.id)+':'+typeName;
    const isExpanded=_expandedVaccGroups.has(expandKey);
    // SMS reminder message (plain text for modal — not URI-encoded yet)
    const smsMessage=`Hi ${cl?.name||''}! 🐾 A note from Nigel's Place — ${dog.name}'s ${typeName} vaccination has ${expired?'expired':'is coming due soon'}. Could you please send us an updated record? Thank you!`;
    const needsReminder=expired||expiring;
    const priorRowsHTML=prior.map(p=>{
      const pExp=p.expiry?new Date(p.expiry+'T00:00:00'):null;
      const pDays=pExp?Math.round((pExp-today)/864e5):null;
      return`<div class="flex items-center justify-between py-1 px-3 pl-7 border-t border-gray-100 bg-gray-50"><span class="text-xs text-gray-400">↳ ${p.expiry||'no date'}</span>${pDays!==null?`<span class="text-xs text-gray-300">${Math.abs(pDays)}d ago</span>`:''}</div>`;
    }).join('');
    const slug=vaccTypeSlug(typeName);
    // Use htmlJsonStr so double-quotes inside JS string args don't break onclick="..." attributes
    return`<div class="rounded-md overflow-hidden border border-gray-100 flex">
      <div class="w-1 ${accentCls} shrink-0"></div>
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-2 px-2.5 py-1.5 bg-white hover:bg-gray-50/50">
          <span class="text-xs shrink-0">${statusIcon}</span>
          <span class="text-xs font-semibold text-gray-700 flex-1 truncate">${typeName}</span>
          <span class="text-xs ${expiryColor} shrink-0">${latest.expiry||'—'}</span>
          ${daysText?`<span class="text-xs text-gray-400 shrink-0">(${daysText})</span>`:''}
          <div class="flex items-center gap-1 shrink-0 ml-1">
            ${needsReminder?`<button onclick="showSmsModal(${htmlJsonStr(phone)},${htmlJsonStr(smsMessage)})" title="Text reminder to ${cl?.name||'client'}" class="inline-flex items-center px-1.5 py-0.5 rounded text-xs bg-amber-50 text-amber-600 hover:bg-amber-100 border border-amber-200">💬</button>`:''}
            <button id="vtbtn-${dog.id}-${slug}" onclick="handleVaccTypeUpload(${dog.clientId},${dog.id},${htmlJsonStr(typeName)})" title="Upload updated ${typeName} record" class="inline-flex items-center px-1.5 py-0.5 rounded text-xs bg-gray-50 text-gray-500 hover:bg-gray-100 border border-gray-200">📄</button>
            ${prior.length>0?`<button onclick="toggleVaccGroup(${dog.id},${htmlJsonStr(typeName)})" title="${isExpanded?'Hide':'Show'} ${prior.length} prior" class="inline-flex items-center px-1.5 py-0.5 rounded text-xs bg-gray-50 text-gray-500 hover:bg-gray-100 border border-gray-200">${isExpanded?'▲':'▾'}<span class="ml-0.5 leading-none">${prior.length}</span></button>`:''}
            <button onclick="deleteVaccEntry(${dog.clientId},${dog.id},${htmlJsonStr(typeName)})" title="Delete all ${typeName} records" class="inline-flex items-center px-1.5 py-0.5 rounded text-xs bg-red-50 text-red-400 hover:bg-red-100 border border-red-200">🗑️</button>
          </div>
        </div>
        ${isExpanded&&prior.length>0?priorRowsHTML:''}
      </div>
    </div>`;
  }).join('');
  return`<div class="space-y-1">${groupsHTML}</div><div class="mt-2 text-xs text-gray-400">${typeCount} type${typeCount!==1?'s':''} · ${vx.length} record${vx.length!==1?'s':''} total</div>`;
}

function fmtSynced(){
  if(!lastSynced)return'';
  const diff=Math.round((Date.now()-lastSynced)/1000);
  if(diff<10)return'just now';
  if(diff<60)return`${diff}s ago`;
  if(diff<3600)return`${Math.floor(diff/60)}m ago`;
  return`${Math.floor(diff/3600)}h ago`;
}

// Cache Drive image blob URLs by fileId — avoids re-fetching on every render()
const _driveImgCache={};
// Build an <img> tag for a Drive-stored image. Accepts raw file IDs or webViewLinks.
// Renders immediately if already cached; otherwise shows placeholder and loads async via hydrateImages().
function driveImgTag(link,cssClass,alt=''){
  if(!link)return'';
  // Extract Drive file ID from various link formats, or use raw ID directly
  let fileId=null;
  if(/^[A-Za-z0-9_-]{25,60}$/.test(link))fileId=link;                // bare file ID
  else{const m=link.match(/\/d\/([A-Za-z0-9_-]{25,60})/);if(m)fileId=m[1];}  // webViewLink
  if(fileId){
    const src=_driveImgCache[fileId]||'';
    return`<img data-driveid="${fileId}" src="${src}" alt="${alt||''}" class="${cssClass}"${src?'':' style="display:none"'} onerror="this.style.display='none'">`;
  }
  // Non-Drive URL (legacy or external) — render directly
  return`<img src="${link}" alt="${alt||''}" class="${cssClass}" onerror="this.style.display='none'">`;
}
// Fetch Drive image content using the current access token and cache as blob URLs.
// Called after every render() so new images appear without a full page reload.
async function hydrateImages(){
  if(!state.accessToken)return;
  const imgs=[...document.querySelectorAll('img[data-driveid]')];
  const needed=[...new Set(imgs.map(i=>i.dataset.driveid).filter(id=>id&&!_driveImgCache[id]))];
  if(!needed.length)return;
  await Promise.all(needed.map(async fileId=>{
    try{
      const r=await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,
        {headers:{Authorization:`Bearer ${state.accessToken}`}});
      if(!r.ok)return;
      const blob=await r.blob();
      if(!blob.type.startsWith('image/'))return;
      _driveImgCache[fileId]=URL.createObjectURL(blob);
      // Patch every img with this fileId currently in the DOM
      document.querySelectorAll(`img[data-driveid="${fileId}"]`).forEach(img=>{
        img.src=_driveImgCache[fileId];img.style.display='';
      });
    }catch(e){console.warn('Drive image hydration failed:',fileId,e);}
  }));
}
// ─── Image Compression ───────────────────────────────────────────────────────
// Shrinks a photo file before uploading to Drive — faster upload, less storage,
// snappier display. Returns a JPEG File. Falls back to original on any error.
async function compressImage(file, maxPx=800, quality=0.82){
  return new Promise(resolve=>{
    const url=URL.createObjectURL(file);
    const img=new Image();
    img.onload=()=>{
      URL.revokeObjectURL(url);
      let w=img.naturalWidth,h=img.naturalHeight;
      if(w>maxPx||h>maxPx){if(w>h){h=Math.round(h*maxPx/w);w=maxPx;}else{w=Math.round(w*maxPx/h);h=maxPx;}}
      const canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      canvas.toBlob(blob=>{
        if(!blob){resolve(file);return;}
        resolve(new File([blob],file.name.replace(/\.[^.]+$/,'')+'.jpg',{type:'image/jpeg',lastModified:Date.now()}));
      },'image/jpeg',quality);
    };
    img.onerror=()=>{URL.revokeObjectURL(url);resolve(file);};
    img.src=url;
  });
}

    if(!src&&state.accessToken){
      const r=await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,{headers:{Authorization:`Bearer ${state.accessToken}`}});
      if(r.ok){const bl=await r.blob();if(bl.type.startsWith('image/')){src=URL.createObjectURL(bl);_driveImgCache[fileId]=src;}}

    if(label){const lbl=document.createElement('div');lbl.style.cssText='color:rgba(255,255,255,0.45);font-size:.8rem;';lbl.textContent=label;ov.appendChild(lbl);}

    btn.style.cssText='color:rgba(255,255,255,0.55);background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:8px;padding:.4rem 1.1rem;font-size:.82rem;cursor:pointer;';
    ov.appendChild(btn);
  }catch(e){if(spin.parentNode)spin.textContent='Failed to load image';}
}
// Tracks which vaccine type groups are expanded in the dog detail view — persists across renders.
let _expandedVaccGroups=new Set();
function vaccTypeSlug(name){return String(name).replace(/[^a-zA-Z0-9]/g,'_');}
// Safely encode a JS string value for use inside an HTML onclick="..." attribute.
// JSON.stringify uses double-quotes which would break the HTML attribute; &quot; survives.
function htmlJsonStr(s){return JSON.stringify(String(s)).replace(/"/g,'&quot;');}
function toggleVaccGroup(dogId,typeName){
  const k=String(dogId)+':'+typeName;
  if(_expandedVaccGroups.has(k))_expandedVaccGroups.delete(k);
  else _expandedVaccGroups.add(k);
  render();
}
function initGoogleAuth(){
  if(typeof google==='undefined'){setTimeout(initGoogleAuth,300);return;}
  // Single token client — Sheets + Drive + userinfo in ONE request.
  // This means one Google sign-in permission prompt ever, and zero separate Drive popup on upload.
  tokenClient=google.accounts.oauth2.initTokenClient({
    client_id:CONFIG.CLIENT_ID,
    scope:'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/userinfo.email https://www.googleapis.com/auth/drive',
    callback:onToken,
  });
  const savedEmail=localStorage.getItem('np_email');
  // Try cached access token first — if it's still valid, skip the sign-in round-trip entirely
  const cachedTok=localStorage.getItem('np_access_token');
  const cachedExp=parseInt(localStorage.getItem('np_token_expiry')||'0');
  if(cachedTok&&cachedExp>Date.now()&&savedEmail){
    onToken({access_token:cachedTok,expires_in:Math.floor((cachedExp-Date.now())/1000)});
    return;
  }
  if(savedEmail){silentSignIn=true;tokenClient.requestAccessToken({prompt:'none',login_hint:savedEmail});}
}
async function onToken(resp){
  if(resp.error){
    if(silentSignIn){silentSignIn=false;return;}
    showToast('Sign-in failed: '+resp.error,'#EF4444');return;
  }
  silentSignIn=false;
  state.accessToken=resp.access_token;
  driveToken=resp.access_token; // consolidated — same token covers Drive scope too
  state.tokenExpiry=Date.now()+(resp.expires_in*1000);
  // Cache token so the next refresh within ~1 hour skips the sign-in popup entirely
  try{
    localStorage.setItem('np_access_token',resp.access_token);
    localStorage.setItem('np_token_expiry',String(state.tokenExpiry-30000)); // 30s safety buffer
  }catch(e){}
  state.mode='live';state.isLoading=true;state.loadingMsg='Connecting to Google...';render();
  try{
    const info=await fetch('https://www.googleapis.com/oauth2/v3/userinfo',
      {headers:{Authorization:`Bearer ${state.accessToken}`}}).then(r=>r.json());
    state.userEmail=info.email;
    localStorage.setItem('np_email',info.email);
    if(!state.sheetId){
      state.loadingMsg='Creating your spreadsheet...';render();
      state.sheetId=await createSpreadsheet();
      state.sheetUrl=`https://docs.google.com/spreadsheets/d/${state.sheetId}`;
      await initSheetHeaders();
      services=DEFAULT_SERVICES.map(s=>({...s}));
      await persistServices();
      showToast('Spreadsheet created in your Google Drive!');
    }else{
      state.loadingMsg='Loading your data...';render();
      state.sheetUrl=`https://docs.google.com/spreadsheets/d/${state.sheetId}`;
      await Promise.race([
        loadAllData(),
        new Promise((_,rej)=>setTimeout(()=>rej(new Error('Loading timed out — please refresh the page.')),20000))
      ]);
    }
    lastSynced=Date.now();
    startAutoRefresh();
    const email=state.userEmail.toLowerCase();
    if(CONFIG.ADMIN_EMAILS.map(e=>e.toLowerCase()).includes(email)){
      state.role='admin';state.view='dashboard';
    }else{
      const cl=clients.find(c=>c.email.toLowerCase()===email);
      if(cl){state.role='client';state.currentClientId=cl.id;}
      else{state.role='admin';state.view='dashboard';showToast('Welcome! Your email is not yet a registered client.');}
    }
    // Restore last-viewed section so refreshing the page lands back where you were
    if(state.role==='admin'){
      const sv=localStorage.getItem('np_view');
      const validViews=['dashboard','calendar','clients','dogs','invoices','settings','services'];
      if(sv&&validViews.includes(sv))state.view=sv;
      const sd=parseInt(localStorage.getItem('np_dog_id')||'0');
      if(sd&&state.view==='dogs')state.selectedDogId=sd;
    }
  }catch(e){showToast('Error: '+e.message,'#EF4444');console.error(e);state.role='login';}
  state.isLoading=false;render();
}

function signOut(){
  if(state.accessToken&&typeof google!=='undefined')google.accounts.oauth2.revoke(state.accessToken);
  if(autoRefreshTimer)clearInterval(autoRefreshTimer);
  Object.assign(state,{role:'login',mode:null,accessToken:null,userEmail:null,
    sheetId:CONFIG.SHEET_ID||null,sheetUrl:null,showModal:null,currentClientId:null});
  localStorage.removeItem('np_email');
  localStorage.removeItem('np_access_token');
  localStorage.removeItem('np_token_expiry');
  clients=[];bookings=[];invoices=[];services=[];lastSynced=null;render();
}

async function sheetsReq(url,opts={}){
  const r=await fetch(url,{...opts,headers:{Authorization:`Bearer ${state.accessToken}`,'Content-Type':'application/json',...(opts.headers||{})}});
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e?.error?.message||`HTTP ${r.status}`);}
  return r.json();
}
async function readRange(range){
  const d=await sheetsReq(`${CONFIG.API_BASE}/${state.sheetId}/values/${encodeURIComponent(range)}?valueRenderOption=UNFORMATTED_VALUE`);
  return d.values||[];
}
async function readRangeSafe(range){try{return await readRange(range);}catch(e){return[];}}
async function writeRange(range,values){
  await sheetsReq(`${CONFIG.API_BASE}/${state.sheetId}/values/${encodeURIComponent(range)}?valueInputOption=USER_ENTERED`,
    {method:'PUT',body:JSON.stringify({values})});
}
async function createSpreadsheet(){
  const d=await sheetsReq('https://sheets.googleapis.com/v4/spreadsheets',{method:'POST',body:JSON.stringify({
    properties:{title:"Nigel's Place - Live Data"},
    sheets:[
      {properties:{title:'Clients', sheetId:0}},{properties:{title:'Dogs',    sheetId:1}},
      {properties:{title:'Bookings',sheetId:2}},{properties:{title:'Invoices',sheetId:3}},
      {properties:{title:'Settings',sheetId:4}},{properties:{title:'Services',sheetId:5}},
      {properties:{title:'Packages',sheetId:6}},
    ]
  })});
  return d.spreadsheetId;
}
async function ensureServicesSheet(){
  try{await readRange('Services!A1:F1');}
  catch(e){
    try{
      await sheetsReq(`${CONFIG.API_BASE}/${state.sheetId}:batchUpdate`,
        {method:'POST',body:JSON.stringify({requests:[{addSheet:{properties:{title:'Services'}}}]})});
      await writeRange('Services!A1:F1',[['id','name','type','price','active','frequency']]);
    }catch(e2){/* already exists */}
  }
}

    writeRange('Invoices!A1:I1',[['id','clientId','clientName','amount','paid','status','dueDate','issueDate','items']]),

      ['fullDayRate',state.settings.fullDayRate],['halfDayRate',state.settings.halfDayRate],
      ['groomingAddOn',state.settings.groomingAddOn],['venmoHandle',''],['squareLink',''],['geminiApiKey',''],['nigelsDriveFolderId',''],
    ]),
    writeRange('Services!A1:F1',[['id','name','type','price','active','frequency']]),
    writeRange('Packages!A1:K1',[['id','clientId','dogId','clientName','dogName','purchaseDate','qty','remaining','pricePerSession','totalPaid','notes']]),
  ]);
}

}
async function loadAllData(){
  const[cR,dR,bR,iR,sR]=await Promise.all([
    readRangeSafe('Clients!A2:E'),readRangeSafe('Dogs!A2:M'),readRangeSafe('Bookings!A2:L'),
    readRangeSafe('Invoices!A2:I'),readRangeSafe('Settings!A2:B'),
  ]);
  const svR=await readRangeSafe('Services!A2:F');
  const pkR=await readRangeSafe('Packages!A2:K');
  clients.length=0;
  (cR||[]).forEach(r=>{if(r[0])clients.push({id:+r[0],name:String(r[1]||''),email:String(r[2]||''),phone:String(r[3]||''),
    photoConsent:String(r[4]).toLowerCase()==='true',dogs:[]});});
  (dR||[]).forEach(r=>{
    if(!r[0])return;
    let vaccines=[];
    try{if(r[9])vaccines=JSON.parse(r[9]);}catch(e){}
    // Ensure vaccine expiry dates inside the array are also string-converted
    vaccines=vaccines.map(v=>({...v,expiry:sheetsDateStr(v.expiry)}));
    const vaccExpiry=sheetsDateStr(r[8]);
    const birthday=sheetsDateStr(r[7]);
    // Back-compat: if no vaccines array yet, seed from old vaccExpiry field
    if(!vaccines.length&&vaccExpiry){vaccines=[{name:'Vaccines',expiry:vaccExpiry}];}
    let playPhotos=[];try{if(r[12])playPhotos=JSON.parse(r[12]);}catch(e){}
    const dog={id:+r[0],name:String(r[2]||''),breed:String(r[3]||''),age:+r[4]||0,vaccinated:String(r[5]).toLowerCase()==='true',notes:String(r[6]||''),birthday,vaccExpiry,vaccines,driveFileLink:String(r[10]||''),photoLink:String(r[11]||''),playPhotos};
    const cl=clients.find(c=>c.id===+r[1]);if(cl)cl.dogs.push(dog);
  });
  bookings.length=0;
  const statusWords=['confirmed','cancelled','pending'];
  (bR||[]).forEach(r=>{
    if(!r[0])return;
    const isOld=statusWords.includes(String(r[6]).toLowerCase());
    if(isOld){
      bookings.push({id:+r[0],clientId:+r[1],dogId:+r[2],dogName:r[3]||'',clientName:r[4]||'',
        checkIn:r[5]||'',checkOut:r[5]||'',nights:1,status:r[6]||'confirmed',
        service:r[7]||'Full Day',addons:'',price:+r[8]||0});
    }else{
      bookings.push({id:+r[0],clientId:+r[1],dogId:+r[2],dogName:r[3]||'',clientName:r[4]||'',
        checkIn:r[5]||'',checkOut:r[6]||r[5]||'',nights:+r[7]||1,status:r[8]||'confirmed',
        service:r[9]||'Full Day',addons:r[10]||'',price:+r[11]||0});
    }
  });
  invoices.length=0;
  (iR||[]).forEach(r=>{if(r[0])invoices.push({id:+r[0],clientId:+r[1],clientName:r[2]||'',amount:+r[3]||0,paid:+r[4]||0,status:r[5]||'unpaid',dueDate:r[6]||'',issueDate:r[7]||'',items:r[8]||''});});
  (sR||[]).forEach(r=>{
    if(!r[0])return;const[k,v]=r;
    if(k==='businessName')state.settings.businessName=v;
    else if(k==='dailyCapacity')state.settings.dailyCapacity=+v;
    else if(k==='fullDayRate')state.settings.fullDayRate=+v;
    else if(k==='halfDayRate')state.settings.halfDayRate=+v;
    else if(k==='groomingAddOn')state.settings.groomingAddOn=+v;
    else if(k==='venmoHandle')state.settings.venmoHandle=v;
    else if(k==='squareLink')state.settings.squareLink=v;
    else if(k==='geminiApiKey')state.settings.geminiApiKey=v;
    else if(k==='nigelsDriveFolderId')state.settings.nigelsDriveFolderId=v;
    else if(k==='capacityOverrides'){try{state.settings.capacityOverrides=JSON.parse(v)||{};}catch(e){}}
  });
  services.length=0;
  if(svR&&svR.length>0){
    (svR).forEach(r=>{if(r[0])services.push({id:+r[0],name:r[1]||'',type:r[2]||'addon',price:+r[3]||0,active:String(r[4]).toLowerCase()!=='false',frequency:r[5]||'stay'});});
  }else{
    services.push(...DEFAULT_SERVICES.map(s=>({...s})));
  }
  packages.length=0;
  (pkR||[]).forEach(r=>{
    if(!r[0])return;
    packages.push({id:+r[0],clientId:+r[1],dogId:+r[2],clientName:r[3]||'',dogName:r[4]||'',
      purchaseDate:r[5]||'',qty:+r[6]||0,remaining:+r[7]||0,pricePerSession:+r[8]||0,
      totalPaid:+r[9]||0,notes:r[10]||''});
  });
}

    ...packages.map(p=>[p.id,p.clientId,p.dogId,p.clientName,p.dogName,p.purchaseDate,p.qty,p.remaining,p.pricePerSession,p.totalPaid,p.notes||''])];

  if(state.mode!=='live')return;
  state.isLoading=true;state.loadingMsg='Refreshing data...';render();

    document.getElementById('app').innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:sans-serif;color:#7B4015;background:#FEF3C7">

  const weekEndStr=weekEnd.toISOString().split('T')[0];

function buildCalendarView(role){
  const yr=state.calendarDate.getFullYear(),mo=state.calendarDate.getMonth();
  const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  // Note: per-day cap now handled per-cell via getEffectiveCap(ds) inside the loop
  const firstDow=new Date(yr,mo,1).getDay(),dim=new Date(yr,mo+1,0).getDate();
  let cells=Array(firstDow).fill(null);
  for(let d=1;d<=dim;d++)cells.push(d);
  while(cells.length%7)cells.push(null);
  const isClient=role==='client';
  return`
  <div class="p-6 slide-in">
    <div class="flex items-center justify-between mb-5">
      <h1 class="text-2xl font-bold text-gray-800">${isClient?'Availability':'Schedule'}</h1>
      <div class="flex items-center gap-2">
        <button onclick="prevMonth()" class="px-3 py-1.5 rounded-xl border border-gray-200 text-gray-500 hover:bg-gray-100 text-sm">← Prev</button>
        <span class="font-semibold text-gray-700 min-w-[140px] text-center">${MONTHS[mo]} ${yr}</span>
        <button onclick="nextMonth()" class="px-3 py-1.5 rounded-xl border border-gray-200 text-gray-500 hover:bg-gray-100 text-sm">Next →</button>
        ${!isClient?`<button onclick="openBookingModal(null)" class="ml-2 px-4 py-1.5 text-white rounded-xl text-sm shadow-sm" style="background:#7B4015" onmouseover="this.style.background='#6A3511'" onmouseout="this.style.background='#7B4015'">+ Add Booking</button>`:''}
        <button class="fs-btn ml-1" data-fs-btn title="Go fullscreen" onclick="toggleFullscreen()">${_FS_ENTER}</button>
      </div>
    </div>
    <div class="flex items-center gap-5 mb-4 text-xs text-gray-500">
      <span class="flex items-center gap-1.5"><span style="width:10px;height:10px;border-radius:50%;background:#10B981;display:inline-block"></span>Available</span>
      <span class="flex items-center gap-1.5"><span style="width:10px;height:10px;border-radius:50%;background:#EAB308;display:inline-block"></span>Filling Up</span>
      <span class="flex items-center gap-1.5"><span style="width:10px;height:10px;border-radius:50%;background:#F97316;display:inline-block"></span>Almost Full</span>
      <span class="flex items-center gap-1.5"><span style="width:10px;height:10px;border-radius:50%;background:#EF4444;display:inline-block"></span>Full 🚫</span>
    </div>
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
      <div class="grid grid-cols-7 bg-gray-50 border-b border-gray-100">
        ${DAYS.map(d=>`<div class="text-center text-xs font-semibold text-gray-400 py-3 uppercase tracking-wide">${d}</div>`).join('')}
      </div>
      <div class="grid grid-cols-7">
        ${cells.map(day=>{
          if(!day)return`<div class="border-b border-r border-gray-50 min-h-[88px] bg-gray-50/40"></div>`;
          const ds=mkDs(yr,mo,day),bks=booksForDate(ds),n=bks.length;
          const cap=getEffectiveCap(ds);
          const c=capColor(n,cap),full=n>=cap,isToday=ds===TODAY;
          const isPast=ds<TODAY,dow=new Date(yr,mo,day).getDay(),wknd=dow===0||dow===6;
          return`
          <div class="day-cell border-b border-r border-gray-100 p-2 relative ${wknd?'weekend-day':''} ${isPast&&!isToday?'past-day':''}"
               style="border-top:3px solid ${n>0?c.bar:'transparent'}"
               onclick="${isPast&&!isToday?'':'openDayModal(\''+ds+'\')'}">
            <div class="flex items-start justify-between mb-1">
              <span class="${isToday?'text-white w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold" style="background:#7B4015"':'text-sm font-medium text-gray-600'}">${day}</span>
              ${n>0?`<span class="text-xs font-bold" style="color:${c.txt}">${n}/${cap}</span>`:''}
            </div>
            ${n>0?`<div class="cap-bar mt-1"><div class="cap-fill" style="width:${Math.min(100,n/cap*100)}%;background:${c.bar}"></div></div>
              <div class="text-xs mt-1" style="color:${c.txt}">${full?'🚫 Full':`${cap-n} left`}</div>`
            :`<div class="text-xs text-gray-200 mt-1">${isPast&&!isToday?'—':'Open'}</div>`}
          </div>`;
        }).join('')}
      </div>
    </div>
    ${isClient?`<div class="mt-4 p-4 rounded-xl border text-sm text-amber-800" style="background:#FEF3C7;border-color:#FCD34D">
      💡 Click any <strong>available day</strong> to book a spot for your pup. You can select a date range for multi-day stays!</div>`:''}
  </div>`;
}

function buildModal(){
  const m=state.showModal;if(!m)return'';
  if(m.type==='day')         return buildDayModal(m.date);
  if(m.type==='booking')     return buildBookingModal(m.date);
  if(m.type==='addClient')   return buildAddClientModal();
  if(m.type==='addInvoice')  return buildAddInvoiceModal();
  if(m.type==='addService')   return buildServiceModal(null);
  if(m.type==='editService')  return buildServiceModal(m.serviceId);
  if(m.type==='editClient')   return buildEditClientModal(m.clientId);
  if(m.type==='editDog')      return buildEditDogModal(m.clientId,m.dogId);
  if(m.type==='editInvoice')  return buildEditInvoiceModal(m.invoiceId);
  return'';
}

function getDaycareTier(qty){
  if(qty>=20)return{price:35,label:'20+ sessions',badge:'Best Value 🏆'};
  if(qty>=15)return{price:40,label:'15-pack',badge:'Great Value ⭐'};
  if(qty>=10)return{price:45,label:'10-pack',badge:'Save More 💛'};
  if(qty>=5) return{price:45,label:'5-pack',badge:'Save $10/session'};
  return{price:55,label:'Single session',badge:'Pay as you go'};
}

// ─── PER-DAY SCHEDULE LOGIC ──────────────────────────────────────────────────
function getDatesInRange(ci,co){
  const dates=[];
  const a=new Date(ci+'T00:00:00'),b=new Date(co+'T00:00:00');
  for(let d=new Date(a);d<=b;d.setDate(d.getDate()+1))dates.push(d.toISOString().split('T')[0]);
  return dates;
}
function rebuildDailySchedule(){
  const ci=document.getElementById('bk-checkin')?.value;
  const co=document.getElementById('bk-checkout')?.value||ci;
  if(!ci){_dailySchedule={};renderDailyScheduleGrid();return;}
  const dates=getDatesInRange(ci,co);
  // Default service: first active base service, or Full Day fallback
  const baseSvcs=services.filter(s=>s.type==='base'&&s.active);
  const defSvc=_bkType==='boarding'?'Boarding':(baseSvcs[0]?.name||'Full Day');
  const next={};
  dates.forEach(ds=>{next[ds]=_dailySchedule[ds]||defSvc;});
  _dailySchedule=next;
  renderDailyScheduleGrid();
  updateBookingPrice();
}
function syncBoardingDates(){
  const ci=document.getElementById('bk-board-checkin')?.value;
  const co=document.getElementById('bk-board-checkout')?.value||ci;
  // Keep shadow hidden inputs in sync for vacc/capacity checks
  const hiCi=document.getElementById('bk-checkin');
  const hiCo=document.getElementById('bk-checkout');
  if(hiCi)hiCi.value=ci||'';
  if(hiCo)hiCo.value=co||'';
  if(ci){
    const coEl=document.getElementById('bk-board-checkout');
    if(coEl&&co&&co<ci)coEl.value=ci;
    checkDateCapacity();
    checkDogVaccWarning();
    getDatesInRange(ci,co||ci).forEach(ds=>{_dailySchedule[ds]='Boarding';});
  }
  updateBookingPrice();
}
function applyQuickSet(svcName){
  const ci=document.getElementById('bk-checkin')?.value;
  const co=document.getElementById('bk-checkout')?.value||ci;
  if(!ci)return;
  // svcName can be a service name string (e.g. 'Full Day', 'Half Day', 'Boarding Overnight at $55', etc.)
  // or a legacy qtype string ('daycare', 'halfday', 'boarding') — normalise both
  let normalised=svcName;
  if(svcName==='daycare')normalised='Full Day';
  else if(svcName==='halfday')normalised='Half Day';
  else if(svcName==='boarding'){normalised='Boarding';_bkType='boarding';}
  getDatesInRange(ci,co).forEach(ds=>{_dailySchedule[ds]=normalised;});
  renderDailyScheduleGrid();
  updateBookingPrice();
}
function setDayType(ds,type){
  _dailySchedule[ds]=type;
  renderDailyScheduleGrid();
  updateBookingPrice();
}
function getServicePrice(svcName){
  // Look up price from services array first, then fall back to settings
  const svc=services.find(s=>s.name===svcName&&s.type==='base');
  if(svc)return svc.price;
  if(svcName==='Half Day')return state.settings.halfDayRate||25;
  if(svcName==='Boarding')return state.settings.fullDayRate||55;
  return state.settings.fullDayRate||55;
}
function renderDailyScheduleGrid(){
  const container=document.getElementById('daily-sched-grid');if(!container)return;
  const ci=document.getElementById('bk-checkin')?.value;
  const co=document.getElementById('bk-checkout')?.value||ci;
  if(!ci||Object.keys(_dailySchedule).length===0){
    container.innerHTML='<div class="text-xs text-gray-400 text-center py-2">Select dates above to build your schedule</div>';
    return;
  }
  // Build service buttons from actual services array, fall back to defaults
  const baseSvcs=services.filter(s=>s.type==='base'&&s.active);
  const displaySvcs=baseSvcs.length>0?baseSvcs:[
    {name:'Full Day',price:state.settings.fullDayRate||55},

function updateBookingPrice(){
  const preview=document.getElementById('price-preview');
  const lines=document.getElementById('price-lines');
  const totalEl=document.getElementById('price-total');
  if(!preview||!lines||!totalEl)return;

  let html='';
  let total=0;

  if(_bookingMain==='boarding'){
    // Boarding: price from boarding service, nights = checkout - checkin (not +1)
    const ci=document.getElementById('bk-board-checkin')?.value||document.getElementById('bk-checkin')?.value;
    const co=document.getElementById('bk-board-checkout')?.value||document.getElementById('bk-checkout')?.value||ci;
    if(!ci){preview.classList.add('hidden');return;}
    const boardingSvc=services.find(s=>s.type==='base'&&s.active&&s.name.toLowerCase().includes('board'));
    const boardingRate=boardingSvc?.price||state.settings.fullDayRate||55;
    const a=new Date(ci+'T00:00:00'),b=new Date(co+'T00:00:00');
    const nights=Math.max(0,Math.round((b-a)/864e5));
    const baseTotal=nights*boardingRate;
    html+=`<div>🏡 ${nights} ${nights===1?'night':'nights'} · $${boardingRate}/night = $${baseTotal}</div>`;
    total=baseTotal;
  } else if(_daycareMode==='package'){
    // Package purchase — no dates needed
    const tier=getDaycareTier(_sessionQty);
    const packageTotal=_sessionQty*tier.price;
    html+=`<div>🎫 ${_sessionQty} session${_sessionQty===1?'':'s'} · $${tier.price}/session = $${packageTotal}</div>`;
    html+=`<div class="text-amber-600 mt-0.5">Sessions never expire — schedule whenever you're ready!</div>`;
    total=packageTotal;
  } else {
    // Daycare scheduled — use per-day schedule
    if(Object.keys(_dailySchedule).length===0){preview.classList.add('hidden');return;}
    // Group by service name for display
    const counts={};
    Object.values(_dailySchedule).forEach(svcName=>{counts[svcName]=(counts[svcName]||0)+1;});
    Object.entries(counts).forEach(([svcName,cnt])=>{
      const price=getServicePrice(svcName);
      const isBoarding=svcName.toLowerCase().includes('board');
      const em=isBoarding?'🏡':svcName.toLowerCase().includes('half')?'½':'☀️';
      html+=`<div>${em} ${cnt} ${svcName} ${cnt===1?(isBoarding?'night':'day'):(isBoarding?'nights':'days')} · $${price}/${isBoarding?'nt':'day'} = $${cnt*price}</div>`;
      total+=cnt*price;
    });
    // Daycare tier pricing applied based on total session count
    const tier=getDaycareTier(_sessionQty||Object.keys(_dailySchedule).length);
    if(tier.price<55){
      const days=Object.keys(_dailySchedule).length;
      const regularTotal=days*55;
      if(total<regularTotal){
        html+=`<div class="text-green-600">🎉 Package discount applied (${tier.label})!</div>`;
      }
    }
  }

  // Add-ons (shared across all modes)
  const stayEls=[...(document.querySelectorAll('input[name="addon"]:checked')||[])];
  let addonTotal=stayEls.reduce((s,el)=>s+(+el.dataset.price||0),0);
  const qtyEls=[...(document.querySelectorAll('input[name="addon-qty"]')||[])];
  qtyEls.forEach(el=>{
    const qty=+el.value||0;
    const lbl=document.getElementById('aqty-lbl-'+el.dataset.svcid);
    if(qty>0){addonTotal+=qty*(+el.dataset.price||0);if(lbl){lbl.textContent=`$${qty*(+el.dataset.price||0)}`;lbl.classList.remove('hidden');}}
    else{if(lbl)lbl.classList.add('hidden');}
  });
  stayEls.forEach(el=>{html+=`<div>+ ${el.value}: $${el.dataset.price}</div>`;});
  qtyEls.forEach(el=>{const qty=+el.value||0;if(qty>0)html+=`<div>+ ${el.dataset.svcname}: ${qty} × $${el.dataset.price} = $${qty*(+el.dataset.price||0)}</div>`;});
  total+=addonTotal;

  lines.innerHTML=html;
  totalEl.textContent=`Total: $${total}`;
  preview.classList.remove('hidden');
}

function checkDogVaccWarning(){
  const warn=document.getElementById('vacc-warning');if(!warn)return;
  const overrideRow=document.getElementById('vacc-override-row');
  const overrideCb=document.getElementById('vacc-override-cb');
  // Support both admin flow (has #bk-client dropdown) and client flow (use currentClientId)
  const cId=parseInt(document.getElementById('bk-client')?.value||state.currentClientId||'0');
  const dId=parseInt(document.getElementById('bk-dog')?.value||'0');
  const cl=clients.find(c=>c.id===cId);
  const dog=cl?.dogs.find(d=>d.id===dId);

  // Collect all date inputs regardless of booking mode
  const dateEls=['bk-checkin','bk-checkout','bk-board-checkin','bk-board-checkout']
    .map(id=>document.getElementById(id)).filter(Boolean);
  const lockDates=()=>{
    dateEls.forEach(el=>{el.disabled=true;el.style.opacity='0.38';el.style.cursor='not-allowed';el.style.pointerEvents='none';});
  };
  const unlockDates=()=>{
    dateEls.forEach(el=>{el.disabled=false;el.style.opacity='';el.style.cursor='';el.style.pointerEvents='';});
  };
  const hideOverride=()=>{
    if(overrideRow)overrideRow.classList.add('hidden');
    if(overrideCb)overrideCb.checked=false;
  };

  if(!dog){warn.classList.add('hidden');hideOverride();unlockDates();return;}
  const vs=vaccStatus(dog);

  if(vs==='expired'){
    // Find which specific vaccines are expired to give a precise message
    const latest=getLatestVaccsByType(dog);
    const expiredNames=latest.filter(v=>v.expiry&&v.expiry<TODAY).map(v=>v.name);
    const expLabel=expiredNames.length?expiredNames.join(', '):'vaccination records';
    warn.className='text-xs p-3 rounded-xl bg-red-50 text-red-700 border border-red-300 font-medium';

    if(state.role==='client'){
      warn.innerHTML=`🚩 <strong>${dog.name}'s ${expLabel} ${expiredNames.length===1?'is':'are'} expired.</strong> Booking is currently blocked. Please contact <strong>${state.settings.ownerName||'the business'}</strong> at ${state.settings.businessName||'Nigel\'s Place'} to discuss your options.`;
      hideOverride();
      lockDates();
    }else{
      warn.innerHTML=`🚩 <strong>${dog.name}'s ${expLabel} ${expiredNames.length===1?'is':'are'} expired.</strong> Dates are locked until records are updated — or use Admin Override to proceed anyway.`;
      if(overrideRow)overrideRow.classList.remove('hidden');
      // Lock/unlock based on current override checkbox state
      const isOverride=overrideCb?.checked||false;
      if(isOverride)unlockDates();else lockDates();
      // Wire override checkbox once (flag prevents double-wiring across re-renders)
      if(overrideCb&&!overrideCb._wired){
        overrideCb._wired=true;
        overrideCb.addEventListener('change',()=>{
          if(overrideCb.checked)unlockDates();else lockDates();
        });
      }
    }
    warn.classList.remove('hidden');
  }else if(vs==='expiring'){
    const latest=getLatestVaccsByType(dog);
    const soonest=latest.filter(v=>v.expiry&&v.expiry>=TODAY).sort((a,b)=>a.expiry.localeCompare(b.expiry))[0];
    const exp=soonest?.expiry||dog.vaccExpiry||'';
    const days=exp?Math.round((new Date(exp+'T00:00:00')-new Date(TODAY+'T00:00:00'))/864e5):0;
    warn.className='text-xs p-2.5 rounded-xl bg-amber-50 text-amber-700 border border-amber-200';
    warn.innerHTML=`⚠️ <strong>${dog.name}'s vaccines expire in ${days} day${days!==1?'s':''}</strong> (${fmtDateShort(exp)}). Consider requesting updated records soon.`;
    warn.classList.remove('hidden');
    hideOverride();
    unlockDates();
  }else{
    warn.classList.add('hidden');
    hideOverride();
    unlockDates();
  }
}

const DRIVE_API = 'https://www.googleapis.com/';
async function findOrCreateFolder(name, parentId){
  // Check in-memory + localStorage cache first to avoid creating duplicate folders
  const cacheKey=(parentId||'root')+':'+name;
  if(_folderIdCache[cacheKey])return _folderIdCache[cacheKey];
  // Search Drive for an existing folder with this name under this parent
  const q=`mimeType='application/vnd.google-apps.folder' and name='${name}' and trashed=false${parentId?` and '${parentId}' in parents`:''}`;
  const r=await fetch(`${DRIVE_API}drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id)`,{
    headers:{Authorization:`Bearer ${driveToken}`}
  });
  const d=await r.json();
  let folderId=d.files&&d.files.length>0?d.files[0].id:null;
  if(!folderId){
    // Not found — create it
    const body={name,mimeType:'application/vnd.google-apps.folder'};
    if(parentId)body.parents=[parentId];
    const cr=await fetch(`${DRIVE_API}drive/v3/files`,{
      method:'POST',headers:{Authorization:`Bearer ${driveToken}`,'Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    const cd=await cr.json();
    folderId=cd.id;
  }
  // Cache the result so future calls skip the search entirely
  if(folderId){
    _folderIdCache[cacheKey]=folderId;
    try{localStorage.setItem('np_folder_cache',JSON.stringify(_folderIdCache));}catch(e){}
  }
  return folderId;
}
async function uploadToDriveFolder(file, folderPath){
  // folderPath = array of folder names starting from root, e.g. ["Nigel's Place","Dog Photos","Buddy"]
  // If nigelsDriveFolderId is set in Settings, pin directly to that folder instead of searching for "Nigel's Place"
  const rootId=(state.settings.nigelsDriveFolderId||'').trim();
  let parentId=null;
  let pathToWalk=folderPath;
  if(rootId&&folderPath[0]==="Nigel's Place"){parentId=rootId;pathToWalk=folderPath.slice(1);}
  for(const name of pathToWalk)parentId=await findOrCreateFolder(name,parentId);
  const timestamp=new Date().toISOString().split('T')[0];
  const safeName=`${timestamp}_${file.name}`;
  const meta=JSON.stringify({name:safeName,parents:[parentId]});
  const form=new FormData();
  form.append('metadata',new Blob([meta],{type:'application/json'}));
  form.append('file',file);
  const r=await fetch(`${DRIVE_API}upload/drive/v3/files?uploadType=multipart&fields=id,webViewLink,name`,{
    method:'POST',headers:{Authorization:`Bearer ${driveToken}`},body:form
  });
  const d=await r.json();
  if(d.error)throw new Error('Drive error: '+(d.error.message||JSON.stringify(d.error)));
  return d;
}
async function uploadVaccRecord(file, clientName){
  // Store under the existing Nigel's Place > Customer Relations > Client Vaccine Records structure
  return uploadToDriveFolder(file,["Nigel's Place",'Customer Relations','Client Vaccine Records',clientName]);
}
// Preferred models in order — auto-selects the first one available for this API key
const GEMINI_MODEL_PREFERENCE=['gemini-2.5-flash','gemini-2.5-pro','gemini-2.0-flash','gemini-2.0-flash-lite','gemini-1.5-flash-latest','gemini-1.5-pro-latest'];
let _cachedGeminiModel=null;
async function getGeminiModel(key){
  if(_cachedGeminiModel)return _cachedGeminiModel;
  try{
    const r=await fetch(`https://generativelanguage.googleapis.com/v1/models?key=${key}`);
    const d=await r.json();
    if(d.error)throw new Error(d.error.message);
    const available=new Set((d.models||[]).filter(m=>(m.supportedGenerationMethods||[]).includes('generateContent')).map(m=>m.name.split('/')[1]));
    for(const m of GEMINI_MODEL_PREFERENCE){if(available.has(m)){_cachedGeminiModel=m;return m;}}
    // Fallback: just use first available model that supports generateContent
    const first=[...(d.models||[])].find(m=>(m.supportedGenerationMethods||[]).includes('generateContent'));
    if(first){_cachedGeminiModel=first.name.split('/')[1];return _cachedGeminiModel;}
  }catch(e){console.warn('Could not auto-detect Gemini model:',e);}
  return 'gemini-2.0-flash'; // last resort default
}
async function parseVaccRecordWithGemini(file){
  const key=state.settings.geminiApiKey;
  if(!key)throw new Error('No Gemini API key set in Settings → paste your key from ai.google.dev');
  const model=await getGeminiModel(key);
  // Read file as base64
  const base64=await new Promise((res,rej)=>{
    const fr=new FileReader();
    fr.onload=e=>res(e.target.result.split(',')[1]);
    fr.onerror=rej;
    fr.readAsDataURL(file);
  });
  const mimeType=file.type||'application/pdf';
  const prompt=`You are reading a veterinary vaccine record for a dog. Extract every vaccine and its expiration date.
Return ONLY valid JSON, no markdown, no explanation:
{"dogName":"name if visible or empty string","vaccines":[{"name":"Rabies","expiry":"YYYY-MM-DD"},{"name":"Bordetella","expiry":"YYYY-MM-DD"}]}
Common vaccine names: Rabies, Bordetella, DHPP, DA2PP, Distemper, Parvo, Leptospirosis, Lyme, Canine Influenza.
Normalize names (e.g. DA2PP→DHPP). If only an administration date is visible (no expiry), estimate: Rabies=3 years, Bordetella=1 year, others=1 year.
If no expiry can be determined, omit the expiry field. Return an empty vaccines array if no vaccine info found.`;
  const body={contents:[{parts:[
    {inline_data:{mime_type:mimeType,data:base64}},
    {text:prompt}
  ]}]};
  // Try each model in preference order until one works (handles per-model quota issues)
  const modelsToTry=[model,...GEMINI_MODEL_PREFERENCE.filter(m=>m!==model)];
  for(const m of modelsToTry){
    const r=await fetch(`https://generativelanguage.googleapis.com/v1/models/${m}:generateContent?key=${key}`,{
      method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)
    });
    const d=await r.json();
    if(d.error&&d.error.code===429){
      console.warn(`Gemini quota hit on ${m}, trying next model...`);
      _cachedGeminiModel=null; // reset cache so next call re-detects
      continue;
    }
    if(d.error)throw new Error(`Gemini (${m}): ${d.error.message}`);
    _cachedGeminiModel=m; // cache the working model
    const text=d.candidates?.[0]?.content?.parts?.[0]?.text||'{}';
    const clean=text.replace(/```json?|```/g,'').trim();
    return JSON.parse(clean);
  }
  throw new Error('All Gemini models hit quota limits. Please try again in a minute.');
}
async function handleVaccUpload(clientId, dogId){

      const result=await parseVaccRecordWithGemini(file);

        const freshCl=clients.find(c=>c.id===clientId);

      if(btn){btn.disabled=false;btn.textContent='📄 Upload Record';}

        const freshDog=freshCl?.dogs.find(d=>d.id===dogId);
        if(!freshDog){showToast('Dog not found — please reload.','#EF4444');return;}
        // Merge: remove old records of this type, add newly parsed ones
        const typeKeep=(freshDog.vaccines||[]).filter(v=>{
          const vn=(v.name||'').trim().toLowerCase();
          return !vn.includes(typeKey)&&!typeKey.includes(vn)&&vn!==typeKey;
        });
        freshDog.vaccines=[...typeKeep,...matched];
        // Refresh the soonest-expiry summary field
        const allExp=freshDog.vaccines.filter(v=>v.expiry).map(v=>v.expiry).sort();
        if(allExp.length)freshDog.vaccExpiry=allExp[0];
        freshDog.vaccinated=true;
        if(savedDriveLink)freshDog.driveFileLink=savedDriveLink;
        render();
        showToast(`✅ Updated ${matched.length} ${vaccTypeName} record${matched.length>1?'s':''} for ${freshDog.name}!`);
        // Hint if other types were also found but ignored
        const otherFound=(result.vaccines||[]).length-matched.length;
        if(otherFound>0)showToast(`ℹ️ ${otherFound} other vaccine type${otherFound>1?'s':''} found in this file — use "Upload Record" to add them all.`,'#6B7280');
        try{await persistClients();}catch(e){showToast('Updated OK — sheet sync failed.','#F97316');}
      } else {
        const total=(result.vaccines||[]).length;
        if(total>0){
          showToast(`⚠️ Gemini found ${total} vaccine(s) but none matched "${vaccTypeName}". Try "Upload Record" to add all types found.`,'#F97316');
        } else {
          showToast(`No vaccine records found in that file.`,'#F97316');
        }
        const btnReset=document.getElementById(`vtbtn-${dogId}-${slug}`);
        if(btnReset){btnReset.disabled=false;btnReset.textContent='📄';}
      }
    }catch(err){
      showToast('Error: '+err.message,'#EF4444');
      console.error('handleVaccTypeUpload error:',err);
      const btnReset=document.getElementById(`vtbtn-${dogId}-${slug}`);
      if(btnReset){btnReset.disabled=false;btnReset.textContent='📄';}
    }
  };
  input.addEventListener('cancel',()=>{if(document.body.contains(input))document.body.removeChild(input);});
  input.click();
}
function openFilePickerForDog(accept, onFile){
  const input=document.createElement('input');
  input.type='file'; input.accept=accept; input.style.display='none';
  document.body.appendChild(input);
  input.onchange=()=>{ document.body.removeChild(input); if(input.files[0])onFile(input.files[0]); };
  input.addEventListener('cancel',()=>{ if(document.body.contains(input))document.body.removeChild(input); });
  input.click();
}

  await ensureDriveToken();

    if(!file.type.startsWith('image/')){

async function submitBooking(e){
  e.preventDefault();

  // ── Resolve client / dog ───────────────────────────────────────────────
  let clientId,dogId,dogName,clientName;
  if(state.role==='client'){
    clientId=state.currentClientId;
    dogId=parseInt(document.getElementById('bk-dog')?.value);
    const cl=clients.find(c=>c.id===clientId),dg=cl?.dogs.find(d=>d.id===dogId);
    dogName=dg?.name||'Dog';clientName=cl?.name||'Client';
    if(dg&&vaccStatus(dg)==='expired'){
      showToast(`🚩 ${dg.name}'s vaccines are expired. Please contact ${state.settings.businessName||"Nigel's Place"} to update records before booking.`,'#EF4444');
      return;
    }
    const photoConsent=document.getElementById('bk-photo')?.checked||false;
    if(cl)cl.photoConsent=photoConsent;
  }else{
    clientId=parseInt(document.getElementById('bk-client')?.value);
    dogId=parseInt(document.getElementById('bk-dog')?.value);
    if(!clientId||!dogId){showToast('Please select a client and dog.','#EF4444');return;}
    const cl=clients.find(c=>c.id===clientId),dg=cl?.dogs.find(d=>d.id===dogId);
    dogName=dg?.name||'Dog';clientName=cl?.name||'Client';
    if(dg&&vaccStatus(dg)==='expired'){
      const override=document.getElementById('vacc-override-cb')?.checked||false;
      if(!override){
        showToast(`🚩 ${dg.name}'s vaccines are expired. Update records, or check the Admin Override box to proceed.`,'#EF4444');
        return;
      }
    }
  }

  // ── Add-ons (shared) ───────────────────────────────────────────────────
  const addonEls=[...(document.querySelectorAll('input[name="addon"]:checked')||[])];
  const addonNames=addonEls.map(el=>el.value);
  let addonTotal=addonEls.reduce((s,el)=>s+(+el.dataset.price||0),0);
  const qtyAddonEls=[...(document.querySelectorAll('input[name="addon-qty"]')||[])];
  qtyAddonEls.forEach(el=>{
    const qty=+el.value||0;
    if(qty>0){addonNames.push(`${el.dataset.svcname}×${qty}`);addonTotal+=qty*(+el.dataset.price||0);}
  });
  const notes=document.getElementById('bk-notes')?.value||'';

  // ── PACKAGE MODE (buy sessions, no dates yet) ─────────────────────────
  if(_bookingMain==='daycare'&&_daycareMode==='package'){
    const tier=getDaycareTier(_sessionQty);
    const totalPaid=_sessionQty*tier.price+addonTotal;
    const pkg={id:nextId(packages),clientId,dogId,clientName,dogName,
      purchaseDate:TODAY,qty:_sessionQty,remaining:_sessionQty,
      pricePerSession:tier.price,totalPaid,notes};
    packages.push(pkg);
    state.showModal=null;render();
    showToast(`🎫 ${_sessionQty} session${_sessionQty===1?'':'s'} added to ${dogName}'s package! ($${totalPaid})`);
    try{await persistPackages();}catch(err){showToast('Saved locally; sheet sync failed.','#F97316');}
    return;
  }

  // ── BOARDING MODE ──────────────────────────────────────────────────────
  if(_bookingMain==='boarding'){
    const ci=document.getElementById('bk-board-checkin')?.value||document.getElementById('bk-checkin')?.value;
    const co=document.getElementById('bk-board-checkout')?.value||document.getElementById('bk-checkout')?.value||ci;
    if(!ci){showToast('Please select check-in and check-out dates.','#EF4444');return;}
    if(co<ci){showToast('Check-out must be after check-in.','#EF4444');return;}
    const boardingSvc=services.find(s=>s.type==='base'&&s.active&&s.name.toLowerCase().includes('board'));
    const boardingRate=boardingSvc?.price||state.settings.fullDayRate||55;
    const a=new Date(ci+'T00:00:00'),b=new Date(co+'T00:00:00');
    const nights=Math.max(0,Math.round((b-a)/864e5));
    if(nights===0){showToast('Check-out must be after check-in for boarding.','#EF4444');return;}
    // Capacity check
    for(let d=new Date(a);d<b;d.setDate(d.getDate()+1)){
      const ds=d.toISOString().split('T')[0];
      if(booksForDate(ds).length>=getEffectiveCap(ds)){showToast(`${fmtDate(ds)} is fully booked!`,'#EF4444');return;}
    }
    const baseTotal=nights*boardingRate;
    const totalPrice=baseTotal+addonTotal;
    const svcLabel=boardingSvc?.name||'Boarding';
    bookings.push({id:nextId(bookings),clientId,dogId,dogName,clientName,
      checkIn:ci,checkOut:co,nights,status:'confirmed',service:svcLabel,
      addons:addonNames.join(','),price:totalPrice});
    state.showModal=null;render();
    showToast(`🏡 Boarding booked for ${dogName} · ${fmtDateShort(ci)} – ${fmtDateShort(co)} (${nights} ${nights===1?'night':'nights'})`);
    try{
      await persistBookings();
      if(state.role==='client')await persistClients();
    }catch(err){showToast('Saved locally; sheet sync failed.','#F97316');}
    return;
  }

  // ── DAYCARE SCHEDULED MODE ─────────────────────────────────────────────
  const ci=document.getElementById('bk-checkin')?.value;
  const co=document.getElementById('bk-checkout')?.value||ci;
  if(!ci){showToast('Please select a start date.','#EF4444');return;}
  if(co<ci){showToast('Last day must be on or after first day.','#EF4444');return;}
  if(Object.keys(_dailySchedule).length===0){showToast('Please set up your daily schedule.','#EF4444');return;}
  const days=nightsCount(ci,co);
  // Capacity check
  const a=new Date(ci+'T00:00:00'),b=new Date(co+'T00:00:00');
  for(let d=new Date(a);d<=b;d.setDate(d.getDate()+1)){
    const ds=d.toISOString().split('T')[0];
    if(booksForDate(ds).length>=getEffectiveCap(ds)){showToast(`${fmtDate(ds)} is fully booked!`,'#EF4444');return;}
  }
  // Per-day pricing using actual service prices from services array
  let perDayTotal=0;
  const typeSet=[...new Set(Object.values(_dailySchedule))];
  const svc=typeSet.length===1?typeSet[0]:'Mixed';
  Object.values(_dailySchedule).forEach(svcName=>{perDayTotal+=getServicePrice(svcName);});
  const totalPrice=perDayTotal+addonTotal;
  bookings.push({id:nextId(bookings),clientId,dogId,dogName,clientName,
    checkIn:ci,checkOut:co,nights:days,status:'confirmed',service:svc,
    dailySchedule:{..._dailySchedule},
    addons:addonNames.join(','),price:totalPrice});
  state.showModal=null;render();
  const dateStr=ci===co?fmtDate(ci):`${fmtDateShort(ci)} – ${fmtDateShort(co)} (${days} ${days===1?'day':'days'})`;
  showToast(`☀️ Booked ${dogName} · ${dateStr}!`);
  try{
    await persistBookings();
    if(state.role==='client')await persistClients();
  }catch(err){showToast('Saved locally; sheet sync failed.','#F97316');}
}

  const inv=invoices.find(i=>i.id===invId);if(!inv)return;
  const cl=clients.find(c=>c.id===inv.clientId);
  const phone=String(cl?.phone||'').replace(/\D/g,'');
  const owed=inv.amount-inv.paid;
  const venmo=state.settings.venmoHandle,square=state.settings.squareLink;
  const payLines=(square?`\nPay by card: ${square}`:'')+(venmo?`\nPay by Venmo: venmo.com/${venmo} (@${venmo})`:'');
  const msg=`Hi ${inv.clientName}! 🐾 This is a payment reminder from Nigel's Place.\n\nServices: ${inv.items}\nAmount due: $${owed}\nDue date: ${inv.dueDate}${payLines}\n\nThank you! 🐶`;
  const smsLink=phone?`sms:${phone}?&body=${encodeURIComponent(msg)}`:`sms:?&body=${encodeURIComponent(msg)}`;
  window.open(smsLink,'_self');
}
async function submitInvoice(e){
  e.preventDefault();
  const cId=parseInt(document.getElementById('inv-client')?.value);
  if(!cId){showToast('Please select a client.','#EF4444');return;}
  const cl=clients.find(c=>c.id===cId);
  const amount=parseFloat(document.getElementById('inv-amount')?.value)||0;
  const paid=parseFloat(document.getElementById('inv-paid')?.value)||0;
  const items=document.getElementById('inv-items')?.value?.trim()||'';
  const issueDate=document.getElementById('inv-issue')?.value||'';
  const dueDate=document.getElementById('inv-due')?.value||'';
  if(!amount){showToast('Please enter an amount.','#EF4444');return;}
  let status='unpaid';
  if(paid>=amount)status='paid';
  else if(paid>0)status='partial';
  else if(dueDate&&dueDate<TODAY)status='overdue';
  const ni={id:nextId(invoices),clientId:cId,clientName:cl?.name||'',amount,paid,status,dueDate,issueDate,items};
  invoices.push(ni);state.showModal=null;render();
  showToast(`Invoice created for ${cl?.name||'client'}!`);
  try{await persistInvoices();}catch(err){showToast('Saved locally; sheet sync failed.','#F97316');}
}
async function markInvoicePaid(id){
  const inv=invoices.find(i=>i.id===id);
  if(inv){inv.paid=inv.amount;inv.status='paid';}
  render();showToast('Invoice marked as paid!');
  try{await persistInvoices();}catch(err){showToast('Saved locally; sheet sync failed.','#F97316');}
}
function addCapOverride(){
  const d=document.getElementById('cap-override-date')?.value;
  const v=parseInt(document.getElementById('cap-override-val')?.value);
  if(!d){showToast('Please select a date.','#EF4444');return;}
  if(!v||v<1){showToast('Please enter a valid capacity (min 1).','#EF4444');return;}
  if(!state.settings.capacityOverrides)state.settings.capacityOverrides={};
  state.settings.capacityOverrides[d]=v;
  showToast(`Override set: ${fmtDate(d)} → ${v} dogs max`);
  render();
  try{persistSettings();}catch(e){}
}
function removeCapOverride(d){
  if(state.settings.capacityOverrides)delete state.settings.capacityOverrides[d];
  render();
  try{persistSettings();}catch(e){}
}
async function saveSettings(){
  const v=id=>document.getElementById(id)?.value;
  const cap=parseInt(v('set-cap')),biz=v('set-biz')?.trim(),owner=v('set-owner')?.trim();
  if(cap>0)state.settings.dailyCapacity=cap;
  if(biz)state.settings.businessName=biz;
  if(owner)state.settings.ownerName=owner;
  const venmo=v('set-venmo')?.trim();if(venmo!==undefined)state.settings.venmoHandle=venmo;
  const sq=v('set-square')?.trim();if(sq!==undefined)state.settings.squareLink=sq;
  const gk=v('set-gemini')?.trim();if(gk!==undefined)state.settings.geminiApiKey=gk;
  const dfid=v('set-drive-folder')?.trim();
  if(dfid!==undefined){
    const changed=dfid!==state.settings.nigelsDriveFolderId;
    state.settings.nigelsDriveFolderId=dfid;
    // Clear folder cache so new root ID takes effect immediately
    if(changed){try{_folderIdCache={};localStorage.removeItem('np_folder_cache');}catch(e){}}
  }
  showToast('Settings saved!');render();
  try{await persistSettings();}catch(err){showToast('Saved locally; sheet sync failed.','#F97316');}
}

function toggleFullscreen(){

// Keep every fullscreen button icon in sync whenever fullscreen state changes
document.addEventListener('fullscreenchange',()=>{

});

// Read a Sheets range using a public API key (no OAuth — works 24/7 on the lobby tablet)
async function readRangeWithApiKey(range){
  const key=CONFIG.KIOSK_API_KEY;const sheetId=CONFIG.SHEET_ID;
  if(!key||!sheetId)throw new Error('KIOSK_API_KEY or SHEET_ID not set in CONFIG');
  const url=`${CONFIG.API_BASE}/${sheetId}/values/${encodeURIComponent(range)}?key=${encodeURIComponent(key)}`;
  const r=await fetch(url);const d=await r.json();
  if(d.error)throw new Error('Sheets API: '+(d.error.message||JSON.stringify(d.error)));
  return d.values||[];
}
let _kioskRefreshTimer=null,_kioskClockTimer=null;
async function loadKioskData(){
  const today=new Date().toISOString().split('T')[0];
  try{
    const[bR,dR,cR]=await Promise.all([
      readRangeWithApiKey('Bookings!A2:L'),
      readRangeWithApiKey('Dogs!A2:M'),
      readRangeWithApiKey('Clients!A2:E'),
    ]);
    const dogMap={};(dR||[]).forEach(r=>{if(r[0])dogMap[+r[0]]={name:r[2]||'',breed:r[3]||'',photoLink:r[11]||''};});
    const clientMap={};(cR||[]).forEach(r=>{if(r[0])clientMap[+r[0]]=r[1]||'';});
    state.kioskDogs=(bR||[]).filter(r=>{
      if(!r[0])return false;
      const ci=r[5]||'',co=r[6]||ci;
      return ci&&co&&ci<=today&&today<=co&&(r[8]||'').toLowerCase()!=='cancelled';
    }).map(r=>({
      dogId:+r[2],dogName:r[3]||(dogMap[+r[2]]?.name)||'Unknown',
      breed:dogMap[+r[2]]?.breed||'',clientName:r[4]||(clientMap[+r[1]])||'',
      checkIn:r[5],checkOut:r[6],
    }));
    // De-duplicate (same dog may have multiple bookings)
    const seen=new Set();state.kioskDogs=state.kioskDogs.filter(d=>{if(seen.has(d.dogId))return false;seen.add(d.dogId);return true;});
    lastSynced=Date.now();
    render();
    const el=document.getElementById('kiosk-sync');if(el)el.textContent='✓ Updated '+new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  }catch(e){
    console.error('Kiosk data load failed:',e);
    const el=document.getElementById('kiosk-sync');if(el)el.textContent='⚠️ '+e.message;
  }
}
function startKioskTimers(){
  if(!_kioskClockTimer){
    _kioskClockTimer=setInterval(()=>{const el=document.getElementById('kiosk-clock');if(el)el.textContent=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});},1000);
  }
  if(!_kioskRefreshTimer){
    _kioskRefreshTimer=setInterval(loadKioskData,5*60*1000); // refresh every 5 min
  }
}
// adminPreview=true means it's embedded in the admin panel (slightly different styling)
function buildKioskView(adminPreview=false){
  const dogs=adminPreview
    ?bookings.filter(b=>{const t=new Date().toISOString().split('T')[0];return b.checkIn<=t&&t<=b.checkOut&&b.status!=='cancelled';})

      .filter((d,i,a)=>a.findIndex(x=>x.dogId===d.dogId)===i) // de-dup

      <div style="display:flex;align-items:center;gap:1rem;">

        <div>
          <div style="color:white;font-size:1.6rem;font-weight:800;letter-spacing:-0.5px;">${state.settings.businessName||"Nigel's Place"}</div>
          <div style="color:rgba(255,200,100,0.7);font-size:0.85rem;margin-top:2px;">${dateStr}</div>
        </div>
      </div>
      <div style="text-align:right;">
        <div id="kiosk-clock" style="color:white;font-size:${adminPreview?'2rem':'3rem'};font-weight:200;letter-spacing:3px;font-variant-numeric:tabular-nums;">${timeStr}</div>
      </div>
    </div>
    <!-- Dog grid -->
    <div style="flex:1;padding:2rem 2.5rem;">
      <div style="color:rgba(255,200,100,0.85);font-size:0.85rem;font-weight:700;text-transform:uppercase;letter-spacing:2.5px;margin-bottom:1.5rem;">
        🐕 Today's Guests &nbsp;·&nbsp; ${dogs.length} dog${dogs.length!==1?'s':''}
      </div>
      ${dogs.length===0?`
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem 2rem;color:rgba(255,255,255,0.25);">
          <div style="font-size:4rem;margin-bottom:1rem;">🐾</div>
          <div style="font-size:1.3rem;font-weight:600;">No guests today</div>
          <div style="font-size:0.85rem;margin-top:0.4rem;">Check back soon!</div>
        </div>`:`
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:1.25rem;">
          ${dogs.map(d=>`
          <div style="background:rgba(255,255,255,0.09);border:1px solid rgba(255,255,255,0.14);border-radius:1.25rem;padding:1.5rem 1rem;text-align:center;backdrop-filter:blur(8px);transition:transform .2s;" onmouseover="this.style.transform='scale(1.03)'" onmouseout="this.style.transform=''">
            <div style="width:70px;height:70px;border-radius:50%;background:rgba(255,255,255,0.08);border:2.5px solid rgba(255,200,100,0.35);display:flex;align-items:center;justify-content:center;font-size:2.2rem;margin:0 auto 0.9rem;">🐶</div>
            <div style="color:white;font-size:1.1rem;font-weight:700;line-height:1.2;">${d.dogName}</div>
            ${d.breed?`<div style="color:rgba(255,200,100,0.7);font-size:0.78rem;margin-top:3px;">${d.breed}</div>`:''}
            <div style="color:rgba(255,255,255,0.4);font-size:0.75rem;margin-top:6px;">${d.clientName}</div>
          </div>`).join('')}
        </div>`}
    </div>
    <!-- Footer -->
    <div style="padding:0.9rem 2.5rem;border-top:1px solid rgba(255,255,255,0.08);display:flex;justify-content:space-between;align-items:center;">
      <div id="kiosk-sync" style="color:rgba(255,255,255,0.25);font-size:0.75rem;">Auto-refreshes every 5 minutes</div>
      <div style="display:flex;gap:8px;align-items:center;">
        ${!adminPreview?`<button onclick="loadKioskData()" style="color:rgba(255,200,100,0.6);background:rgba(255,255,255,0.06);border:1px solid rgba(255,200,100,0.2);border-radius:8px;padding:0.3rem 0.9rem;font-size:0.75rem;cursor:pointer;">↻ Refresh</button>`:`<span style="color:rgba(255,255,255,0.2);font-size:0.7rem;">Preview — uses live bookings data</span>`}
        <button class="fs-btn-dark" data-fs-btn data-fs-btn-label="1" onclick="toggleFullscreen()" title="Go fullscreen">${_FS_ENTER} Fullscreen</button>
      </div>
    </div>
  </div>`;
}
