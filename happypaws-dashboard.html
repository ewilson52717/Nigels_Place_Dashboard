async function submitAddVetClinic(){
  const name=(document.getElementById('avc-name')?.value||'').trim();
  if(!name){showToast('Clinic name is required.','#EF4444');return;}
  const phone=(document.getElementById('avc-phone')?.value||'').trim();
  const website=(document.getElementById('avc-website')?.value||'').trim();
  const notes=(document.getElementById('avc-notes')?.value||'').trim();
  const existing=state.settings.manualVetClinics||[];
  // Prevent exact-name duplicates
  if(existing.some(c=>c.name.toLowerCase()===name.toLowerCase())){
    showToast('A clinic with that name already exists.','#F97316');return;
  }
  const newId=Date.now();
  existing.push({id:newId,name,phone,website,notes});
  state.settings.manualVetClinics=existing;
  state.showModal=null;
  render();
  try{await persistSettings();showToast(`✅ ${name} added to your clinic directory!`);}
  catch(e){showToast('Saved locally — sheet sync failed.','#F97316');}
}
async function deleteManualVetClinic(id){
  if(!confirm('Remove this partner clinic from your directory?'))return;
  state.settings.manualVetClinics=(state.settings.manualVetClinics||[]).filter(c=>c.id!==id);
  render();
  try{await persistSettings();showToast('✅ Partner clinic removed and directory updated.');}
  catch(e){showToast('Removed locally — sheet sync failed.','#F97316');}
}

// All collapsible states live here; sections default-collapsed where noted
const _svcCollapsed={base:true,addons:true,courier:true};
if(!window._acctCollapsed)window._acctCollapsed={contact:true,payments:true,pets:true,packages:true};
if(!window._settCollapsed)window._settCollapsed={};

function _smoothToggle(bodyId,arrowId,collapsed){
  const body=document.getElementById(bodyId);
  const arrow=document.getElementById(arrowId);
  if(!body)return;
  if(collapsed){
    // Collapse: set max-height to current scrollHeight, then animate to 0
    body.style.maxHeight=body.scrollHeight+'px';
    body.offsetHeight; // force reflow
    body.classList.add('np-collapsed');
    body.style.maxHeight='0';
  }else{
    // Expand: remove collapsed class, animate max-height from 0 to scrollHeight
    body.classList.remove('np-collapsed');
    body.style.maxHeight=body.scrollHeight+'px';
    // After animation, remove max-height so content can reflow naturally
    setTimeout(()=>{if(!body.classList.contains('np-collapsed'))body.style.maxHeight='none';},320);
  }
  if(arrow){
    if(collapsed)arrow.classList.add('np-rotated');
    else arrow.classList.remove('np-rotated');
  }
}
function toggleSvcSection(key){
  _svcCollapsed[key]=!_svcCollapsed[key];
  _smoothToggle('svc-body-'+key,'svc-arrow-'+key,_svcCollapsed[key]);
}
function toggleAcctSection(key){
  window._acctCollapsed[key]=!window._acctCollapsed[key];
  _smoothToggle('acct-body-'+key,'acct-arrow-'+key,window._acctCollapsed[key]);
}
function toggleSettSection(key){
  window._settCollapsed[key]=!window._settCollapsed[key];
  _smoothToggle('sett-body-'+key,'sett-arrow-'+key,window._settCollapsed[key]);
}

function toggleCourierDay(btn,day){
  const active=btn.getAttribute('data-active')==='true';
  const nowActive=!active;
  btn.setAttribute('data-active',String(nowActive));
  if(nowActive){
    btn.className='px-3.5 py-1.5 rounded-full text-sm font-medium transition-all cursor-pointer select-none text-white shadow-sm';
    btn.style.background='#6366f1';
  }else{
    btn.className='px-3.5 py-1.5 rounded-full text-sm font-medium transition-all cursor-pointer select-none bg-gray-100 text-gray-500 hover:bg-gray-200';
    btn.style.background='';
  }
}
function _getSelectedCourierDays(){
  const chips=document.querySelectorAll('#set-courier-days-chips button[data-active="true"]');
  return Array.from(chips).map(b=>b.getAttribute('data-day')).join(',');
}
function _parseCourierWindow(str){
  // Parse "10:00 AM – 12:00 PM" → {start:'10:00 AM', end:'12:00 PM'}
  const parts=(str||'').split(/\s*[–—-]\s*/);
  return{start:(parts[0]||'').trim(),end:(parts[1]||'').trim()};
}
function _courierTimeOptions(selected){
  const times=[];
  for(let h=6;h<=21;h++){
    for(let m=0;m<60;m+=30){
      const hr12=h===0?12:h>12?h-12:h;
      const ampm=h<12?'AM':'PM';
      const label=hr12+':'+(m<10?'0':'')+m+' '+ampm;
      times.push(label);
    }
  }
  return times.map(t=>`<option value="${t}"${t===selected?' selected':''}>${t}</option>`).join('');
}

function buildInvoicesView(){
  // ── Build unified items list: invoices + ALL priced bookings merged together ──
  const invoicedBkIds=new Set(invoices.filter(i=>i.paymentNote&&i.paymentNote.startsWith('bk-')).map(i=>i.paymentNote));
  const relevantBks=bookings.filter(b=>{
    if(b.status==='cancelled')return false;
    if(b.paymentStatus==='refunded')return false;
    if((+b.price||0)<=0)return false;
    if(invoicedBkIds.has('bk-'+b.id))return false; // already has a matching invoice
    return true;
  });
  // Create virtual invoice-like items from bookings (including paid ones)
  const bkItems=relevantBks.map(b=>{
    const cl=clients.find(c=>c.id===b.clientId);
    const isPaid=b.paymentStatus==='paid'||b.paymentStatus==='deposit_paid';
    const amt=+b.price||0;
    return{_isBooking:true,_bkId:b.id,id:'bk-'+b.id,clientName:cl?.name||b.clientName||'',
      items:b.dogName+' · '+(b.service||'Daycare'),amount:amt,paid:isPaid?amt:0,externalPaid:0,
      status:isPaid?'paid':(b.checkIn<TODAY?'overdue':'unpaid'),dueDate:b.checkIn||'',issueDate:b.checkIn||'',
      checkoutUrl:b.checkoutUrl||'',squareInvoiceId:'',paymentNote:'bk-'+b.id,
      _dogName:b.dogName,_service:b.service,_checkIn:b.checkIn};
  });
  // Merge: all items sorted by status (unpaid/overdue first, then sent, then paid)
  const allItems=[...bkItems,...invoices];
  const statusOrder={overdue:0,unpaid:1,sent:2,partial:3,paid:4};
  allItems.sort((a,b)=>(statusOrder[a.status]??2)-(statusOrder[b.status]??2));
  // Totals across EVERYTHING
  const grandTotal=allItems.reduce((s,i)=>s+i.amount,0);
  const grandCollected=allItems.reduce((s,i)=>s+(i.paid||0)+(i.externalPaid||0),0);
  const grandOutstanding=grandTotal-grandCollected;
  const unpaidCount=allItems.filter(i=>{const ow=i.amount-(i.paid||0)-(i.externalPaid||0);return ow>0;}).length;
  // Status styling
  const statusDot={paid:'bg-emerald-400',unpaid:'bg-amber-400',overdue:'bg-red-400',partial:'bg-blue-400',sent:'bg-indigo-400'};
  const statusBg={paid:'bg-emerald-50 text-emerald-700 border-emerald-200',unpaid:'bg-amber-50 text-amber-700 border-amber-200',overdue:'bg-red-50 text-red-700 border-red-200',partial:'bg-blue-50 text-blue-700 border-blue-200',sent:'bg-indigo-50 text-indigo-700 border-indigo-200'};
  return`
  <div class="p-4 sm:p-6 slide-in">
    <!-- ═══ HEADER ═══ -->
    <div class="flex items-center justify-between mb-8">
      <div>
        <h1 class="text-2xl sm:text-3xl font-extrabold text-gradient">Invoices & Payments</h1>
        <p class="text-sm text-gray-400 mt-1">Everything owed, collected, and outstanding — all in one place</p>
      </div>
      <div class="flex items-center gap-2">
        <button onclick="clearAllTestData()" class="px-3 py-2.5 rounded-xl text-sm font-medium border border-red-200 text-red-500 bg-red-50 hover:bg-red-100 transition-all" title="Delete all bookings and invoices">🧹 Clear All</button>
        <button onclick="syncSquarePayments()" id="sync-payments-btn" class="btn-glow px-3 py-2.5 rounded-xl text-sm font-medium border border-indigo-200 text-indigo-600 bg-indigo-50 hover:bg-indigo-100" title="Check Square for completed payments">
          <span style="display:inline-block;transition:transform 0.3s" onmouseover="this.style.transform='rotate(180deg)'" onmouseout="this.style.transform='rotate(0)'">🔄</span> Sync
        </button>
        <button onclick="openAddInvoiceModal()" class="btn-glow px-4 py-2.5 text-white rounded-xl text-sm font-semibold" style="background:linear-gradient(135deg,#6366f1,#8b5cf6)">+ New Invoice</button>
      </div>
    </div>

    <!-- ═══ STAT CARDS ═══ -->
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8">
      <div class="stat-invoiced rounded-2xl p-5 text-center count-up">
        <div class="text-xs font-bold text-indigo-400 uppercase tracking-wider mb-2">Total Owed</div>
        <div class="text-3xl font-extrabold text-indigo-700">$${grandTotal.toFixed(2)}</div>
        <div class="text-xs text-indigo-400 mt-1">${allItems.length} item${allItems.length===1?'':'s'}</div>
      </div>
      <div class="stat-collected rounded-2xl p-5 text-center count-up" style="animation-delay:0.1s">
        <div class="text-xs font-bold text-emerald-500 uppercase tracking-wider mb-2">Collected</div>
        <div class="text-3xl font-extrabold text-emerald-600">$${grandCollected.toFixed(2)}</div>
        <div class="text-xs text-emerald-400 mt-1">${grandTotal>0?Math.round(grandCollected/grandTotal*100):0}% collected</div>
      </div>
      <div class="stat-outstanding rounded-2xl p-5 text-center count-up" style="animation-delay:0.2s">
        <div class="text-xs font-bold text-red-400 uppercase tracking-wider mb-2">Outstanding</div>
        <div class="text-3xl font-extrabold text-red-500">$${grandOutstanding.toFixed(2)}</div>
        <div class="text-xs text-red-400 mt-1">${unpaidCount} unpaid</div>
      </div>
    </div>

    <!-- ═══ UNIFIED ITEMS LIST ═══ -->
    ${allItems.length===0?`
    <div class="text-center py-20">
      <div class="text-6xl mb-4" style="filter:grayscale(0.3)">📋</div>
      <p class="text-lg font-semibold text-gray-400">No invoices or outstanding payments</p>
      <p class="text-sm text-gray-300 mt-1">Create an invoice or book a service to get started</p>
      <button onclick="openAddInvoiceModal()" class="btn-glow mt-4 px-5 py-2.5 text-white rounded-xl text-sm font-semibold" style="background:linear-gradient(135deg,#6366f1,#8b5cf6)">+ Create Invoice</button>
    </div>`:`
    <div class="space-y-3">
      ${allItems.map(item=>{
        const isBk=!!item._isBooking;
        const owed=item.amount-(item.paid||0)-(item.externalPaid||0);
        const pctPaid=item.amount>0?Math.min(100,Math.round(((item.paid||0)+(item.externalPaid||0))/item.amount*100)):0;
        const isPaid=item.status==='paid'||owed<=0;
        const isOverdue=!isPaid&&item.dueDate&&item.dueDate<TODAY;
        const effectiveStatus=isPaid?'paid':isOverdue?'overdue':item.status;
        const typeLabel=isBk?'Booking':'Invoice';
        const typeBadge=isBk
          ?'<span style="display:inline-block;font-size:10px;padding:1px 8px;border-radius:6px;background:#EEF2FF;color:#6366F1;border:1px solid #C7D2FE;font-weight:600;margin-left:8px;">Booking</span>'
          :'<span style="display:inline-block;font-size:10px;padding:1px 8px;border-radius:6px;background:#F0FDF4;color:#16A34A;border:1px solid #BBF7D0;font-weight:600;margin-left:8px;">Invoice</span>';
        // Card border color based on status
        const borderCls=isPaid?'border-emerald-100':isOverdue?'border-red-200':'border-gray-100';
        return '<div class="bg-white rounded-2xl border '+borderCls+' p-5 card-hover" style="animation:fadeUp 0.3s ease">'
          +'<div class="flex items-start justify-between gap-4">'
          // Left: client info
          +'<div class="flex-1 min-w-0">'
          +'<div class="flex items-center gap-3 mb-1">'
          +'<div class="w-10 h-10 rounded-xl flex items-center justify-center text-lg font-bold text-white flex-shrink-0" style="background:linear-gradient(135deg,'+(isBk?'#8b5cf6,#a78bfa':'#6366f1,#8b5cf6')+')">'
          +(isBk?'🐶':item.clientName.charAt(0).toUpperCase())+'</div>'
          +'<div class="min-w-0"><div class="flex items-center flex-wrap gap-1"><span class="font-bold text-gray-800">'+item.clientName+'</span>'+typeBadge+'</div>'
          +'<div class="text-xs text-gray-400 truncate">'+item.items+'</div></div>'
          +'</div>'
          // Progress bar
          +'<div class="mt-3 flex items-center gap-3">'
          +'<div class="flex-1 h-2 rounded-full bg-gray-100 overflow-hidden">'
          +'<div class="h-full rounded-full transition-all duration-500" style="width:'+pctPaid+'%;background:'+(isPaid?'#10b981':pctPaid>0?'#6366f1':'#e5e7eb')+'"></div>'
          +'</div>'
          +'<span class="text-xs font-semibold '+(isPaid?'text-emerald-600':'text-gray-400')+'">'+pctPaid+'%</span>'
          +'</div>'
          +'</div>'
          // Right: amount + status
          +'<div class="text-right flex-shrink-0">'
          +'<div class="text-2xl font-extrabold text-gray-800">$'+item.amount.toFixed(2)+'</div>'
          +(owed>0&&owed<item.amount?'<div class="text-xs text-gray-400">$'+owed.toFixed(2)+' left</div>':'')
          +'<div class="mt-2 inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full border text-xs font-semibold '+(statusBg[effectiveStatus]||'bg-gray-50 text-gray-600 border-gray-200')+'">'
          +'<span class="w-2 h-2 rounded-full '+(statusDot[effectiveStatus]||'bg-gray-400')+'"></span>'
          +effectiveStatus+'</div>'
          +(item.dueDate?'<div class="text-xs text-gray-400 mt-1">'+(isOverdue?'⚠️ Was due ':'Due ')+fmtDateShort(item.dueDate)+'</div>':'')
          +'</div></div>'
          // Actions bar
          +'<div class="mt-4 pt-3 border-t border-gray-100 flex items-center gap-2 flex-wrap">'
          +(isPaid
            ?'<span class="text-xs text-emerald-500 font-semibold flex items-center gap-1">✅ Paid in full</span>'
            // Unpaid actions
            :(isBk
              // Booking actions
              ?'<button onclick="markBookingPaid('+item._bkId+')" class="btn-glow text-xs px-4 py-2 rounded-lg text-white font-semibold" style="background:linear-gradient(135deg,#10b981,#059669)">💰 Mark as Paid</button>'
               +(item.checkoutUrl?'<a href="'+item.checkoutUrl+'" target="_blank" class="text-xs px-3 py-2 rounded-lg border border-indigo-200 text-indigo-600 hover:bg-indigo-50 font-medium no-underline">🔗 Payment Link</a>':'')
              // Invoice actions
              :(item.squareInvoiceId
                ?'<span class="text-xs px-2.5 py-1 rounded-lg bg-indigo-50 text-indigo-600 font-medium border border-indigo-100">📤 Sent via Square</span>'
                 +'<button onclick="sendInvoiceText('+item.id+')" class="btn-glow text-xs px-3 py-1.5 rounded-lg text-white font-medium" style="background:linear-gradient(135deg,#6366f1,#818cf8)">📱 Text</button>'
                 +'<button onclick="markInvoicePaid('+item.id+')" class="btn-glow text-xs px-4 py-2 rounded-lg text-white font-semibold" style="background:linear-gradient(135deg,#10b981,#059669)">💰 Mark as Paid</button>'
                :'<button onclick="sendInvoiceText('+item.id+')" class="btn-glow text-xs px-3 py-1.5 rounded-lg text-white font-medium" style="background:linear-gradient(135deg,#6366f1,#818cf8)">📱 Text</button>'
                 +'<button onclick="sendInvoiceEmail('+item.id+')" class="btn-glow text-xs px-3 py-1.5 rounded-lg text-white font-medium" style="background:linear-gradient(135deg,#2563eb,#3b82f6)">📧 Email</button>'
                 +'<button onclick="markInvoicePaid('+item.id+')" class="btn-glow text-xs px-4 py-2 rounded-lg text-white font-semibold" style="background:linear-gradient(135deg,#10b981,#059669)">💰 Mark as Paid</button>')))
          // Edit/Delete actions
          +'<div class="flex-1"></div>'
          +(!isBk
            ?'<button onclick="openEditInvoiceModal('+item.id+')" class="text-xs px-2.5 py-1.5 rounded-lg border border-gray-200 text-gray-500 hover:bg-gray-50 hover:border-gray-300 transition-all">✏️ Edit</button>'
             +'<button onclick="deleteInvoice('+item.id+')" class="text-xs px-2.5 py-1.5 rounded-lg border border-red-100 text-red-400 hover:bg-red-50 hover:border-red-200 transition-all">🗑️ Delete</button>'
            :'<button onclick="deleteBooking('+item._bkId+')" class="text-xs px-2.5 py-1.5 rounded-lg border border-red-100 text-red-400 hover:bg-red-50 hover:border-red-200 transition-all">🗑️ Delete</button>')
          +'</div></div>';
      }).join('')}
    </div>`}
  </div>`;
}

function buildWhatsNewModal(){
  const m=state.showModal;if(!m||m.type!=='whatsNew')return'';
  const unseen=m.unseen||[];
  const missing=m.missing||[];
  const hasRequired=missing.length>0;
  const allItems=unseen.flatMap(u=>u.items);
  const requiredItems=allItems.filter(i=>i.required);
  const optionalItems=allItems.flatMap(()=>[]).concat(allItems.filter(i=>!i.required));
  return`<div class="modal-overlay" style="z-index:9999;" onclick="if(event.target===this&&!${hasRequired}){closeWhatsNew();}">
  <div class="modal-box" style="max-width:460px;">
    <!-- Header -->
    <div style="text-align:center;padding-bottom:1.25rem;border-bottom:1px solid #F3F4F6;margin-bottom:1.25rem;">
      <div style="font-size:2.5rem;margin-bottom:.5rem;">✨</div>
      <h2 style="font-size:1.15rem;font-weight:700;color:#1F2937;margin:0 0 .3rem;">What's New in Your Portal</h2>
      <p style="font-size:.78rem;color:#6B7280;margin:0;">Here's what changed since your last visit, ${(clients.find(c=>c.id===state.currentClientId)?.name||'').split(' ')[0]||'there'}.</p>
    </div>
    <!-- Changelog items -->
    ${unseen.map(u=>`
    <div style="margin-bottom:1rem;">
      <p style="font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#9CA3AF;margin:0 0 .6rem;">Update</p>
      ${u.items.map(item=>`
      <div style="display:flex;gap:.75rem;align-items:flex-start;padding:.7rem .85rem;border-radius:12px;margin-bottom:.5rem;background:${item.required?'#FEF2F2':'#F9FAFB'};border:1px solid ${item.required?'#FECACA':'#F3F4F6'};">
        <div style="font-size:1.25rem;flex-shrink:0;line-height:1.3;">${item.icon}</div>
        <div>
          <div style="font-size:.82rem;color:#374151;line-height:1.45;">${item.text}</div>
          ${item.required?`<div style="margin-top:.3rem;font-size:.7rem;font-weight:700;color:#DC2626;">● Required before booking</div>`:''}
        </div>
      </div>`).join('')}
    </div>`).join('')}
    <!-- Missing required fields -->
    ${missing.length>0?`
    <div style="background:#FEF2F2;border:1px solid #FECACA;border-radius:14px;padding:1rem;margin-bottom:1.25rem;">
      <p style="font-size:.8rem;font-weight:700;color:#DC2626;margin:0 0 .5rem;">⚠️ Action Required — Booking is Locked</p>
      ${missing.map(m=>`
      <div style="font-size:.78rem;color:#374151;margin-bottom:.5rem;line-height:1.4;">
        <strong>${m.label}</strong><br>${m.detail}
      </div>`).join('')}
    </div>`:''}
    <!-- CTAs -->
    <div style="display:flex;gap:.75rem;">
      ${missing.length>0?`
      <button onclick="closeWhatsNew('mydog')" style="flex:2;background:#6366f1;color:white;border:none;border-radius:14px;padding:.75rem;font-size:.88rem;font-weight:600;cursor:pointer;">
        🐾 Update My Pet's Profile
      </button>
      <button onclick="closeWhatsNew(null,true)" style="flex:1;background:#F9FAFB;color:#6B7280;border:1px solid #E5E7EB;border-radius:14px;padding:.75rem;font-size:.88rem;font-weight:600;cursor:pointer;">
        Remind Later
      </button>
      `:`
      <button onclick="closeWhatsNew()" style="flex:1;background:#6366f1;color:white;border:none;border-radius:14px;padding:.75rem;font-size:.88rem;font-weight:600;cursor:pointer;">
        Got it — let's go! 🐾
      </button>
      `}
    </div>
    ${missing.length>0?`<p style="font-size:.68rem;color:#9CA3AF;text-align:center;margin:.75rem 0 0;">You can still browse your bookings. Booking new stays is unlocked once required fields are saved.</p>`:''}
  </div>
</div>`;
}
function closeWhatsNew(nav, remindLater=false){
  const email=(state.userEmail||'').toLowerCase();
  // Always mark informational changelog as seen — even on "Remind Later" —
  // so they don't repeat. Required-field prompts (vet clinic, etc.) are driven by
  // live data checks in profileRequiredFieldsMissing(), not the version number,
  // so the action-required alert will still appear next login if fields are still empty.
  markChangelogSeen(email);
  state.showModal=null;
  if(nav)setClientView(nav);
  else render();
}
// Called after a successful client login to check if the "What's New" modal should appear
function checkWhatsNewOnLogin(){
  const cl=clients.find(c=>c.id===state.currentClientId);
  const email=(cl?.email||state.userEmail||'').toLowerCase();
  if(!email)return;
  const unseen=getUnseenChangelog(email);
  const missing=profileRequiredFieldsMissing(cl);
  // Show if there are unseen changelog entries OR required fields are missing
  if(unseen.length>0||missing.length>0){
    state.showModal={type:'whatsNew',unseen,missing};
  }
}

function buildClientBookings(){
  const myBks=bookings.filter(b=>b.clientId===state.currentClientId).sort((a,b)=>b.checkIn.localeCompare(a.checkIn));
  const myPkgs=packages.filter(p=>p.clientId===state.currentClientId);
  const totalRemaining=myPkgs.reduce((s,p)=>s+p.remaining,0);
  const sCls={confirmed:'bg-amber-100 text-indigo-800',pending:'bg-yellow-100 text-yellow-700',cancelled:'bg-red-100 text-red-600'};
  return`
  <div class="slide-in">
    <h1 class="text-2xl font-bold text-gray-800 mb-5">My Bookings</h1>
    ${myPkgs.length>0?`
    <div class="mb-5 p-4 rounded-2xl border border-amber-200 bg-amber-50">
      <div class="flex items-center gap-3 mb-3">
        <div class="text-2xl">🎫</div>
        <div>
          <div class="font-bold text-indigo-900">Session Package Balance</div>
          <div class="text-xs text-amber-700">${totalRemaining} session${totalRemaining===1?'':'s'} available · sessions never expire</div>
        </div>
      </div>
      <div class="space-y-1.5">
        ${myPkgs.map(p=>`
        <div class="flex items-center justify-between bg-white/70 rounded-xl px-3 py-2">
          <div class="text-xs text-gray-600">${p.dogName} · purchased ${fmtDateShort(p.purchaseDate)}</div>
          <div class="text-sm font-semibold ${p.remaining>0?'text-indigo-800':'text-gray-400'}">
            ${p.remaining} / ${p.qty} remaining</div>
        </div>`).join('')}
      </div>
    </div>`:''}
    ${myBks.length===0?`<div class="text-center text-gray-300 py-16"><div class="text-5xl mb-3">🐾</div>
      <div class="text-lg font-medium text-gray-400">No bookings yet!</div>
      <button onclick="setClientView('home')" class="mt-3 text-indigo-800 hover:underline text-sm">Book your first stay →</button></div>`
    :`<div class="space-y-3">${myBks.map(b=>{
      const isUpcoming=b.checkIn>=TODAY&&b.status!=='cancelled';
      // Payment status badge
      const pmtBadge=(()=>{
        const ps=b.paymentStatus||'';
        if(ps==='paid')return`<span class="ml-1 px-1.5 py-0.5 rounded-full text-xs font-semibold bg-green-100 text-green-700">✓ Paid</span>`;
        if(ps==='deposit_paid')return`<span class="ml-1 px-1.5 py-0.5 rounded-full text-xs font-semibold bg-blue-100 text-blue-700">🔐 Deposit paid</span>`;
        if(ps==='checkout_pending'||ps==='deposit_due')return`<span class="ml-1 px-1.5 py-0.5 rounded-full text-xs font-semibold bg-amber-100 text-amber-700">💳 Payment due</span>`;
        return'';
      })();
      return`
      <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100">
        <div class="flex items-center gap-4">
          <div class="text-3xl">🐶</div>
          <div class="flex-1">
            <div class="font-semibold text-gray-800">${b.dogName}</div>
            <div class="text-sm text-gray-400">${b.checkIn===b.checkOut?fmtDate(b.checkIn):`${fmtDateShort(b.checkIn)} – ${fmtDateShort(b.checkOut)} (${b.nights} days)`} · ${b.service}</div>
            ${b.addons?`<div class="text-xs text-gray-400">Add-ons: ${b.addons}</div>`:''}
          </div>
          <div class="text-right"><div class="font-bold text-gray-800">$${b.price}</div>
            <span class="badge ${sCls[b.status]||'bg-gray-100 text-gray-600'}">${b.status}</span>${pmtBadge}</div>
        </div>
        ${(b.paymentStatus==='deposit_due'||b.paymentStatus==='checkout_pending')&&isUpcoming?`
        <div class="mt-3 pt-3 border-t border-gray-100 flex items-center gap-2">
          ${b.checkoutUrl
            ?`<a href="${b.checkoutUrl}" target="_blank" style="flex:1;display:block;text-align:center;padding:.5rem;background:#6366f1;color:white;border-radius:10px;font-size:.75rem;font-weight:700;text-decoration:none;">💳 Pay ${b.depositAmount?'$'+b.depositAmount.toFixed(2)+' Deposit':'Now'} via Square</a>`
            :`<button onclick="bannerPayNow('${b.id}',${b.depositAmount||b.price||0})" style="flex:1;text-align:center;padding:.5rem;background:#6366f1;color:white;border:none;border-radius:10px;font-size:.75rem;font-weight:700;cursor:pointer;">💳 Pay ${b.depositAmount?'$'+b.depositAmount.toFixed(2)+' Deposit':'Now'} via Square</button>`}
        </div>
        <div class="mt-1.5 flex justify-end">
          <button onclick="showClientCancelConfirm('${b.id}')" style="background:none;border:none;padding:0;font-size:.68rem;color:#9CA3AF;cursor:pointer;text-decoration:underline;">Cancel booking</button>
        </div>`:
        isUpcoming?`<div class="mt-3 pt-3 border-t border-gray-100">
          <button onclick="showClientCancelConfirm('${b.id}')" style="background:none;border:1px solid #FCA5A5;border-radius:8px;padding:.3rem .8rem;font-size:.72rem;color:#DC2626;cursor:pointer;font-weight:600;">Cancel booking</button>
        </div>`:''}
      </div>`;
    }).join('')}</div>`}
  </div>`;
}

async function submitEditMyDog(e,dogId){
  e.preventDefault();
  const cl=clients.find(c=>c.id===state.currentClientId);if(!cl)return;
  const dog=cl.dogs.find(d=>d.id===dogId);if(!dog)return;
  const breed=getBreedValue('emydog-breed','emydog-breed-other')||dog.breed||'Mixed Breed';
  const birthday=(document.getElementById('emydog-birthday')?.value||'').trim();
  // Auto-calculate age from birthday (years + months) when one is set; otherwise read manual fields
  let age;
  if(birthday){
    const now=new Date(),bd=new Date(birthday+'T00:00:00');
    let y=now.getFullYear()-bd.getFullYear(),m=now.getMonth()-bd.getMonth();
    if(now.getDate()<bd.getDate())m--;
    if(m<0){y--;m+=12;}
    y=Math.max(0,y); m=Math.max(0,m);
    age=parseFloat((y+m/12).toFixed(2));
  }else{
    const y=parseInt(document.getElementById('emydog-age-yrs')?.value)||0;
    const m=Math.min(11,parseInt(document.getElementById('emydog-age-mos')?.value)||0);
    age=parseFloat((y+m/12).toFixed(2));
  }
  const notes=(document.getElementById('emydog-notes')?.value||'').trim();
  const emergencyVetLimit=document.getElementById('emydog-vet')?.value||'';
  const vetName=(document.getElementById('emydog-vet-name')?.value||'').trim();
  const vetPhone=(document.getElementById('emydog-vet-phone')?.value||'').trim();
  const vetWebsite=(document.getElementById('emydog-vet-website')?.value||'').trim();
  const btn=document.getElementById('emydog-submit');
  if(btn){btn.disabled=true;btn.textContent='Saving…';}
  try{
    const result=await proxyClientWrite('updateDog',{dogId,breed,age,birthday,notes,emergencyVetLimit,vetName,vetPhone,vetWebsite});
    if(!result.ok)throw new Error(result.error||'Could not save.');
    dog.breed=breed;dog.age=age;dog.birthday=birthday;dog.notes=notes;dog.emergencyVetLimit=emergencyVetLimit;
    dog.vetName=vetName;dog.vetPhone=vetPhone;dog.vetWebsite=vetWebsite;
    state.showModal=null;render();showToast(`${dog.name} updated! ✓`);
  }catch(err){
    showToast('Error: '+err.message,'#EF4444');
    if(btn){btn.disabled=false;btn.textContent='Save Changes';}
  }
}

async function updateClientVetLimit(clientId,dogId,value){
  const cl=clients.find(c=>c.id===clientId);
  const dog=cl?.dogs.find(d=>d.id===dogId);
  if(!dog)return;
  dog.emergencyVetLimit=value;
  render(); // re-render to update the badge instantly
  try{
    // Client role: write through proxy since their token can't edit the sheet directly
    if((state.role==='client'||state.role==='onboarding')&&state.mode==='live'){
      await proxyClientWrite('updateVetLimit',{dogId,vetLimit:value});
    }else{
      await persistClients();
    }
    showToast('Emergency care preference saved ✓');
  }catch(e){showToast('Saved locally; sync failed.','#F97316');}
}

      ${(()=>{

                ${ds===TODAY
                  ?'🚫 Same-day bookings are closed.'

              </div>`
            :isPast
              ?''
              :!full
                ?`<button onclick="openBookingModal('${ds}')" class="flex-1 py-2.5 text-white rounded-xl text-sm font-semibold" style="background:#6366f1" onmouseover="this.style.background='#4f46e5'" onmouseout="this.style.background='#6366f1'">${isAdm?'+ Add Booking':'📅 Book This Day'}</button>`

    </div>
  </div>`;
}

      pn.innerHTML='';
    }
  }
  updateCourierUI();
  updateBookingPrice();
}
function setDaycareMode(mode){
  _daycareMode=mode;
  ['schedule','package'].forEach(m=>{
    const btn=document.getElementById(`bk-mode-${m}`);
    if(!btn)return;
    const a=m===mode;
    btn.style.background=a?'#6366f1':'#F9FAFB';
    btn.style.color=a?'#fff':'#6B7280';
    btn.style.borderColor=a?'#6366f1':'#E5E7EB';
  });
  const pkgPicker=document.getElementById('bk-session-picker');
  const datesSec=document.getElementById('bk-daycare-dates');
  if(pkgPicker)pkgPicker.style.display=mode==='package'?'':'none';
  if(datesSec)datesSec.style.display=mode==='schedule'?'':'none';
  updateBookingPrice();
}
function stepSessions(delta){
  _sessionQty=Math.max(1,(_sessionQty||1)+delta);
  const el=document.getElementById('bk-session-qty');if(el)el.textContent=_sessionQty;
  const tier=getDaycareTier(_sessionQty);
  const tierEl=document.getElementById('bk-tier-label');
  if(tierEl)tierEl.innerHTML=`<span class="font-bold text-indigo-800 text-sm">$${tier.price}/session</span><span class="text-gray-300 mx-1">·</span><span class="text-amber-600 text-xs">${tier.badge}</span>`;
  // Refresh tier pill highlights
  [[1,4],[5,14],[15,19],[20,999]].forEach(([lo,hi],i)=>{
    const pill=document.getElementById(`bk-tier-pill-${i}`);
    if(!pill)return;
    const a=_sessionQty>=lo&&_sessionQty<=hi;
    pill.style.background=a?'#c7d2fe':'#F3F4F6';
    pill.style.color=a?'#3730a3':'#9CA3AF';
  });
  updateBookingPrice();
}

// ── Mobile drawer toggle ──────────────────────────
function toggleMobileMenu(open){
  _mobileMenuOpen=(open!==undefined)?open:!_mobileMenuOpen;
  document.getElementById('admin-sidebar')?.classList.toggle('mob-open',_mobileMenuOpen);
  document.getElementById('mob-overlay')?.classList.toggle('mob-open',_mobileMenuOpen);
  document.body.style.overflow=_mobileMenuOpen?'hidden':'';
}
function setView(v){
  // Close mobile drawer when navigating
  _mobileMenuOpen=false;
  document.getElementById('admin-sidebar')?.classList.remove('mob-open');
  document.getElementById('mob-overlay')?.classList.remove('mob-open');
  document.body.style.overflow='';
  state.view=v;state.showModal=null;
  if(v!=='dogs')state.selectedDogId=null;
  if(v!=='clients')state.selectedClientId=null;
  // Persist so a page refresh returns to the same section
  try{localStorage.setItem('np_view',v);if(v!=='dogs')localStorage.removeItem('np_dog_id');}catch(e){}
  render();
  // Start kiosk clock when admin previews kiosk
  if(v==='kiosk')startKioskTimers();
}
// Navigate to Clients view and highlight a specific client card
function viewClientProfile(clientId){
  state.view='clients';state.showModal=null;state.selectedDogId=null;
  state.selectedClientId=clientId;
  _mobileMenuOpen=false;
  document.getElementById('admin-sidebar')?.classList.remove('mob-open');
  document.getElementById('mob-overlay')?.classList.remove('mob-open');
  document.body.style.overflow='';
  render();
  // Scroll to the highlighted client card after render
  requestAnimationFrame(()=>{
    const el=document.getElementById('client-card-'+clientId);
    if(el)el.scrollIntoView({behavior:'smooth',block:'center'});
  });
}
// ── Required Vaccine Settings Helpers ─────────────────────────────────────────
function addRequiredVaccine(){
  const inp=document.getElementById('new-vacc-input');
  const val=(inp?.value||'').trim();
  if(!val)return;
  if(!state.settings.requiredVaccines)state.settings.requiredVaccines=[];
  // Prevent duplicates (case-insensitive)
  const existing=state.settings.requiredVaccines.map(v=>v.toLowerCase());
  if(existing.includes(val.toLowerCase())){showToast('Already in the list.','#F97316');return;}
  state.settings.requiredVaccines.push(val);
  render();
}
function deleteRequiredVaccine(index){
  if(!state.settings.requiredVaccines)return;
  state.settings.requiredVaccines.splice(index,1);
  render();
}
function toggleRequiredVaccine(index,checked){
  // Toggle: unchecked = remove from list temporarily. We rebuild the list.
  // For simplicity: unchecking disables (removes), re-checking re-adds.
  // Since checkbox is rendered from the live array, unchecking means delete.
  if(!checked)deleteRequiredVaccine(index);
  // If checked, it's already in the list so nothing to do.
}

// ── Gemini voice/text client intake parsing ───────────────────────────────────
async function parseClientIntakeWithGemini(transcript){
  const key=state.settings.geminiApiKey;
  if(!key)throw new Error('No Gemini API key configured in Settings.');
  const model=await getGeminiModel(key);
  const today=new Date().toISOString().split('T')[0];
  const prompt=`You are a pet daycare intake assistant. Parse the following spoken client intake and extract structured data.
Today's date: ${today}

Return ONLY valid JSON, no markdown:
{
  "clientName": "Full Name",
  "phone": "digits only, no formatting",
  "email": "email@example.com or empty string",
  "dogName": "dog's name",
  "dogBreed": "breed or Mixed Breed",
  "dogGender": "male or female or unknown",
  "dogBirthday": "YYYY-MM-DD or empty string",
  "dogNotes": "care notes, medications, special needs — combine all relevant details",
  "confidence": "high/medium/low"
}

Rules:
- Spell names correctly using context clues (e.g. spoken 'Tag Wilson' → 'Tag Wilson')
- For birthday: convert any spoken date to YYYY-MM-DD (e.g. 'September 15th 2020' → '2020-09-15')
- For dogNotes: include medications, personality, special needs in natural language
- If a field is not mentioned, use empty string
- confidence: high if all major fields present, medium if some missing, low if very unclear

Intake transcript:
"${transcript.replace(/"/g,'\\"')}"`;
  const r=await fetch(`https://generativelanguage.googleapis.com/v1/models/${model}:generateContent?key=${key}`,{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})
  });
  const d=await r.json();
  if(d.error)throw new Error(`Gemini: ${d.error.message}`);
  const text=d.candidates?.[0]?.content?.parts?.[0]?.text||'{}';
  const clean=text.replace(/```json?|```/g,'').trim();
  return JSON.parse(clean);
}
// Fills Add Client modal fields with AI-parsed data and highlights them amber
function applyAiIntakeToForm(data){
  const setAi=(id,val)=>{
    const el=document.getElementById(id);
    if(!el||!val)return;
    el.value=val;
    el.classList.add('ai-suggested');
    // Remove highlight once user edits the field manually
    el.addEventListener('input',()=>el.classList.remove('ai-suggested'),{once:true});
  };
  if(data.clientName)setAi('cl-name',data.clientName);
  if(data.phone)setAi('cl-phone',fmtPhone(data.phone.replace(/\D/g,'')));
  if(data.email)setAi('cl-email',data.email);
  if(data.dogName)setAi('dog-name',data.dogName);
  if(data.dogBirthday)setAi('dog-birthday',data.dogBirthday);
  if(data.dogNotes)setAi('dog-notes',data.dogNotes);
  // Handle breed dropdown — try to match, else set "other" text input
  if(data.dogBreed){
    const sel=document.getElementById('dog-breed');
    if(sel){
      const opt=[...sel.options].find(o=>o.value.toLowerCase()===data.dogBreed.toLowerCase())||
                [...sel.options].find(o=>o.value.toLowerCase().includes(data.dogBreed.toLowerCase().split(' ')[0]));
      if(opt){sel.value=opt.value;sel.classList.add('ai-suggested');sel.addEventListener('change',()=>sel.classList.remove('ai-suggested'),{once:true});}
      else{sel.value='other';const oi=document.getElementById('dog-breed-other');if(oi){oi.style.display='block';setAi('dog-breed-other',data.dogBreed);}}
    }
  }
}
let _voiceRecognizer=null;
function startVoiceIntake(){
  const SpeechRec=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SpeechRec){showToast('Voice input not supported in this browser. Try Chrome.','#EF4444');return;}
  if(!state.settings.geminiApiKey){showToast('Add a Gemini API key in Settings first.','#F97316');return;}
  const micBtn=document.getElementById('voice-intake-btn');
  const micStatus=document.getElementById('voice-intake-status');
  if(_voiceRecognizer){
    _voiceRecognizer.stop();
    return;
  }
  const rec=new SpeechRec();
  rec.continuous=true;
  rec.interimResults=true;
  rec.lang='en-US';
  _voiceRecognizer=rec;
  if(micBtn){micBtn.innerHTML='🔴 Stop Listening';micBtn.style.background='#DC2626';micBtn.style.animation='mic-pulse 1s ease infinite';}
  if(micStatus){micStatus.textContent='Listening… speak clearly.';}
  let finalTranscript='';
  rec.onresult=(e)=>{
    let interim='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal)finalTranscript+=e.results[i][0].transcript+' ';
      else interim+=e.results[i][0].transcript;
    }
    if(micStatus)micStatus.textContent='🎙️ '+((finalTranscript+interim).slice(-80)||'Listening…');
  };
  rec.onerror=(e)=>{
    showToast('Mic error: '+e.error,'#EF4444');
    _voiceRecognizer=null;
    if(micBtn){micBtn.innerHTML='🎙️ Voice Fill';micBtn.style.background='#6366f1';micBtn.style.animation='';}
    if(micStatus)micStatus.textContent='';
  };
  rec.onend=async()=>{
    _voiceRecognizer=null;
    if(micBtn){micBtn.innerHTML='🎙️ Voice Fill';micBtn.style.background='#6366f1';micBtn.style.animation='';}
    if(!finalTranscript.trim()){if(micStatus)micStatus.textContent='No speech detected.';return;}
    if(micStatus)micStatus.textContent='🤖 Parsing with Gemini AI…';
    try{
      const data=await parseClientIntakeWithGemini(finalTranscript.trim());
      applyAiIntakeToForm(data);
      if(micStatus){
        micStatus.innerHTML=`✅ Fields auto-filled! <span style="color:#D97706;">Amber fields</span> are AI-suggested — review and edit as needed.`;
      }
    }catch(err){
      showToast('AI parse failed: '+err.message,'#EF4444');
      if(micStatus)micStatus.textContent='Could not parse. Try again or fill manually.';
    }
  };
  rec.start();
}

// ─── PER-DAY SCHEDULE LOGIC ──────────────────────────────────────────────────
function getDatesInRange(ci,co){
  const dates=[];
  const a=new Date(ci+'T00:00:00'),b=new Date(co+'T00:00:00');
  for(let d=new Date(a);d<=b;d.setDate(d.getDate()+1))dates.push(d.toISOString().split('T')[0]);
  return dates;
}
function rebuildDailySchedule(){
  const ci=document.getElementById('bk-checkin')?.value;
  const co=document.getElementById('bk-checkout')?.value||ci;
  if(!ci){_dailySchedule={};_schedGridCollapsed=false;renderDailyScheduleGrid();return;}
  const dates=getDatesInRange(ci,co);
  // Auto-collapse the per-day grid whenever a multi-day range is set/changed
  _schedGridCollapsed=dates.length>1;
  // Default service: first active base service, or Full Day fallback
  const baseSvcs=services.filter(s=>s.type==='base'&&s.active);
  const defSvc=_bkType==='boarding'?'Boarding':(baseSvcs[0]?.name||'Full Day');
  const next={};
  dates.forEach(ds=>{next[ds]=_dailySchedule[ds]||defSvc;});
  _dailySchedule=next;
  renderDailyScheduleGrid();
  updateBookingPrice();
}
function syncBoardingDates(){
  const ci=document.getElementById('bk-board-checkin')?.value;
  const co=document.getElementById('bk-board-checkout')?.value||ci;
  // Keep shadow hidden inputs in sync for vacc/capacity checks
  const hiCi=document.getElementById('bk-checkin');
  const hiCo=document.getElementById('bk-checkout');
  if(hiCi)hiCi.value=ci||'';
  if(hiCo)hiCo.value=co||'';
  if(ci){
    const coEl=document.getElementById('bk-board-checkout');
    if(coEl&&co&&co<ci)coEl.value=ci;
    checkDateCapacity();
    checkDogVaccWarning();
    // Only populate _dailySchedule for pure boarding mode; combo tracks boarding via date inputs
    if(_bookingMain==='boarding'){
      getDatesInRange(ci,co||ci).forEach(ds=>{_dailySchedule[ds]='Boarding';});
    }
  }
  updateBookingPrice();
}
function applyQuickSet(svcName){
  const ci=document.getElementById('bk-checkin')?.value;

  if(!ci)return;

function renderDailyScheduleGrid(){
  const container=document.getElementById('daily-sched-grid');if(!container)return;
  const ci=document.getElementById('bk-checkin')?.value;
  const co=document.getElementById('bk-checkout')?.value||ci;
  if(!ci||Object.keys(_dailySchedule).length===0){
    container.innerHTML='<div class="text-xs text-gray-400 text-center py-2">Select dates above to build your schedule</div>';
    return;
  }
  // Build service buttons from actual services array, fall back to defaults
  const baseSvcs=services.filter(s=>s.type==='base'&&s.active);
  const displaySvcs=baseSvcs.length>0?baseSvcs:[
    {name:'Full Day',price:state.settings.fullDayRate||55},
    {name:'Half Day',price:state.settings.halfDayRate||25},
  ];
  const dates=getDatesInRange(ci,co);
  const dayNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  // Build each day row (same logic for single or multi)
  const rows=dates.map(ds=>{
    const dt=new Date(ds+'T00:00:00');
    const dayLbl=`${dayNames[dt.getDay()]} ${fmtDateShort(ds)}`;
    const cur=_dailySchedule[ds]||displaySvcs[0].name;
    const curSvc=displaySvcs.find(s=>s.name===cur)||displaySvcs[0];
    const btn=(s)=>{
      const active=cur===s.name;
      const em=s.name.toLowerCase().includes('board')?'🏡':s.name.toLowerCase().includes('half')?'½':'☀️';
      return `<button type="button" onclick="setDayType('${ds}','${s.name.replace(/'/g,"&#39;")}')"
        class="px-2.5 py-1 rounded-lg text-xs font-semibold transition-all whitespace-nowrap"
        style="${active?'background:#818cf8;color:#fff;border:2px solid #818cf8':'background:#F9FAFB;color:#6B7280;border:2px solid #E5E7EB'}">${em} ${s.name}</button>`;
    };
    const isBoarding=cur.toLowerCase().includes('board');
    const rateLabel=`$${curSvc.price}${isBoarding?'/nt':'/day'}`;
    return `<div class="flex items-center gap-2 py-1.5 border-b border-gray-100 last:border-0">
      <span class="text-xs text-gray-500 w-20 flex-shrink-0 font-medium">${dayLbl}</span>
      <div class="flex gap-1 flex-wrap">${displaySvcs.map(s=>btn(s)).join('')}</div>
      <span class="text-xs text-gray-400 ml-auto flex-shrink-0">${rateLabel}</span>
    </div>`;
  }).join('');
  // Single day — no collapsible needed, just render the row
  if(dates.length<=1){
    container.innerHTML=`<div style="padding:.25rem 0;">${rows}</div>`;
    return;
  }
  // Multiple days — build a collapsible summary header
  const svcTypes=[...new Set(dates.map(ds=>_dailySchedule[ds]||displaySvcs[0].name))];
  const svcSummary=svcTypes.length===1?svcTypes[0]:'Mixed';
  const subtotal=dates.reduce((sum,ds)=>{
    const cur=_dailySchedule[ds]||displaySvcs[0].name;
    const svc=displaySvcs.find(s=>s.name===cur)||displaySvcs[0];
    return sum+(svc?.price||0);
  },0);
  // Chip badges — one per unique service type
  const chips=svcTypes.map(n=>{
    const em=n.toLowerCase().includes('board')?'🏡':n.toLowerCase().includes('half')?'½':'☀️';
    return`<span style="background:#e0e7ff;color:#4338ca;border:1px solid #c7d2fe;border-radius:999px;padding:1px 8px;font-size:.68rem;font-weight:600;">${em} ${n}</span>`;
  }).join(' ');
  const collapsed=_schedGridCollapsed;
  const chevron=collapsed
    ?`<svg width="12" height="12" viewBox="0 0 12 12" fill="none" style="flex-shrink:0;transition:transform .2s"><path d="M3 4.5L6 7.5L9 4.5" stroke="#4338ca" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`
    :`<svg width="12" height="12" viewBox="0 0 12 12" fill="none" style="flex-shrink:0;transition:transform .2s"><path d="M3 7.5L6 4.5L9 7.5" stroke="#4338ca" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  container.innerHTML=`
    <div style="border:1px solid #F3E8D6;border-radius:12px;overflow:hidden;">
      <!-- Collapsible header -->
      <button type="button" onclick="toggleSchedGrid()"
        style="width:100%;display:flex;align-items:center;justify-content:space-between;background:#FBF7F3;border:none;padding:.55rem .75rem;cursor:pointer;gap:.5rem;">
        <div style="display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;min-width:0;">
          <span style="font-size:.72rem;font-weight:700;color:#6366f1;white-space:nowrap;">📋 ${dates.length} days</span>
          ${chips}
        </div>
        <div style="display:flex;align-items:center;gap:.4rem;flex-shrink:0;">
          <span style="font-size:.75rem;font-weight:700;color:#6366f1;">$${subtotal}</span>
          ${chevron}
        </div>
      </button>
      <!-- Expandable body -->
      <div style="${collapsed?'display:none;':''}padding:.25rem .5rem;">
        ${rows}
      </div>

function renderMiniCal(){
  const el=document.getElementById('bk-mini-cal');
  if(!el)return;
  const isClient=state.role==='client'||state.adminViewAsClient;
  const minDate=isClient?MIN_BOOKING_DATE:TODAY;
  const yr=_miniCalYear,mo=_miniCalMonth;
  const monthNames=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const dayNames=['Su','Mo','Tu','We','Th','Fr','Sa'];
  const firstDow=new Date(yr,mo,1).getDay();
  const daysInMonth=new Date(yr,mo+1,0).getDate();
  const mkDs=(d)=>`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

  const cells=[];
  // Empty cells before first day
  for(let i=0;i<firstDow;i++)cells.push('<div></div>');

  for(let d=1;d<=daysInMonth;d++){
    const ds=mkDs(d);
    const isPast=ds<minDate;
    const n=booksForDate(ds).length;
    const cap=getEffectiveCap(ds);
    const full=(n>=cap||cap===0)&&!isPast;
    const inRange=_miniCalStart&&_miniCalEnd&&ds>=_miniCalStart&&ds<=_miniCalEnd;
    const isStart=ds===_miniCalStart;
    const isEnd=ds===_miniCalEnd;
    const isToday=ds===TODAY;

    // Visual states
    let bg='transparent',color='#374151',cursor='pointer',border='none',borderRadius='8px';
    let stripeOverlay='';
    let label='';

    if(isPast){
      bg='#F3F4F6';color='#D1D5DB';cursor='default';
      // Solid grey only — hatching reserved for fully-booked future days
    } else if(isStart||isEnd){
      bg='#6366f1';color='#fff';
    } else if(inRange){
      bg='#e0e7ff';color='#4338ca';
    } else if(full){
      // diagonal stripe for fully booked
      stripeOverlay=`background-image:repeating-linear-gradient(135deg,transparent,transparent 5px,rgba(160,160,170,0.45) 5px,rgba(160,160,170,0.45) 6px);`;
      bg='#F3F4F6';color='#C4C9D4';cursor='default';
      label='<div style="font-size:9px;color:#C4C9D4;line-height:1;margin-top:1px;">Full</div>';
    }

    const todayRing=isToday&&!isStart&&!isEnd?'box-shadow:0 0 0 2px #6366f1;':'';
    const clickable=!isPast&&!full;

    cells.push(`
      <div onclick="${clickable?`miniCalClickDay('${ds}')`:''}"
        style="position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;
               height:36px;border-radius:${borderRadius};cursor:${cursor};
               background:${bg};${stripeOverlay}${todayRing}
               transition:background 0.1s;user-select:none;"
        ${clickable?`onmouseover="if(this.style.background==='transparent')this.style.background='#FEF9F0'" onmouseout="if(this.style.background==='#FEF9F0')this.style.background='transparent'"`:''}>
        <span style="font-size:13px;font-weight:${isStart||isEnd?'700':'500'};color:${color};line-height:1;">${d}</span>
        ${label}
      </div>`);
  }

  // Range display pill above the grid
  const rangePill=_miniCalStart?`
    <div style="text-align:center;padding:.35rem .5rem;background:#e0e7ff;border-bottom:1px solid #c7d2fe;font-size:.75rem;color:#4338ca;font-weight:600;">
      ${_miniCalStart===_miniCalEnd||!_miniCalEnd
        ?`📅 ${fmtDateShort(_miniCalStart)}`
        :`📅 ${fmtDateShort(_miniCalStart)} → ${fmtDateShort(_miniCalEnd)} · ${getDatesInRange(_miniCalStart,_miniCalEnd).length} day${getDatesInRange(_miniCalStart,_miniCalEnd).length===1?'':'s'}`}
    </div>`:
    `<div style="text-align:center;padding:.35rem .5rem;background:#F9FAFB;border-bottom:1px solid #F3F4F6;font-size:.75rem;color:#9CA3AF;">
      Click a day to set start date
    </div>`;

  el.innerHTML=`
    <!-- Month navigation -->
    <div style="display:flex;align-items:center;justify-content:space-between;padding:.5rem .75rem;background:#FAFAFA;border-bottom:1px solid #F3F4F6;">
      <button type="button" onclick="miniCalNav(-1)" style="background:none;border:none;cursor:pointer;color:#6B7280;font-size:1.1rem;padding:2px 6px;border-radius:6px;" onmouseover="this.style.background='#F3F4F6'" onmouseout="this.style.background='none'">‹</button>
      <span style="font-size:.85rem;font-weight:600;color:#374151;">${monthNames[mo]} ${yr}</span>
      <button type="button" onclick="miniCalNav(1)" style="background:none;border:none;cursor:pointer;color:#6B7280;font-size:1.1rem;padding:2px 6px;border-radius:6px;" onmouseover="this.style.background='#F3F4F6'" onmouseout="this.style.background='none'">›</button>
    </div>
    ${rangePill}
    <!-- Day-of-week headers -->
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:.4rem .5rem .2rem;">
      ${dayNames.map(n=>`<div style="text-align:center;font-size:11px;font-weight:600;color:#9CA3AF;">${n}</div>`).join('')}
    </div>
    <!-- Day grid -->
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:.2rem .5rem .5rem;">
      ${cells.join('')}
    </div>`;
}

let _courierChecking=false;
let _courierDistanceResult=null; // {miles, ok, label}
const _courierDistanceCache={}; // address → {miles, timestamp} — avoids re-checking same address
function courierEnabled(){return state.settings.courierEnabled!==false;}
function courierAllowedDays(){return(state.settings.courierDays||'Tue,Thu').split(',').map(d=>d.trim());}

  if(isNaN(d))return false;

  return courierAllowedDays().includes(dayName);

// Check distance using Google Maps JS SDK (no CORS, works with HTTP referrer restriction)
// Primary: DistanceMatrixService (driving distance) → Fallback: Geocoder + Haversine (straight line)
async function checkCourierDistance(address){
  const origin=state.settings.businessAddress;
  if(!origin){return{ok:false,miles:0,label:'Business address not configured — contact us to arrange pickup.'};}
  const key=state.settings.googleMapsApiKey;
  if(!key){return{ok:false,miles:0,label:'Distance check unavailable — contact us to confirm service area.'};}
  const maxMiles=+(state.settings.courierRadiusMiles||15);
  // Check cache first — results valid for 24 hours
  const cacheKey=address.toLowerCase().trim();
  const cached=_courierDistanceCache[cacheKey];
  if(cached&&(Date.now()-cached.timestamp)<86400000){
    const ok=cached.miles<=maxMiles;
    const label=ok
      ?`✅ ${cached.miles.toFixed(1)} miles away — within our ${maxMiles}-mile service area!`
      :`❌ ${cached.miles.toFixed(1)} miles away — outside our ${maxMiles}-mile service area. Please contact us for special arrangements.`;
    _courierDistanceResult={ok,miles:cached.miles,label};
    return _courierDistanceResult;
  }
  try{
    _courierChecking=true;
    // Ensure Maps JS SDK is loaded (same loader used by vet autocomplete)
    await loadMapsApi();
    let miles=0;
    // Primary: DistanceMatrixService (driving distance, most accurate)
    try{
      miles=await _distanceMatrixJS(origin,address);
    }catch(e){
      console.warn('[Courier] DistanceMatrix failed, trying Geocoder fallback:', e.message);
      // Fallback: Geocode both addresses + Haversine straight-line
      miles=await _geocodeDistanceFallback(origin,address);
    }
    // Cache the result
    _courierDistanceCache[cacheKey]={miles,timestamp:Date.now()};
    const ok=miles<=maxMiles;
    const label=ok
      ?`✅ ${miles.toFixed(1)} miles away — within our ${maxMiles}-mile service area!`
      :`❌ ${miles.toFixed(1)} miles away — outside our ${maxMiles}-mile service area. Please contact us for special arrangements.`;
    _courierDistanceResult={ok,miles,label};
    return _courierDistanceResult;
  }catch(err){
    console.error('[Courier] Distance check failed:', err);
    _courierDistanceResult={ok:false,miles:0,label:'Distance check failed — please contact us to confirm service area.'};
    return _courierDistanceResult;
  }finally{_courierChecking=false;}
}
// Uses the Maps JS SDK DistanceMatrixService — no CORS, no exposed API key in URL
function _distanceMatrixJS(origin,dest){
  return new Promise((resolve,reject)=>{
    if(!window.google?.maps?.DistanceMatrixService){reject(new Error('DistanceMatrixService not available'));return;}
    const svc=new google.maps.DistanceMatrixService();
    svc.getDistanceMatrix({
      origins:[origin],destinations:[dest],travelMode:google.maps.TravelMode.DRIVING,unitSystem:google.maps.UnitSystem.IMPERIAL,
    },(response,status)=>{
      if(status!=='OK'){reject(new Error('DM status: '+status));return;}
      const el=response?.rows?.[0]?.elements?.[0];
      if(!el||el.status!=='OK'){reject(new Error('DM element: '+(el?.status||'no data')));return;}
      resolve(el.distance.value/1609.34); // meters → miles
    });
  });
}
// Fallback: Geocode both addresses via JS SDK, compute Haversine straight-line distance
function _geocodeDistanceFallback(origin,dest){
  return new Promise(async(resolve)=>{
    if(!window.google?.maps?.Geocoder){resolve(999);return;}
    const gc=new google.maps.Geocoder();
    const geocode=(addr)=>new Promise(res=>{
      gc.geocode({address:addr},(results,status)=>{
        if(status==='OK'&&results[0])res(results[0].geometry.location);
        else res(null);
      });
    });
    const[a,b]=await Promise.all([geocode(origin),geocode(dest)]);
    if(!a||!b){resolve(999);return;}
    // Haversine
    const R=3958.8; // Earth radius miles
    const lat1=a.lat()*Math.PI/180,lat2=b.lat()*Math.PI/180;
    const dLat=(b.lat()-a.lat())*Math.PI/180;
    const dLng=(b.lng()-a.lng())*Math.PI/180;
    const x=Math.sin(dLat/2)**2+Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLng/2)**2;
    resolve(R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x)));
  });
}

function updateBookingPrice(){

  let html='';

  const _dogCount=_dogIds.length||1;
  const _disc=multiPetDiscount();
  const _cl=clients.find(c=>c.id===state.currentClientId);
  const _dogNames=_dogIds.map(id=>{const d=(_cl?.dogs||[]).find(x=>x.id===id);return d?d.name:'Dog';});

  if(_bookingMain==='boarding'){

    const ci=document.getElementById('bk-board-checkin')?.value||document.getElementById('bk-checkin')?.value;
    const co=document.getElementById('bk-board-checkout')?.value||document.getElementById('bk-checkout')?.value||ci;

    const boardingSvc=services.find(s=>s.type==='base'&&s.active&&s.name.toLowerCase().includes('board'));
    const boardingRate=boardingSvc?.price||state.settings.fullDayRate||55;

    const nights=Math.max(0,Math.round((b-a)/864e5));
    const perDogTotal=nights*boardingRate;

    html+=`<div>🏡 ${nights} ${nights===1?'night':'nights'} boarding · $${boardingRate}/night</div>`;
    if(_dogCount>1){
      html+=`<div class="text-xs text-amber-700">🐾 ${_dogNames.join(', ')} (${_dogCount} dogs) · 1st dog: $${perDogTotal} · ${_dogCount-1} more at ${_disc}% off</div>`;

    if(ci&&co&&co>ci){
      const boardingSvc=services.find(s=>s.type==='base'&&s.active&&s.name.toLowerCase().includes('board'));
      const boardingRate=boardingSvc?.price||state.settings.fullDayRate||55;
      const nights=Math.max(0,Math.round((new Date(co+'T00:00:00')-new Date(ci+'T00:00:00'))/864e5));
      if(nights>0){
        const perDogBoard=nights*boardingRate;
        const bTotal=Math.round(familyPrice(perDogBoard,_dogCount)*100)/100;
        const bDeposit=Math.ceil(bTotal*0.25*100)/100;
        html+=`<div>🏡 ${nights} ${nights===1?'night':'nights'} boarding · $${boardingRate}/night</div>`;
        if(_dogCount>1){
          html+=`<div class="text-xs text-amber-700">🐾 ${_dogNames.join(', ')} (${_dogCount} dogs) · 1st dog: $${perDogBoard} · ${_dogCount-1} more at ${_disc}% off</div>`;
        }
        html+=`<div>Boarding subtotal: $${bTotal.toFixed(2)}</div>`;
        html+=`<div class="mt-0.5 font-semibold" style="color:#6366f1;">🔐 25% deposit due now: <strong>$${bDeposit.toFixed(2)}</strong></div>`;
        total+=bTotal;
        hasContent=true;
      }
    }
    const dcEntries=Object.entries(_dailySchedule);
    if(dcEntries.length>0){
      let dcPerDog=0;
      const counts={};
      dcEntries.forEach(([,svc])=>{counts[svc]=(counts[svc]||0)+1;});
      Object.entries(counts).forEach(([svcName,cnt])=>{
        const price=getServicePrice(svcName);
        const em=svcName.toLowerCase().includes('half')?'½':'☀️';
        html+=`<div>${em} ${cnt} ${svcName} ${cnt===1?'day':'days'} · $${price}/day = $${cnt*price}</div>`;
        dcPerDog+=cnt*price;
      });
      const dcTotal=Math.round(familyPrice(dcPerDog,_dogCount)*100)/100;
      if(_dogCount>1){
        html+=`<div class="text-xs text-amber-700">🐾 Family pricing: $${dcTotal.toFixed(2)} (${_disc}% off additional pets)</div>`;
      }
      total+=dcTotal;
      hasContent=true;
    }
    if(!hasContent){preview.classList.add('hidden');return;}
  } else if(_bookingMain==='custom'){
    // Custom / special service — single-day booking
    const sel=document.getElementById('bk-custom-svc');
    const dt=document.getElementById('bk-custom-date')?.value;
    if(!sel||!dt){preview.classList.add('hidden');return;}
    const svcOpt=sel.options[sel.selectedIndex];
    const svcName=svcOpt?svcOpt.text.split(' — ')[0]:'Service';
    const svcPrice=parseFloat(sel.options[sel.selectedIndex]?.getAttribute('data-price'))||0;
    const customBase=Math.round(familyPrice(svcPrice,_dogCount)*100)/100;
    html+=`<div>✨ ${svcName} · $${svcPrice}</div>`;
    if(_dogCount>1){
      html+=`<div class="text-xs text-amber-700">🐾 ${_dogNames.join(', ')} (${_dogCount} dogs) · ${_disc}% off additional pets = $${customBase.toFixed(2)}</div>`;
    }
    total=customBase;
  } else if(_daycareMode==='package'){
    // Package purchase — no dates needed
    const tier=getDaycareTier(_sessionQty);
    const packageTotal=_sessionQty*tier.price;
    html+=`<div>🎫 ${_sessionQty} session${_sessionQty===1?'':'s'} · $${tier.price}/session = $${packageTotal}</div>`;
    html+=`<div class="text-amber-600 mt-0.5">Sessions never expire — schedule whenever you're ready!</div>`;
    html+=`<div class="mt-2 px-2.5 py-2 rounded-lg text-xs leading-snug" style="background:#EFF6FF;border:1px solid #BFDBFE;color:#1D4ED8;">💳 <strong>Payment due in full at purchase</strong> to lock in this rate. Sessions are deducted as you schedule them.</div>`;
    total=packageTotal;
  } else {
    // Daycare scheduled — use per-day schedule
    if(Object.keys(_dailySchedule).length===0){preview.classList.add('hidden');return;}
    // Group by service name for display
    let dcPerDogTotal=0;
    const counts={};
    Object.values(_dailySchedule).forEach(svcName=>{counts[svcName]=(counts[svcName]||0)+1;});
    Object.entries(counts).forEach(([svcName,cnt])=>{
      const price=getServicePrice(svcName);
      const isBoarding=svcName.toLowerCase().includes('board');
      const em=isBoarding?'🏡':svcName.toLowerCase().includes('half')?'½':'☀️';
      html+=`<div>${em} ${cnt} ${svcName} ${cnt===1?(isBoarding?'night':'day'):(isBoarding?'nights':'days')} · $${price}/${isBoarding?'nt':'day'} = $${cnt*price}</div>`;
      dcPerDogTotal+=cnt*price;
    });
    const dcFamilyTotal=Math.round(familyPrice(dcPerDogTotal,_dogCount)*100)/100;
    if(_dogCount>1){
      html+=`<div class="text-xs text-amber-700">🐾 ${_dogNames.join(', ')} (${_dogCount} dogs) · 1st dog: $${dcPerDogTotal} · ${_dogCount-1} more at ${_disc}% off</div>`;
      html+=`<div class="font-medium">Subtotal: $${dcFamilyTotal.toFixed(2)}</div>`;
    }
    total=dcFamilyTotal;
    // Daycare tier pricing applied based on total session count
    const tier=getDaycareTier(_sessionQty||Object.keys(_dailySchedule).length);
    if(tier.price<55){
      const days=Object.keys(_dailySchedule).length;
      const regularTotal=days*55;
      if(dcPerDogTotal<regularTotal){
        html+=`<div class="text-green-600">🎉 Package discount applied (${tier.label})!</div>`;
      }
    }
  }

  // Add-ons (shared across all modes)
  const stayEls=[...(document.querySelectorAll('input[name="addon"]:checked')||[])];
  let addonTotal=stayEls.reduce((s,el)=>s+(+el.dataset.price||0),0);
  const qtyEls=[...(document.querySelectorAll('input[name="addon-qty"]')||[])];
  qtyEls.forEach(el=>{
    const qty=+el.value||0;
    const lbl=document.getElementById('aqty-lbl-'+el.dataset.svcid);
    if(qty>0){addonTotal+=qty*(+el.dataset.price||0);if(lbl){lbl.textContent=`$${qty*(+el.dataset.price||0)}`;lbl.classList.remove('hidden');}}
    else{if(lbl)lbl.classList.add('hidden');}
  });
  stayEls.forEach(el=>{html+=`<div>+ ${el.value}: $${el.dataset.price}</div>`;});
  qtyEls.forEach(el=>{const qty=+el.value||0;if(qty>0)html+=`<div>+ ${el.dataset.svcname}: ${qty} × $${el.dataset.price} = $${qty*(+el.dataset.price||0)}</div>`;});
  total+=addonTotal;

  // Courier fee
  const _courierFee=getCourierPrice();
  if(_courierFee>0){
    const tripLabel=document.getElementById('bk-courier-trip')?.value==='roundtrip'?'Round trip':'One-way';
    html+=`<div class="mt-1" style="color:#1E40AF;">🚗 Courier ${tripLabel}: $${_courierFee}</div>`;
    total+=_courierFee;
  }

  lines.innerHTML=html;
  totalEl.textContent=`Total: $${total.toFixed(2)}`;
  preview.classList.remove('hidden');
  // ── Update submit button text with amount due ──────────────────────────────
  const _isClientOrPreview=(state.role==='client'||state.adminViewAsClient);
  const submitBtn=document.querySelector('form[onsubmit="submitBooking(event)"] button[type="submit"]');
  if(submitBtn&&_isClientOrPreview){
    if(_bookingMain==='boarding'||_bookingMain==='combo'){
      const _ci=document.getElementById('bk-board-checkin')?.value||document.getElementById('bk-checkin')?.value;
      const _co=document.getElementById('bk-board-checkout')?.value||document.getElementById('bk-checkout')?.value||_ci;
      const _bSvc=services.find(s=>s.type==='base'&&s.active&&s.name.toLowerCase().includes('board'));
      const _bRate=_bSvc?.price||state.settings.fullDayRate||55;
      const _nights=(_ci&&_co)?Math.max(0,Math.round((new Date(_co+'T00:00:00')-new Date(_ci+'T00:00:00'))/864e5)):0;
      const _dep=_nights>0?Math.ceil(_nights*_bRate*0.25*100)/100:0;
      submitBtn.textContent=_dep>0?`🏠 Confirm & Pay $${_dep.toFixed(2)} Deposit →`:'✓ Confirm Boarding';
    } else if(_daycareMode==='package'){
      submitBtn.textContent=total>0?`🎫 Buy Package — $${total.toFixed(2)} →`:'🎫 Purchase Package';
    } else if(_bookingMain==='daycare'||_bookingMain==='combo'){
      submitBtn.textContent=total>0?`✅ Confirm & Pay $${total.toFixed(2)} →`:'✓ Confirm Booking';
    } else {
      submitBtn.textContent=total>0?`✅ Confirm & Pay $${total.toFixed(2)} →`:'✓ Confirm Booking';
    }
  }
}
function checkDateCapacity(){
  // Returns sorted array of fully-booked date strings in a range
  function _fullDatesInRange(ci, co){
    if(!ci)return[];
    const full=[];
    const a=new Date(ci+'T00:00:00'), b=new Date((co||ci)+'T00:00:00');
    for(let d=new Date(a);d<=b;d.setDate(d.getDate()+1)){
      const ds=d.toISOString().split('T')[0];
      if(booksForDate(ds).length>=getEffectiveCap(ds))full.push(ds);
    }
    return full;
  }
  // Builds a human-readable warning HTML string from an array of date strings
  function _buildCapMsg(fullDates){
    if(!fullDates.length)return'';
    const labels=fullDates.map(ds=>fmtDateShort(ds));
    const dateStr=labels.length===1
      ?`<strong>${labels[0]}</strong>`
      :labels.slice(0,-1).map(l=>`<strong>${l}</strong>`).join(', ')+' and <strong>'+labels.at(-1)+'</strong>';
    const verb=fullDates.length===1?'is':'are';
    return`⚠️ ${dateStr} ${verb} fully booked — please review the calendar and adjust your selection.`;
  }
  // Boarding range
  const bCi=document.getElementById('bk-board-checkin')?.value;
  const bCo=document.getElementById('bk-board-checkout')?.value||bCi;
  const bWarn=document.getElementById('boarding-cap-warning');
  if(bWarn){
    const msg=_buildCapMsg(_fullDatesInRange(bCi,bCo));
    if(msg){bWarn.innerHTML=msg;bWarn.classList.remove('hidden');}
    else bWarn.classList.add('hidden');
  }
  // Daycare range (hidden inputs bk-checkin / bk-checkout)
  const dCi=document.getElementById('bk-checkin')?.value;
  const dCo=document.getElementById('bk-checkout')?.value||dCi;
  const dWarn=document.getElementById('daycare-cap-warning');
  if(dWarn){
    const msg=_buildCapMsg(_fullDatesInRange(dCi,dCo));
    if(msg){dWarn.innerHTML=msg;dWarn.classList.remove('hidden');}
    else dWarn.classList.add('hidden');
  }
  // Legacy cap-warning (⑤ warnings section) — keep for backward compat
  const legacyWarn=document.getElementById('cap-warning');
  if(legacyWarn){
    const anyFull=_fullDatesInRange(bCi,bCo).length>0||_fullDatesInRange(dCi,dCo).length>0;
    legacyWarn.classList.toggle('hidden',!anyFull);
  }
}

function checkDogVaccWarning(){
  const warn=document.getElementById('vacc-warning');if(!warn)return;
  const overrideRow=document.getElementById('vacc-override-row');
  const overrideCb=document.getElementById('vacc-override-cb');
  // Support both admin flow (has #bk-client dropdown) and client flow (use currentClientId)
  const cId=parseInt(document.getElementById('bk-client')?.value||state.currentClientId||'0');
  const dId=parseInt(document.getElementById('bk-dog')?.value||'0');
  const cl=clients.find(c=>c.id===cId);
  const dog=cl?.dogs.find(d=>d.id===dId);

  // Collect all date inputs regardless of booking mode
  const dateEls=['bk-checkin','bk-checkout','bk-board-checkin','bk-board-checkout']
    .map(id=>document.getElementById(id)).filter(Boolean);
  const lockDates=()=>{
    dateEls.forEach(el=>{el.disabled=true;el.style.opacity='0.38';el.style.cursor='not-allowed';el.style.pointerEvents='none';});
  };
  const unlockDates=()=>{
    dateEls.forEach(el=>{el.disabled=false;el.style.opacity='';el.style.cursor='';el.style.pointerEvents='';});
  };
  const hideOverride=()=>{
    if(overrideRow)overrideRow.classList.add('hidden');
    if(overrideCb)overrideCb.checked=false;
  };

  if(!dog){warn.classList.add('hidden');hideOverride();unlockDates();return;}
  const vs=vaccStatus(dog);
  const vaccOkForBooking=hasRequiredVaccines(dog);

  // If admin has already set a vaccine override on the dog profile, bypass ALL vaccine
  // warnings and the override toggle — the admin already made the call at the dog level.
  const vaccOverrideActive=(()=>{
    if(!dog.vaccOverride)return false;
    try{const ov=JSON.parse(dog.vaccOverride);if(!ov||!ov.until)return false;
        return ov.until==='indefinite'||String(ov.until)>=TODAY;}
    catch(e){return false;}
  })();
  if(vaccOverrideActive){warn.classList.add('hidden');hideOverride();unlockDates();return;}

  if(vs==='expired'||(!vaccOkForBooking&&vs!=='expiring')){
    // Merge: expired OR missing required vaccines block booking
    if(!vaccOkForBooking&&vs!=='expired'){
      // Missing required vaccines (not expired — just never provided)
      const required=state.settings.requiredVaccines||[];
      const latest=getLatestVaccsByType(dog);
      const latestNames=latest.map(v=>(v.name||'').toLowerCase());
      const missing=required.filter(r=>!latestNames.includes(r.toLowerCase()));
      warn.className='text-xs p-3 rounded-xl bg-red-50 text-red-700 border border-red-300 font-medium';
      const missingLabel=missing.length?missing.join(', '):'required vaccines';
      if(state.role==='client'){
        warn.innerHTML=`🚩 <strong>${dog.name} is missing required vaccine records: ${missingLabel}.</strong> Please upload records in My Pet to unlock booking.`;
        hideOverride();lockDates();
        warn.classList.remove('hidden');return;
      }else{
        warn.innerHTML=`🚩 <strong>${dog.name} is missing required records: ${missingLabel}.</strong> Use Admin Override to proceed, or ask the client to upload records.`;
        if(overrideRow)overrideRow.classList.remove('hidden');
        const isOverride=overrideCb?.checked||false;
        if(isOverride)unlockDates();else lockDates();
        if(overrideCb&&!overrideCb._wired){overrideCb._wired=true;overrideCb.addEventListener('change',()=>{if(overrideCb.checked)unlockDates();else lockDates();});}
        warn.classList.remove('hidden');return;
      }
    }
  }

  if(vs==='expired'){
    // Find which specific vaccines are expired to give a precise message
    const latest=getLatestVaccsByType(dog);
    const expiredNames=latest.filter(v=>v.expiry&&v.expiry<TODAY).map(v=>v.name);
    const expLabel=expiredNames.length?expiredNames.join(', '):'vaccination records';
    warn.className='text-xs p-3 rounded-xl bg-red-50 text-red-700 border border-red-300 font-medium';

    if(state.role==='client'){
      warn.innerHTML=`🚩 <strong>${dog.name}'s ${expLabel} ${expiredNames.length===1?'is':'are'} expired.</strong> Booking is currently blocked. Please contact <strong>${state.settings.ownerName||'the business'}</strong> at ${state.settings.businessName||'Nigel\'s Place'} to discuss your options.`;
      hideOverride();
      lockDates();
    }else{
      warn.innerHTML=`🚩 <strong>${dog.name}'s ${expLabel} ${expiredNames.length===1?'is':'are'} expired.</strong> Dates are locked until records are updated — or use Admin Override to proceed anyway.`;
      if(overrideRow)overrideRow.classList.remove('hidden');
      // Lock/unlock based on current override checkbox state
      const isOverride=overrideCb?.checked||false;
      if(isOverride)unlockDates();else lockDates();
      // Wire override checkbox once (flag prevents double-wiring across re-renders)
      if(overrideCb&&!overrideCb._wired){
        overrideCb._wired=true;
        overrideCb.addEventListener('change',()=>{
          if(overrideCb.checked)unlockDates();else lockDates();
        });
      }
    }
    warn.classList.remove('hidden');
  }else if(vs==='expiring'){
    const latest=getLatestVaccsByType(dog);
    const soonest=latest.filter(v=>v.expiry&&v.expiry>=TODAY).sort((a,b)=>a.expiry.localeCompare(b.expiry))[0];
    const exp=soonest?.expiry||dog.vaccExpiry||'';
    const days=exp?Math.round((new Date(exp+'T00:00:00')-new Date(TODAY+'T00:00:00'))/864e5):0;
    warn.className='text-xs p-2.5 rounded-xl bg-amber-50 text-amber-700 border border-amber-200';
    warn.innerHTML=`⚠️ <strong>${dog.name}'s vaccines expire in ${days} day${days!==1?'s':''}</strong> (${fmtDateShort(exp)}). Consider requesting updated records soon.`;
    warn.classList.remove('hidden');
    hideOverride();
    unlockDates();
  }else{
    warn.classList.add('hidden');
    hideOverride();
    unlockDates();
  }
}

const DRIVE_API = 'https://www.googleapis.com/';
async function findOrCreateFolder(name, parentId){
  // Check in-memory + localStorage cache first to avoid creating duplicate folders
  const cacheKey=(parentId||'root')+':'+name;
  if(_folderIdCache[cacheKey])return _folderIdCache[cacheKey];
  // Search Drive for an existing folder with this name under this parent
  const q=`mimeType='application/vnd.google-apps.folder' and name='${name}' and trashed=false${parentId?` and '${parentId}' in parents`:''}`;
  const r=await fetch(`${DRIVE_API}drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id)`,{
    headers:{Authorization:`Bearer ${driveToken}`}
  });
  const d=await r.json();
  let folderId=d.files&&d.files.length>0?d.files[0].id:null;
  if(!folderId){
    // Not found — create it
    const body={name,mimeType:'application/vnd.google-apps.folder'};
    if(parentId)body.parents=[parentId];
    const cr=await fetch(`${DRIVE_API}drive/v3/files`,{
      method:'POST',headers:{Authorization:`Bearer ${driveToken}`,'Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    const cd=await cr.json();
    folderId=cd.id;
  }
  // Cache the result so future calls skip the search entirely
  if(folderId){
    _folderIdCache[cacheKey]=folderId;
    try{localStorage.setItem('np_folder_cache',JSON.stringify(_folderIdCache));}catch(e){}
  }
  return folderId;
}
async function uploadToDriveFolder(file, folderPath){
  // folderPath = array of folder names starting from root, e.g. ["Nigel's Place","Dog Photos","Buddy"]
  // If nigelsDriveFolderId is set in Settings, pin directly to that folder instead of searching for "Nigel's Place"
  const rootId=(state.settings.nigelsDriveFolderId||'').trim();
  let parentId=null;
  let pathToWalk=folderPath;
  if(rootId&&folderPath[0]==="Nigel's Place"){parentId=rootId;pathToWalk=folderPath.slice(1);}
  for(const name of pathToWalk)parentId=await findOrCreateFolder(name,parentId);
  const timestamp=new Date().toISOString().split('T')[0];
  const safeName=`${timestamp}_${file.name}`;
  const meta=JSON.stringify({name:safeName,parents:[parentId]});
  const form=new FormData();
  form.append('metadata',new Blob([meta],{type:'application/json'}));
  form.append('file',file);
  const r=await fetch(`${DRIVE_API}upload/drive/v3/files?uploadType=multipart&fields=id,webViewLink,name`,{
    method:'POST',headers:{Authorization:`Bearer ${driveToken}`},body:form
  });
  const d=await r.json();
  if(d.error)throw new Error('Drive error: '+(d.error.message||JSON.stringify(d.error)));
  return d;
}

// Preferred models in order — auto-selects the first one available for this API key
const GEMINI_MODEL_PREFERENCE=['gemini-2.5-flash','gemini-2.5-pro','gemini-2.0-flash','gemini-2.0-flash-lite','gemini-1.5-flash-latest','gemini-1.5-pro-latest'];
let _cachedGeminiModel=null;
async function getGeminiModel(key){
  if(_cachedGeminiModel)return _cachedGeminiModel;
  try{
    const r=await fetch(`https://generativelanguage.googleapis.com/v1/models?key=${key}`);
    const d=await r.json();
    if(d.error)throw new Error(d.error.message);
    const available=new Set((d.models||[]).filter(m=>(m.supportedGenerationMethods||[]).includes('generateContent')).map(m=>m.name.split('/')[1]));
    for(const m of GEMINI_MODEL_PREFERENCE){if(available.has(m)){_cachedGeminiModel=m;return m;}}
    // Fallback: just use first available model that supports generateContent
    const first=[...(d.models||[])].find(m=>(m.supportedGenerationMethods||[]).includes('generateContent'));
    if(first){_cachedGeminiModel=first.name.split('/')[1];return _cachedGeminiModel;}
  }catch(e){console.warn('Could not auto-detect Gemini model:',e);}
  return 'gemini-2.0-flash'; // last resort default
}
async function parseVaccRecordWithGemini(file, knownVetName=''){
  const key=state.settings.geminiApiKey;
  if(!key)throw new Error('No Gemini API key set in Settings → paste your key from ai.google.dev');
  const model=await getGeminiModel(key);
  // Read file as base64
  const base64=await new Promise((res,rej)=>{
    const fr=new FileReader();
    fr.onload=e=>res(e.target.result.split(',')[1]);
    fr.onerror=rej;
    fr.readAsDataURL(file);
  });
  const mimeType=file.type||'application/pdf';
  const vetHint=knownVetName?`\nThe client's registered vet clinic is: "${knownVetName}". If you detect a clinic name/letterhead, note whether it matches.`:'';
  const prompt=`You are a veterinary records verification assistant. Analyze this document uploaded as a pet vaccine record.

STEP 1 — AUTHENTICITY CHECK:
Determine if this document appears to be an official veterinary record. Official records typically have:
- A veterinary clinic name, logo, or letterhead
- A licensed veterinarian's name or signature
- A formatted vaccine table (vaccine name, date administered, expiry/due date)
- A professional layout (not handwritten notes on plain paper)

STEP 2 — DATA EXTRACTION:
Extract every vaccine and its expiration date from the document.${vetHint}

Return ONLY valid JSON, no markdown, no explanation:
{
  "suspiciousDocument": false,
  "suspiciousReason": "",
  "clinicDetected": "name of clinic if found or empty string",
  "dogName": "dog name if visible or empty string",
  "vaccines": [{"name":"Rabies","expiry":"YYYY-MM-DD"},{"name":"Bordetella","expiry":"YYYY-MM-DD"}]
}

Set suspiciousDocument=true and fill suspiciousReason if:
- The document appears to be handwritten notes on plain paper with no clinic name
- No veterinary letterhead, logo, or professional formatting is visible
- The document looks like a personal reminder or informal note rather than an official record
- The document is clearly not a vet record at all (receipt, photo, random page, etc.)

Common vaccine names: Rabies, Bordetella, DHPP, DA2PP, Distemper, Parvo, Leptospirosis, Lyme, Canine Influenza.
Normalize names (e.g. DA2PP→DHPP). If only an administration date is visible (no expiry), estimate: Rabies=3 years, Bordetella=1 year, others=1 year.
If no expiry can be determined, omit the expiry field. Return an empty vaccines array if no vaccine info found.`;
  const body={contents:[{parts:[
    {inline_data:{mime_type:mimeType,data:base64}},
    {text:prompt}
  ]}]};
  // Try each model in preference order until one works (handles per-model quota issues)
  const modelsToTry=[model,...GEMINI_MODEL_PREFERENCE.filter(m=>m!==model)];
  for(const m of modelsToTry){
    const r=await fetch(`https://generativelanguage.googleapis.com/v1/models/${m}:generateContent?key=${key}`,{
      method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)
    });
    const d=await r.json();
    if(d.error&&d.error.code===429){
      console.warn(`Gemini quota hit on ${m}, trying next model...`);
      _cachedGeminiModel=null; // reset cache so next call re-detects
      continue;
    }
    if(d.error)throw new Error(`Gemini (${m}): ${d.error.message}`);
    _cachedGeminiModel=m; // cache the working model
    const text=d.candidates?.[0]?.content?.parts?.[0]?.text||'{}';
    const clean=text.replace(/```json?|```/g,'').trim();
    return JSON.parse(clean);
  }
  throw new Error('All Gemini models hit quota limits. Please try again in a minute.');
}
async function handleVaccUpload(clientId, dogId, altBtnId){

        // Step 4: Parse with Gemini

          if(!proceed){
            if(btn){btn.disabled=false;btn.innerHTML='📄 Upload Records';}
            resolve();return;
          }
          showVaccOverlay('Importing results…');
        }
        if(result.vaccines&&result.vaccines.length>0){
          // Re-fetch fresh references — auto-refresh may have replaced all dog objects during the Gemini await
          const freshCl=clients.find(c=>c.id===clientId);
          const freshDog=freshCl?.dogs.find(d=>d.id===dogId);
          if(!freshDog||!freshCl){
            hideVaccOverlay();
            showToast('⚠️ Pet not found after scan — please reload and try again.','#EF4444');
            if(btn){btn.disabled=false;btn.innerHTML='📄 Upload Records';}
            resolve();return;
          }

          freshDog.vaccines=result.vaccines;
          const expDates=result.vaccines.filter(v=>v.expiry).map(v=>v.expiry).sort();
          if(expDates.length)freshDog.vaccExpiry=expDates[0];
          freshDog.vaccinated=true;
          hideVaccOverlay();
          render();
          showToast(`✅ ${result.vaccines.length} vaccine record${result.vaccines.length>1?'s':''} saved for ${freshDog.name}!`);

    });
