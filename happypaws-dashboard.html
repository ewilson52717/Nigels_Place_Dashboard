// ── Gemini voice/text client intake parsing ───────────────────────────────────
async function parseClientIntakeWithGemini(transcript){
  const key=state.settings.geminiApiKey;
  if(!key)throw new Error('No Gemini API key configured in Settings.');
  const model=await getGeminiModel(key);
  const today=new Date().toISOString().split('T')[0];
  const prompt=`You are a pet daycare intake assistant. Parse the following spoken client intake and extract structured data.
Today's date: ${today}

Return ONLY valid JSON, no markdown:
{
  "clientName": "Full Name",
  "phone": "digits only, no formatting",
  "email": "email@example.com or empty string",
  "dogName": "dog's name",
  "dogBreed": "breed or Mixed Breed",
  "dogGender": "male or female or unknown",
  "dogBirthday": "YYYY-MM-DD or empty string",
  "dogNotes": "care notes, medications, special needs — combine all relevant details",
  "confidence": "high/medium/low"
}

Rules:
- Spell names correctly using context clues (e.g. spoken 'Tag Wilson' → 'Tag Wilson')
- For birthday: convert any spoken date to YYYY-MM-DD (e.g. 'September 15th 2020' → '2020-09-15')
- For dogNotes: include medications, personality, special needs in natural language
- If a field is not mentioned, use empty string
- confidence: high if all major fields present, medium if some missing, low if very unclear

Intake transcript:
"${transcript.replace(/"/g,'\\"')}"`;
  const r=await fetch(`https://generativelanguage.googleapis.com/v1/models/${model}:generateContent?key=${key}`,{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})
  });
  const d=await r.json();
  if(d.error)throw new Error(`Gemini: ${d.error.message}`);
  const text=d.candidates?.[0]?.content?.parts?.[0]?.text||'{}';
  const clean=text.replace(/```json?|```/g,'').trim();
  return JSON.parse(clean);
}
// Fills Add Client modal fields with AI-parsed data and highlights them amber
function applyAiIntakeToForm(data){
  const setAi=(id,val)=>{
    const el=document.getElementById(id);
    if(!el||!val)return;
    el.value=val;
    el.classList.add('ai-suggested');
    // Remove highlight once user edits the field manually
    el.addEventListener('input',()=>el.classList.remove('ai-suggested'),{once:true});
  };
  if(data.clientName)setAi('cl-name',data.clientName);
  if(data.phone)setAi('cl-phone',fmtPhone(data.phone.replace(/\D/g,'')));
  if(data.email)setAi('cl-email',data.email);
  if(data.dogName)setAi('dog-name',data.dogName);
  if(data.dogBirthday)setAi('dog-birthday',data.dogBirthday);
  if(data.dogNotes)setAi('dog-notes',data.dogNotes);
  // Handle breed dropdown — try to match, else set "other" text input
  if(data.dogBreed){
    const sel=document.getElementById('dog-breed');
    if(sel){
      const opt=[...sel.options].find(o=>o.value.toLowerCase()===data.dogBreed.toLowerCase())||
                [...sel.options].find(o=>o.value.toLowerCase().includes(data.dogBreed.toLowerCase().split(' ')[0]));
      if(opt){sel.value=opt.value;sel.classList.add('ai-suggested');sel.addEventListener('change',()=>sel.classList.remove('ai-suggested'),{once:true});}
      else{sel.value='other';const oi=document.getElementById('dog-breed-other');if(oi){oi.style.display='block';setAi('dog-breed-other',data.dogBreed);}}
    }
  }
}
let _voiceRecognizer=null;
function startVoiceIntake(){
  const SpeechRec=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SpeechRec){showToast('Voice input not supported in this browser. Try Chrome.','#EF4444');return;}
  if(!state.settings.geminiApiKey){showToast('Add a Gemini API key in Settings first.','#F97316');return;}
  const micBtn=document.getElementById('voice-intake-btn');
  const micStatus=document.getElementById('voice-intake-status');
  if(_voiceRecognizer){
    _voiceRecognizer.stop();
    return;
  }
  const rec=new SpeechRec();
  rec.continuous=true;
  rec.interimResults=true;
  rec.lang='en-US';
  _voiceRecognizer=rec;
  if(micBtn){micBtn.innerHTML='🔴 Stop Listening';micBtn.style.background='#DC2626';micBtn.style.animation='mic-pulse 1s ease infinite';}
  if(micStatus){micStatus.textContent='Listening… speak clearly.';}
  let finalTranscript='';
  rec.onresult=(e)=>{
    let interim='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal)finalTranscript+=e.results[i][0].transcript+' ';
      else interim+=e.results[i][0].transcript;
    }
    if(micStatus)micStatus.textContent='🎙️ '+((finalTranscript+interim).slice(-80)||'Listening…');
  };
  rec.onerror=(e)=>{
    showToast('Mic error: '+e.error,'#EF4444');
    _voiceRecognizer=null;
    if(micBtn){micBtn.innerHTML='🎙️ Voice Fill';micBtn.style.background='#7B4015';micBtn.style.animation='';}
    if(micStatus)micStatus.textContent='';
  };
  rec.onend=async()=>{
    _voiceRecognizer=null;
    if(micBtn){micBtn.innerHTML='🎙️ Voice Fill';micBtn.style.background='#7B4015';micBtn.style.animation='';}
    if(!finalTranscript.trim()){if(micStatus)micStatus.textContent='No speech detected.';return;}
    if(micStatus)micStatus.textContent='🤖 Parsing with Gemini AI…';
    try{
      const data=await parseClientIntakeWithGemini(finalTranscript.trim());
      applyAiIntakeToForm(data);
      if(micStatus){
        micStatus.innerHTML=`✅ Fields auto-filled! <span style="color:#D97706;">Amber fields</span> are AI-suggested — review and edit as needed.`;
      }
    }catch(err){
      showToast('AI parse failed: '+err.message,'#EF4444');
      if(micStatus)micStatus.textContent='Could not parse. Try again or fill manually.';
    }
  };
  rec.start();
}

function getDatesInRange(ci,co){
  const dates=[];
  const a=new Date(ci+'T00:00:00'),b=new Date(co+'T00:00:00');
  for(let d=new Date(a);d<=b;d.setDate(d.getDate()+1))dates.push(d.toISOString().split('T')[0]);
  return dates;
}
function rebuildDailySchedule(){
  const ci=document.getElementById('bk-checkin')?.value;
  const co=document.getElementById('bk-checkout')?.value||ci;
  if(!ci){_dailySchedule={};renderDailyScheduleGrid();return;}
  const dates=getDatesInRange(ci,co);
  // Default service: first active base service, or Full Day fallback
  const baseSvcs=services.filter(s=>s.type==='base'&&s.active);
  const defSvc=_bkType==='boarding'?'Boarding':(baseSvcs[0]?.name||'Full Day');
  const next={};
  dates.forEach(ds=>{next[ds]=_dailySchedule[ds]||defSvc;});
  _dailySchedule=next;
  renderDailyScheduleGrid();
  updateBookingPrice();
}

}

// ─── MINI CALENDAR PICKER (booking modal) ────────────────────────────────────
function renderMiniCal(){
  const el=document.getElementById('bk-mini-cal');
  if(!el)return;
  const isClient=state.role==='client'||state.adminViewAsClient;
  const minDate=isClient?MIN_BOOKING_DATE:TODAY;
  const yr=_miniCalYear,mo=_miniCalMonth;
  const monthNames=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const dayNames=['Su','Mo','Tu','We','Th','Fr','Sa'];
  const firstDow=new Date(yr,mo,1).getDay();
  const daysInMonth=new Date(yr,mo+1,0).getDate();
  const mkDs=(d)=>`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

  const cells=[];
  // Empty cells before first day
  for(let i=0;i<firstDow;i++)cells.push('<div></div>');

  for(let d=1;d<=daysInMonth;d++){
    const ds=mkDs(d);
    const isPast=ds<minDate;
    const n=booksForDate(ds).length;
    const cap=getEffectiveCap(ds);
    const full=(n>=cap||cap===0)&&!isPast;
    const inRange=_miniCalStart&&_miniCalEnd&&ds>=_miniCalStart&&ds<=_miniCalEnd;
    const isStart=ds===_miniCalStart;
    const isEnd=ds===_miniCalEnd;
    const isToday=ds===TODAY;

    // Visual states
    let bg='transparent',color='#374151',cursor='pointer',border='none',borderRadius='8px';
    let stripeOverlay='';
    let label='';

    if(isPast){
      bg='transparent';color='#D1D5DB';cursor='default';
    } else if(isStart||isEnd){
      bg='#7B4015';color='#fff';
    } else if(inRange){
      bg='#FEF3C7';color='#92400E';
    } else if(full){
      // diagonal stripe for fully booked
      stripeOverlay=`background-image:repeating-linear-gradient(135deg,transparent,transparent 5px,rgba(160,160,170,0.45) 5px,rgba(160,160,170,0.45) 6px);`;
      bg='#F3F4F6';color='#C4C9D4';cursor='default';
      label='<div style="font-size:9px;color:#C4C9D4;line-height:1;margin-top:1px;">Full</div>';
    }

    const todayRing=isToday&&!isStart&&!isEnd?'box-shadow:0 0 0 2px #7B4015;':'';
    const clickable=!isPast&&!full;

    cells.push(`
      <div onclick="${clickable?`miniCalClickDay('${ds}')`:''}"
        style="position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;
               height:36px;border-radius:${borderRadius};cursor:${cursor};
               background:${bg};${stripeOverlay}${todayRing}
               transition:background 0.1s;user-select:none;"
        ${clickable?`onmouseover="if(this.style.background==='transparent')this.style.background='#FEF9F0'" onmouseout="if(this.style.background==='#FEF9F0')this.style.background='transparent'"`:''}>
        <span style="font-size:13px;font-weight:${isStart||isEnd?'700':'500'};color:${color};line-height:1;">${d}</span>
        ${label}
      </div>`);
  }

  // Range display pill above the grid
  const rangePill=_miniCalStart?`
    <div style="text-align:center;padding:.35rem .5rem;background:#FEF3C7;border-bottom:1px solid #FDE68A;font-size:.75rem;color:#92400E;font-weight:600;">
      ${_miniCalStart===_miniCalEnd||!_miniCalEnd
        ?`📅 ${fmtDateShort(_miniCalStart)}`
        :`📅 ${fmtDateShort(_miniCalStart)} → ${fmtDateShort(_miniCalEnd)} · ${getDatesInRange(_miniCalStart,_miniCalEnd).length} day${getDatesInRange(_miniCalStart,_miniCalEnd).length===1?'':'s'}`}
    </div>`:
    `<div style="text-align:center;padding:.35rem .5rem;background:#F9FAFB;border-bottom:1px solid #F3F4F6;font-size:.75rem;color:#9CA3AF;">
      Click a day to set start date
    </div>`;

  el.innerHTML=`
    <!-- Month navigation -->
    <div style="display:flex;align-items:center;justify-content:space-between;padding:.5rem .75rem;background:#FAFAFA;border-bottom:1px solid #F3F4F6;">
      <button type="button" onclick="miniCalNav(-1)" style="background:none;border:none;cursor:pointer;color:#6B7280;font-size:1.1rem;padding:2px 6px;border-radius:6px;" onmouseover="this.style.background='#F3F4F6'" onmouseout="this.style.background='none'">‹</button>
      <span style="font-size:.85rem;font-weight:600;color:#374151;">${monthNames[mo]} ${yr}</span>
      <button type="button" onclick="miniCalNav(1)" style="background:none;border:none;cursor:pointer;color:#6B7280;font-size:1.1rem;padding:2px 6px;border-radius:6px;" onmouseover="this.style.background='#F3F4F6'" onmouseout="this.style.background='none'">›</button>
    </div>

function updateBookingPrice(){
  const preview=document.getElementById('price-preview');
  const lines=document.getElementById('price-lines');
  const totalEl=document.getElementById('price-total');
  if(!preview||!lines||!totalEl)return;

  let html='';
  let total=0;

  if(_bookingMain==='boarding'){
    // Boarding: price from boarding service, nights = checkout - checkin (not +1)
    const ci=document.getElementById('bk-board-checkin')?.value||document.getElementById('bk-checkin')?.value;
    const co=document.getElementById('bk-board-checkout')?.value||document.getElementById('bk-checkout')?.value||ci;
    if(!ci){preview.classList.add('hidden');return;}
    const boardingSvc=services.find(s=>s.type==='base'&&s.active&&s.name.toLowerCase().includes('board'));
    const boardingRate=boardingSvc?.price||state.settings.fullDayRate||55;
    const a=new Date(ci+'T00:00:00'),b=new Date(co+'T00:00:00');
    const nights=Math.max(0,Math.round((b-a)/864e5));
    const baseTotal=nights*boardingRate;
    html+=`<div>🏡 ${nights} ${nights===1?'night':'nights'} boarding · $${boardingRate}/night = $${baseTotal}</div>`;
    total=baseTotal;
  } else if(_bookingMain==='combo'){
    // Combo: boarding portion + daycare portion
    const ci=document.getElementById('bk-board-checkin')?.value;
    const co=document.getElementById('bk-board-checkout')?.value||ci;
    let hasContent=false;
    if(ci&&co&&co>ci){
      const boardingSvc=services.find(s=>s.type==='base'&&s.active&&s.name.toLowerCase().includes('board'));
      const boardingRate=boardingSvc?.price||state.settings.fullDayRate||55;
      const nights=Math.max(0,Math.round((new Date(co+'T00:00:00')-new Date(ci+'T00:00:00'))/864e5));
      if(nights>0){
        html+=`<div>🏡 ${nights} ${nights===1?'night':'nights'} boarding · $${boardingRate}/night = $${nights*boardingRate}</div>`;
        total+=nights*boardingRate;
        hasContent=true;
      }
    }
    const dcEntries=Object.entries(_dailySchedule);
    if(dcEntries.length>0){
      const counts={};
      dcEntries.forEach(([,svc])=>{counts[svc]=(counts[svc]||0)+1;});
      Object.entries(counts).forEach(([svcName,cnt])=>{
        const price=getServicePrice(svcName);
        const em=svcName.toLowerCase().includes('half')?'½':'☀️';
        html+=`<div>${em} ${cnt} ${svcName} ${cnt===1?'day':'days'} · $${price}/day = $${cnt*price}</div>`;
        total+=cnt*price;
      });
      hasContent=true;
    }
    if(!hasContent){preview.classList.add('hidden');return;}
  } else if(_daycareMode==='package'){
    // Package purchase — no dates needed
    const tier=getDaycareTier(_sessionQty);
    const packageTotal=_sessionQty*tier.price;
    html+=`<div>🎫 ${_sessionQty} session${_sessionQty===1?'':'s'} · $${tier.price}/session = $${packageTotal}</div>`;
    html+=`<div class="text-amber-600 mt-0.5">Sessions never expire — schedule whenever you're ready!</div>`;
    total=packageTotal;
  } else {
    // Daycare scheduled — use per-day schedule
    if(Object.keys(_dailySchedule).length===0){preview.classList.add('hidden');return;}
    // Group by service name for display
    const counts={};
    Object.values(_dailySchedule).forEach(svcName=>{counts[svcName]=(counts[svcName]||0)+1;});
    Object.entries(counts).forEach(([svcName,cnt])=>{
      const price=getServicePrice(svcName);
      const isBoarding=svcName.toLowerCase().includes('board');
      const em=isBoarding?'🏡':svcName.toLowerCase().includes('half')?'½':'☀️';
      html+=`<div>${em} ${cnt} ${svcName} ${cnt===1?(isBoarding?'night':'day'):(isBoarding?'nights':'days')} · $${price}/${isBoarding?'nt':'day'} = $${cnt*price}</div>`;
      total+=cnt*price;
    });
    // Daycare tier pricing applied based on total session count
    const tier=getDaycareTier(_sessionQty||Object.keys(_dailySchedule).length);
    if(tier.price<55){
      const days=Object.keys(_dailySchedule).length;
      const regularTotal=days*55;
      if(total<regularTotal){
        html+=`<div class="text-green-600">🎉 Package discount applied (${tier.label})!</div>`;
      }
    }
  }

  // Add-ons (shared across all modes)
  const stayEls=[...(document.querySelectorAll('input[name="addon"]:checked')||[])];
  let addonTotal=stayEls.reduce((s,el)=>s+(+el.dataset.price||0),0);
  const qtyEls=[...(document.querySelectorAll('input[name="addon-qty"]')||[])];
  qtyEls.forEach(el=>{
    const qty=+el.value||0;
    const lbl=document.getElementById('aqty-lbl-'+el.dataset.svcid);
    if(qty>0){addonTotal+=qty*(+el.dataset.price||0);if(lbl){lbl.textContent=`$${qty*(+el.dataset.price||0)}`;lbl.classList.remove('hidden');}}
    else{if(lbl)lbl.classList.add('hidden');}
  });
  stayEls.forEach(el=>{html+=`<div>+ ${el.value}: $${el.dataset.price}</div>`;});
  qtyEls.forEach(el=>{const qty=+el.value||0;if(qty>0)html+=`<div>+ ${el.dataset.svcname}: ${qty} × $${el.dataset.price} = $${qty*(+el.dataset.price||0)}</div>`;});
  total+=addonTotal;

  lines.innerHTML=html;
  totalEl.textContent=`Total: $${total}`;
  preview.classList.remove('hidden');
}

function checkDogVaccWarning(){
  const warn=document.getElementById('vacc-warning');if(!warn)return;
  const overrideRow=document.getElementById('vacc-override-row');
  const overrideCb=document.getElementById('vacc-override-cb');
  // Support both admin flow (has #bk-client dropdown) and client flow (use currentClientId)
  const cId=parseInt(document.getElementById('bk-client')?.value||state.currentClientId||'0');
  const dId=parseInt(document.getElementById('bk-dog')?.value||'0');
  const cl=clients.find(c=>c.id===cId);
  const dog=cl?.dogs.find(d=>d.id===dId);

  // Collect all date inputs regardless of booking mode
  const dateEls=['bk-checkin','bk-checkout','bk-board-checkin','bk-board-checkout']
    .map(id=>document.getElementById(id)).filter(Boolean);
  const lockDates=()=>{
    dateEls.forEach(el=>{el.disabled=true;el.style.opacity='0.38';el.style.cursor='not-allowed';el.style.pointerEvents='none';});
  };
  const unlockDates=()=>{
    dateEls.forEach(el=>{el.disabled=false;el.style.opacity='';el.style.cursor='';el.style.pointerEvents='';});
  };
  const hideOverride=()=>{
    if(overrideRow)overrideRow.classList.add('hidden');
    if(overrideCb)overrideCb.checked=false;
  };

  if(!dog){warn.classList.add('hidden');hideOverride();unlockDates();return;}
  const vs=vaccStatus(dog);
  const vaccOkForBooking=hasRequiredVaccines(dog);

  // If admin has already set a vaccine override on the dog profile, bypass ALL vaccine
  // warnings and the override toggle — the admin already made the call at the dog level.
  const vaccOverrideActive=(()=>{
    if(!dog.vaccOverride)return false;
    try{const ov=JSON.parse(dog.vaccOverride);if(!ov||!ov.until)return false;
        return ov.until==='indefinite'||String(ov.until)>=TODAY;}
    catch(e){return false;}
  })();
  if(vaccOverrideActive){warn.classList.add('hidden');hideOverride();unlockDates();return;}

  if(vs==='expired'||(!vaccOkForBooking&&vs!=='expiring')){
    // Merge: expired OR missing required vaccines block booking
    if(!vaccOkForBooking&&vs!=='expired'){
      // Missing required vaccines (not expired — just never provided)
      const required=state.settings.requiredVaccines||[];
      const latest=getLatestVaccsByType(dog);
      const latestNames=latest.map(v=>(v.name||'').toLowerCase());
      const missing=required.filter(r=>!latestNames.includes(r.toLowerCase()));
      warn.className='text-xs p-3 rounded-xl bg-red-50 text-red-700 border border-red-300 font-medium';
      const missingLabel=missing.length?missing.join(', '):'required vaccines';
      if(state.role==='client'){
        warn.innerHTML=`🚩 <strong>${dog.name} is missing required vaccine records: ${missingLabel}.</strong> Please upload records in My Pet to unlock booking.`;
        hideOverride();lockDates();
        warn.classList.remove('hidden');return;
      }else{
        warn.innerHTML=`🚩 <strong>${dog.name} is missing required records: ${missingLabel}.</strong> Use Admin Override to proceed, or ask the client to upload records.`;
        if(overrideRow)overrideRow.classList.remove('hidden');
        const isOverride=overrideCb?.checked||false;
        if(isOverride)unlockDates();else lockDates();
        if(overrideCb&&!overrideCb._wired){overrideCb._wired=true;overrideCb.addEventListener('change',()=>{if(overrideCb.checked)unlockDates();else lockDates();});}
        warn.classList.remove('hidden');return;
      }
    }
  }

  if(vs==='expired'){
    // Find which specific vaccines are expired to give a precise message
    const latest=getLatestVaccsByType(dog);
    const expiredNames=latest.filter(v=>v.expiry&&v.expiry<TODAY).map(v=>v.name);
    const expLabel=expiredNames.length?expiredNames.join(', '):'vaccination records';
    warn.className='text-xs p-3 rounded-xl bg-red-50 text-red-700 border border-red-300 font-medium';

    if(state.role==='client'){
      warn.innerHTML=`🚩 <strong>${dog.name}'s ${expLabel} ${expiredNames.length===1?'is':'are'} expired.</strong> Booking is currently blocked. Please contact <strong>${state.settings.ownerName||'the business'}</strong> at ${state.settings.businessName||'Nigel\'s Place'} to discuss your options.`;
      hideOverride();
      lockDates();
    }else{
      warn.innerHTML=`🚩 <strong>${dog.name}'s ${expLabel} ${expiredNames.length===1?'is':'are'} expired.</strong> Dates are locked until records are updated — or use Admin Override to proceed anyway.`;
      if(overrideRow)overrideRow.classList.remove('hidden');
      // Lock/unlock based on current override checkbox state
      const isOverride=overrideCb?.checked||false;
      if(isOverride)unlockDates();else lockDates();
      // Wire override checkbox once (flag prevents double-wiring across re-renders)
      if(overrideCb&&!overrideCb._wired){
        overrideCb._wired=true;
        overrideCb.addEventListener('change',()=>{
          if(overrideCb.checked)unlockDates();else lockDates();
        });
      }
    }
    warn.classList.remove('hidden');
  }else if(vs==='expiring'){
    const latest=getLatestVaccsByType(dog);
    const soonest=latest.filter(v=>v.expiry&&v.expiry>=TODAY).sort((a,b)=>a.expiry.localeCompare(b.expiry))[0];
    const exp=soonest?.expiry||dog.vaccExpiry||'';
    const days=exp?Math.round((new Date(exp+'T00:00:00')-new Date(TODAY+'T00:00:00'))/864e5):0;
    warn.className='text-xs p-2.5 rounded-xl bg-amber-50 text-amber-700 border border-amber-200';
    warn.innerHTML=`⚠️ <strong>${dog.name}'s vaccines expire in ${days} day${days!==1?'s':''}</strong> (${fmtDateShort(exp)}). Consider requesting updated records soon.`;
    warn.classList.remove('hidden');
    hideOverride();
    unlockDates();
  }else{
    warn.classList.add('hidden');
    hideOverride();
    unlockDates();
  }
}

const DRIVE_API = 'https://www.googleapis.com/';
async function findOrCreateFolder(name, parentId){
  // Check in-memory + localStorage cache first to avoid creating duplicate folders
  const cacheKey=(parentId||'root')+':'+name;
  if(_folderIdCache[cacheKey])return _folderIdCache[cacheKey];
  // Search Drive for an existing folder with this name under this parent
  const q=`mimeType='application/vnd.google-apps.folder' and name='${name}' and trashed=false${parentId?` and '${parentId}' in parents`:''}`;
  const r=await fetch(`${DRIVE_API}drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id)`,{
    headers:{Authorization:`Bearer ${driveToken}`}
  });
  const d=await r.json();
  let folderId=d.files&&d.files.length>0?d.files[0].id:null;
  if(!folderId){
    // Not found — create it
    const body={name,mimeType:'application/vnd.google-apps.folder'};
    if(parentId)body.parents=[parentId];
    const cr=await fetch(`${DRIVE_API}drive/v3/files`,{
      method:'POST',headers:{Authorization:`Bearer ${driveToken}`,'Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    const cd=await cr.json();
    folderId=cd.id;
  }
  // Cache the result so future calls skip the search entirely
  if(folderId){
    _folderIdCache[cacheKey]=folderId;
    try{localStorage.setItem('np_folder_cache',JSON.stringify(_folderIdCache));}catch(e){}
  }
  return folderId;
}
async function uploadToDriveFolder(file, folderPath){
  // folderPath = array of folder names starting from root, e.g. ["Nigel's Place","Dog Photos","Buddy"]
  // If nigelsDriveFolderId is set in Settings, pin directly to that folder instead of searching for "Nigel's Place"
  const rootId=(state.settings.nigelsDriveFolderId||'').trim();
  let parentId=null;
  let pathToWalk=folderPath;
  if(rootId&&folderPath[0]==="Nigel's Place"){parentId=rootId;pathToWalk=folderPath.slice(1);}
  for(const name of pathToWalk)parentId=await findOrCreateFolder(name,parentId);
  const timestamp=new Date().toISOString().split('T')[0];
  const safeName=`${timestamp}_${file.name}`;
  const meta=JSON.stringify({name:safeName,parents:[parentId]});
  const form=new FormData();
  form.append('metadata',new Blob([meta],{type:'application/json'}));
  form.append('file',file);
  const r=await fetch(`${DRIVE_API}upload/drive/v3/files?uploadType=multipart&fields=id,webViewLink,name`,{
    method:'POST',headers:{Authorization:`Bearer ${driveToken}`},body:form
  });
  const d=await r.json();
  if(d.error)throw new Error('Drive error: '+(d.error.message||JSON.stringify(d.error)));
  return d;
}
async function uploadVaccRecord(file, clientName){
  // Store under the existing Nigel's Place > Customer Relations > Client Vaccine Records structure
  return uploadToDriveFolder(file,["Nigel's Place",'Customer Relations','Client Vaccine Records',clientName]);

// Preferred models in order — auto-selects the first one available for this API key
const GEMINI_MODEL_PREFERENCE=['gemini-2.5-flash','gemini-2.5-pro','gemini-2.0-flash','gemini-2.0-flash-lite','gemini-1.5-flash-latest','gemini-1.5-pro-latest'];
let _cachedGeminiModel=null;
async function getGeminiModel(key){
  if(_cachedGeminiModel)return _cachedGeminiModel;
  try{
    const r=await fetch(`https://generativelanguage.googleapis.com/v1/models?key=${key}`);
    const d=await r.json();
    if(d.error)throw new Error(d.error.message);
    const available=new Set((d.models||[]).filter(m=>(m.supportedGenerationMethods||[]).includes('generateContent')).map(m=>m.name.split('/')[1]));
    for(const m of GEMINI_MODEL_PREFERENCE){if(available.has(m)){_cachedGeminiModel=m;return m;}}
    // Fallback: just use first available model that supports generateContent
    const first=[...(d.models||[])].find(m=>(m.supportedGenerationMethods||[]).includes('generateContent'));
    if(first){_cachedGeminiModel=first.name.split('/')[1];return _cachedGeminiModel;}
  }catch(e){console.warn('Could not auto-detect Gemini model:',e);}
  return 'gemini-2.0-flash'; // last resort default
}
async function parseVaccRecordWithGemini(file, knownVetName=''){
  const key=state.settings.geminiApiKey;
  if(!key)throw new Error('No Gemini API key set in Settings → paste your key from ai.google.dev');
  const model=await getGeminiModel(key);
  // Read file as base64
  const base64=await new Promise((res,rej)=>{
    const fr=new FileReader();
    fr.onload=e=>res(e.target.result.split(',')[1]);
    fr.onerror=rej;
    fr.readAsDataURL(file);
  });
  const mimeType=file.type||'application/pdf';
  const vetHint=knownVetName?`\nThe client's registered vet clinic is: "${knownVetName}". If you detect a clinic name/letterhead, note whether it matches.`:'';
  const prompt=`You are a veterinary records verification assistant. Analyze this document uploaded as a pet vaccine record.

STEP 1 — AUTHENTICITY CHECK:
Determine if this document appears to be an official veterinary record. Official records typically have:
- A veterinary clinic name, logo, or letterhead
- A licensed veterinarian's name or signature
- A formatted vaccine table (vaccine name, date administered, expiry/due date)
- A professional layout (not handwritten notes on plain paper)

STEP 2 — DATA EXTRACTION:
Extract every vaccine and its expiration date from the document.${vetHint}

Return ONLY valid JSON, no markdown, no explanation:
{
  "suspiciousDocument": false,
  "suspiciousReason": "",
  "clinicDetected": "name of clinic if found or empty string",
  "dogName": "dog name if visible or empty string",
  "vaccines": [{"name":"Rabies","expiry":"YYYY-MM-DD"},{"name":"Bordetella","expiry":"YYYY-MM-DD"}]
}

Set suspiciousDocument=true and fill suspiciousReason if:
- The document appears to be handwritten notes on plain paper with no clinic name
- No veterinary letterhead, logo, or professional formatting is visible
- The document looks like a personal reminder or informal note rather than an official record
- The document is clearly not a vet record at all (receipt, photo, random page, etc.)

Common vaccine names: Rabies, Bordetella, DHPP, DA2PP, Distemper, Parvo, Leptospirosis, Lyme, Canine Influenza.
Normalize names (e.g. DA2PP→DHPP). If only an administration date is visible (no expiry), estimate: Rabies=3 years, Bordetella=1 year, others=1 year.
If no expiry can be determined, omit the expiry field. Return an empty vaccines array if no vaccine info found.`;
  const body={contents:[{parts:[
    {inline_data:{mime_type:mimeType,data:base64}},
    {text:prompt}
  ]}]};
  // Try each model in preference order until one works (handles per-model quota issues)
  const modelsToTry=[model,...GEMINI_MODEL_PREFERENCE.filter(m=>m!==model)];
  for(const m of modelsToTry){
    const r=await fetch(`https://generativelanguage.googleapis.com/v1/models/${m}:generateContent?key=${key}`,{
      method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)
    });
    const d=await r.json();
    if(d.error&&d.error.code===429){
      console.warn(`Gemini quota hit on ${m}, trying next model...`);
      _cachedGeminiModel=null; // reset cache so next call re-detects
      continue;
    }
    if(d.error)throw new Error(`Gemini (${m}): ${d.error.message}`);
    _cachedGeminiModel=m; // cache the working model
    const text=d.candidates?.[0]?.content?.parts?.[0]?.text||'{}';
    const clean=text.replace(/```json?|```/g,'').trim();
    return JSON.parse(clean);
  }
  throw new Error('All Gemini models hit quota limits. Please try again in a minute.');
}
async function handleVaccUpload(clientId, dogId, altBtnId){

  const input=document.createElement('input');
  input.type='file';
  input.accept='image/*,application/pdf';
  input.style.display='none';

    input.onchange=async()=>{
      if(document.body.contains(input))document.body.removeChild(input);
      const file=input.files[0];
      if(!file){resolve();return;}
      // Initial client name lookup (for Drive folder path) — clientId/dogId are closed-over
      const initCl=clients.find(c=>c.id===clientId);
      if(!initCl){resolve();return;}
      const clientName=initCl.name; // capture name string — stable even if array refreshes

      showVaccOverlay('⏳ Preparing…');

      const btnId=altBtnId||`vbtn-${dogId}`;
      const btn=document.getElementById(btnId);
      if(btn){btn.disabled=true;btn.textContent='⏳';}
      try{
        // Step 3: Upload to Drive if we have a token
        // Save Drive link in a local var — don't mutate dog yet (it may become stale during Gemini await)
        let savedDriveLink='';
        if(state.mode==='live' && driveToken){
          try{
            updateVaccOverlay('📂 Saving record to Drive…');
            if(btn)btn.textContent='📂';
            const df=await uploadVaccRecord(file,clientName);
            savedDriveLink=df.webViewLink||'';
            // Clients just see a clean "saved" — no internal folder paths shown
            if(state.role!=='client')showToast('✅ Saved to Google Drive → Nigel\'s Place / Client Vaccine Records / '+clientName);
          }catch(e){
            showToast('⚠️ Drive save failed: '+e.message+' — continuing with AI scan.','#F97316');
            console.warn('Drive upload error:',e);
          }
        }
        // Step 4: Parse with Gemini
        updateVaccOverlay('🤖 Scanning with AI…\nReading vaccine records from your document.');
        if(btn)btn.textContent='🤖';
        // Pass vet name if saved on dog for authenticity cross-reference
        const freshDogForVet=(clients.find(c=>c.id===clientId))?.dogs.find(d=>d.id===dogId);
        const result=await parseVaccRecordWithGemini(file, freshDogForVet?.vetName||'');
        // ── Authenticity warning ─────────────────────────────────────────────
        if(result.suspiciousDocument){
          hideVaccOverlay();
          const proceed=confirm(`⚠️ Document looks unofficial\n\n${result.suspiciousReason||'This document does not appear to be an official veterinary record (no clinic letterhead or formatted vaccine table detected).'}\n\nHandwritten notes or personal documents are not accepted in place of official vet records.\n\nDo you still want to import these results? Nigel's Place may follow up to request an official copy.`);
          if(!proceed){
            if(btn){btn.disabled=false;btn.innerHTML='📄 Upload Records';}
            resolve();return;
          }
          showVaccOverlay('Importing results…');
        }
        if(result.vaccines&&result.vaccines.length>0){
          // Re-fetch fresh references — auto-refresh may have replaced all dog objects during the Gemini await
          const freshCl=clients.find(c=>c.id===clientId);
          const freshDog=freshCl?.dogs.find(d=>d.id===dogId);
          if(!freshDog||!freshCl){
            hideVaccOverlay();
            showToast('⚠️ Pet not found after scan — please reload and try again.','#EF4444');
            if(btn){btn.disabled=false;btn.innerHTML='📄 Upload Records';}
            resolve();return;
          }
          if(savedDriveLink)freshDog.driveFileLink=savedDriveLink;
          freshDog.vaccines=result.vaccines;
          const expDates=result.vaccines.filter(v=>v.expiry).map(v=>v.expiry).sort();
          if(expDates.length)freshDog.vaccExpiry=expDates[0];
          freshDog.vaccinated=true;
          hideVaccOverlay();
          render();
          showToast(`✅ ${result.vaccines.length} vaccine record${result.vaccines.length>1?'s':''} saved for ${freshDog.name}!`);
          // Clients write back via proxy (no direct sheet access); admins use persistClients
          if(state.role==='client'){
            try{
              await proxyClientWrite('updateDogVaccines',{
                dogId:freshDog.id,
                vaccines:freshDog.vaccines,
                vaccExpiry:freshDog.vaccExpiry||'',
                vaccinated:true,
                driveFileLink:freshDog.driveFileLink||''
              });
            }catch(e){console.warn('Vaccine proxy sync warning:',e.message);}
          }else{
            try{await persistClients();}catch(e){showToast('Parsed OK — sheet sync failed.','#F97316');}
          }
        }else{
          hideVaccOverlay();
          showToast('No vaccines found in that file. Try a clearer photo or PDF.','#F97316');
          if(btn){btn.disabled=false;btn.innerHTML='📄 Upload Records';}
        }
      }catch(err){
        hideVaccOverlay();
        showToast(`Error: ${err.message}`,'#EF4444');
        console.error('handleVaccUpload error:',err);
        if(btn){btn.disabled=false;btn.innerHTML='📄 Upload Records';}
      }
      resolve();
    };
    input.addEventListener('cancel',()=>{
      if(document.body.contains(input))document.body.removeChild(input);
      resolve();
    });
    input.click();
  });
}
// Per-vaccine-type upload: scans the file with Gemini, then only updates records
// for the specific vaccTypeName — all other types are left untouched.
async function handleVaccTypeUpload(clientId, dogId, vaccTypeName){
  // Step 1: Ensure Drive token (consolidated auth — no popup needed)
  await ensureDriveToken();
  // Step 2: Open file picker
  const input=document.createElement('input');
  input.type='file'; input.accept='image/*,application/pdf'; input.style.display='none';
  document.body.appendChild(input);
  input.onchange=async()=>{
    document.body.removeChild(input);
    const file=input.files[0]; if(!file)return;
    const initCl=clients.find(c=>c.id===clientId); if(!initCl)return;
    const clientName=initCl.name;
    const slug=vaccTypeSlug(vaccTypeName);
    const btn=document.getElementById(`vtbtn-${dogId}-${slug}`);
    if(btn){btn.disabled=true;btn.textContent='⏳';}
    showVaccOverlay(`⏳ Scanning for ${vaccTypeName} record…`);
    try{
      // Step 3: Upload to Drive (same folder as full-record upload)
      let savedDriveLink='';
      if(state.mode==='live' && driveToken){
        try{
          updateVaccOverlay('📂 Saving to Drive…');
          const df=await uploadVaccRecord(file,clientName);
          savedDriveLink=df.webViewLink||'';
          if(state.role!=='client')showToast('✅ Saved to Drive → Client Vaccine Records / '+clientName);
        }catch(e){showToast('⚠️ Drive save failed — continuing with scan.','#F97316');console.warn(e);}
      }
      // Step 4: Parse with Gemini (pass vet name for authenticity cross-reference)
      updateVaccOverlay(`🤖 Scanning with AI…\nLooking for ${vaccTypeName} record.`);
      const freshDogForVet=(clients.find(c=>c.id===clientId))?.dogs.find(d=>d.id===dogId);
      const result=await parseVaccRecordWithGemini(file, freshDogForVet?.vetName||'');
      // Authenticity check
      if(result.suspiciousDocument){
        hideVaccOverlay();
        const proceed=confirm(`⚠️ Document looks unofficial\n\n${result.suspiciousReason||'This document does not appear to be an official veterinary record.'}\n\nDo you still want to import the ${vaccTypeName} record?`);
        if(!proceed){if(btn){btn.disabled=false;btn.textContent=vaccTypeName;}return;}
        showVaccOverlay('Importing results…');
      }
      // Filter results to only records that match this vaccine type (case-insensitive partial match)
      const typeKey=vaccTypeName.trim().toLowerCase();
      const matched=(result.vaccines||[]).filter(v=>{
        const vn=(v.name||'').trim().toLowerCase();
        return vn.includes(typeKey)||typeKey.includes(vn)||vn===typeKey;
      });
      if(matched.length>0){
        // Re-fetch fresh dog reference (auto-refresh may have run during Gemini await)
        const freshCl=clients.find(c=>c.id===clientId);
        const freshDog=freshCl?.dogs.find(d=>d.id===dogId);
        if(!freshDog){showToast('Pet not found — please reload.','#EF4444');return;}
        // Merge: remove old records of this type, add newly parsed ones
        const typeKeep=(freshDog.vaccines||[]).filter(v=>{
          const vn=(v.name||'').trim().toLowerCase();
          return !vn.includes(typeKey)&&!typeKey.includes(vn)&&vn!==typeKey;
        });
        freshDog.vaccines=[...typeKeep,...matched];
        // Refresh the soonest-expiry summary field
        const allExp=freshDog.vaccines.filter(v=>v.expiry).map(v=>v.expiry).sort();
        if(allExp.length)freshDog.vaccExpiry=allExp[0];
        freshDog.vaccinated=true;
        if(savedDriveLink)freshDog.driveFileLink=savedDriveLink;
        hideVaccOverlay();
        render();
        showToast(`✅ Updated ${matched.length} ${vaccTypeName} record${matched.length>1?'s':''} for ${freshDog.name}!`);
        // Hint if other types were also found but ignored
        const otherFound=(result.vaccines||[]).length-matched.length;
        if(otherFound>0)showToast(`ℹ️ ${otherFound} other vaccine type${otherFound>1?'s':''} found in this file — use "Upload Record" to add them all.`,'#6B7280');
        try{await persistClients();}catch(e){showToast('Updated OK — sheet sync failed.','#F97316');}
      } else {
        hideVaccOverlay();
        const total=(result.vaccines||[]).length;
        if(total>0){
          showToast(`⚠️ Gemini found ${total} vaccine(s) but none matched "${vaccTypeName}". Try "Upload Record" to add all types found.`,'#F97316');
        } else {
          showToast(`No vaccine records found in that file.`,'#F97316');
        }
        const btnReset=document.getElementById(`vtbtn-${dogId}-${slug}`);
        if(btnReset){btnReset.disabled=false;btnReset.textContent='📄';}
      }
    }catch(err){
      hideVaccOverlay();
      showToast('Error: '+err.message,'#EF4444');
      console.error('handleVaccTypeUpload error:',err);
      const btnReset=document.getElementById(`vtbtn-${dogId}-${slug}`);
      if(btnReset){btnReset.disabled=false;btnReset.textContent='📄';}
    }
  };
  input.addEventListener('cancel',()=>{hideVaccOverlay();if(document.body.contains(input))document.body.removeChild(input);});
  input.click();
}

      const a=new Date(bCi+'T00:00:00'),b=new Date(bCo+'T00:00:00');
      const nights=Math.max(0,Math.round((b-a)/864e5));
      if(nights===0){showToast('Boarding check-out must be after check-in.','#EF4444');return;}
      // Capacity check for boarding nights
      for(let d=new Date(a);d<b;d.setDate(d.getDate()+1)){
        const ds=d.toISOString().split('T')[0];
        if(booksForDate(ds).length>=getEffectiveCap(ds)){showToast(`${fmtDate(ds)} is fully booked!`,'#EF4444');return;}
      }
      const bTotal=nights*boardingRate;
      bookings.push({id:nextId(bookings),clientId,dogId,dogName,clientName,
        checkIn:bCi,checkOut:bCo,nights,status:'confirmed',service:boardingSvc?.name||'Boarding',
        addons:'',price:bTotal});
      boardingBooked=true;
    }
    // Daycare portion: all entries in _dailySchedule
    const dcEntries=Object.entries(_dailySchedule);
    if(dcEntries.length>0){
      const dcDates=dcEntries.map(([ds])=>ds).sort();
      const dcFirst=dcDates[0],dcLast=dcDates[dcDates.length-1];
      // Capacity check for daycare days
      for(const ds of dcDates){
        if(booksForDate(ds).length>=getEffectiveCap(ds)){showToast(`${fmtDate(ds)} is fully booked!`,'#EF4444');return;}
      }
      let dcTotal=0;
      dcEntries.forEach(([,svcName])=>{dcTotal+=getServicePrice(svcName);});
      const dcSched=Object.fromEntries(dcEntries);
      const typeSet=[...new Set(Object.values(dcSched))];
      const dcSvc=typeSet.length===1?typeSet[0]:'Mixed';
      bookings.push({id:nextId(bookings),clientId,dogId,dogName,clientName,
        checkIn:dcFirst,checkOut:dcLast,nights:dcDates.length,status:'confirmed',
        service:dcSvc,dailySchedule:dcSched,addons:addonNames.join(','),price:dcTotal+addonTotal});
    } else if(boardingBooked){
      // No daycare days — attach add-ons to the boarding booking
      const lastBk=bookings[bookings.length-1];
      if(lastBk){lastBk.price+=addonTotal;lastBk.addons=addonNames.join(',');}
    }
    if(!boardingBooked&&dcEntries.length===0){showToast('Please add boarding dates and/or daycare days.','#EF4444');return;}
    state.showModal=null;render();
    const brdStr=boardingBooked?`boarding ${fmtDateShort(bCi)}–${fmtDateShort(bCo)}`:'';
    const dcStr=dcEntries.length>0?`+ ${dcEntries.length} daycare day${dcEntries.length===1?'':'s'}`:'';
    showToast(`🏡☀️ ${dogName} booked · ${[brdStr,dcStr].filter(Boolean).join(' ')}`);
    try{await persistBookings();if(state.role==='client')await persistClients();}
    catch(err){showToast('Saved locally; sheet sync failed.','#F97316');}
    return;
  }

  // ── DAYCARE SCHEDULED MODE ─────────────────────────────────────────────
  const ci=document.getElementById('bk-checkin')?.value;
  const co=document.getElementById('bk-checkout')?.value||ci;
  if(!ci){showToast('Please select a start date.','#EF4444');return;}
  if(co<ci){showToast('Last day must be on or after first day.','#EF4444');return;}
  if(Object.keys(_dailySchedule).length===0){showToast('Please set up your daily schedule.','#EF4444');return;}
  const days=nightsCount(ci,co);
  // Capacity check
  const a=new Date(ci+'T00:00:00'),b=new Date(co+'T00:00:00');
  for(let d=new Date(a);d<=b;d.setDate(d.getDate()+1)){
    const ds=d.toISOString().split('T')[0];
    if(booksForDate(ds).length>=getEffectiveCap(ds)){showToast(`${fmtDate(ds)} is fully booked!`,'#EF4444');return;}
  }
  // Per-day pricing using actual service prices from services array
  let perDayTotal=0;
  const typeSet=[...new Set(Object.values(_dailySchedule))];
  const svc=typeSet.length===1?typeSet[0]:'Mixed';
  Object.values(_dailySchedule).forEach(svcName=>{perDayTotal+=getServicePrice(svcName);});
  const totalPrice=perDayTotal+addonTotal;
  bookings.push({id:nextId(bookings),clientId,dogId,dogName,clientName,
    checkIn:ci,checkOut:co,nights:days,status:'confirmed',service:svc,
    dailySchedule:{..._dailySchedule},
    addons:addonNames.join(','),price:totalPrice});
  state.showModal=null;render();
  const dateStr=ci===co?fmtDate(ci):`${fmtDateShort(ci)} – ${fmtDateShort(co)} (${days} ${days===1?'day':'days'})`;
  showToast(`☀️ Booked ${dogName} · ${dateStr}!`);
  try{
    await persistBookings();
    if(state.role==='client')await persistClients();
  }catch(err){showToast('Saved locally; sheet sync failed.','#F97316');}
}

// ─── DELETE CLIENT ────────────────────────────────────────────────────────────
async function deleteClient(id){
  const cl=clients.find(c=>c.id===id);if(!cl)return;
  if(!confirm(`Archive and remove ${cl.name}? Their record + pets will be saved to the Archived tab so you can restore if needed. Their bookings will also be removed.`))return;
  // 1. Update memory immediately so the UI feels fast
  const idx=clients.findIndex(c=>c.id===id);
  if(idx>=0)clients.splice(idx,1);
  bookings.splice(0,bookings.length,...bookings.filter(b=>b.clientId!==id));
  render();
  showToast('Archiving…');
  try{
    // 2. Archive to sheet FIRST (so data is preserved before any writes)
    await archiveClientToSheet(cl);
    // 3. Persist updated clients/dogs and bookings (write-first, then clear excess)
    await persistClients();
    await persistBookings();
    // 4. Re-read from the sheet to verify ground truth matches memory
    //    This catches any partial failures and keeps the UI in sync with reality
    await loadAllData();
    render();
    showToast(`${cl.name} archived & removed. ✓`);
  }catch(e){
    // Something failed — reload from sheet to restore a consistent state
    showToast('Sync error — reloading from sheet…','#F97316');
    try{await loadAllData();render();}catch(e2){}
    showToast('Reload complete. Check the Clients list.','#F97316');
    console.error('[PawDesk] deleteClient failed:',e);
  }
}

async function submitInvoice(e){

  const cl=clients.find(c=>c.id===cId);
  const amount=parseFloat(document.getElementById('inv-amount')?.value)||0;
  const invType=document.getElementById('inv-type')?.value||'send';
  const paid=0; // Square paid always starts at 0 on a new invoice — use 🔄 Sync after payment arrives
  const externalPaid=invType==='manual'?(parseFloat(document.getElementById('inv-external-paid')?.value)||0):0;
  const paymentNote=invType==='manual'?(document.getElementById('inv-payment-note')?.value?.trim()||''):'';

// ═══════════════════════════════════════════════════
//  FULLSCREEN TOGGLE
// ═══════════════════════════════════════════════════
// SVG icons for enter / exit fullscreen (inline so they render instantly)
const _FS_ENTER=`<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" width="15" height="15" stroke-linecap="round" stroke-linejoin="round"><path d="M1.5 6V2h4M14.5 6V2h-4M1.5 10v4h4M14.5 10v4h-4"/></svg>`;
const _FS_EXIT =`<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" width="15" height="15" stroke-linecap="round" stroke-linejoin="round"><path d="M5.5 1.5v4h-4M10.5 1.5v4h4M5.5 14.5v-4h-4M10.5 14.5v-4h4"/></svg>`;
// ─── iOS CSS-based pseudo-fullscreen ─────────────────────────────────────────
// iOS Safari does not support the Fullscreen API. Instead we inject a class
// that pins the element to cover the full viewport with position:fixed.
let _iosFsEl=null;
function _iosEnterFs(el){
  _iosFsEl=el;
  el.dataset._origStyle=el.style.cssText;
  el.style.cssText+=';position:fixed!important;inset:0!important;width:100vw!important;height:100vh!important;z-index:99999!important;overflow:hidden!important;';
  document.body.style.overflow='hidden';
  _syncFsBtns(true);
}
function _iosExitFs(){
  if(_iosFsEl){
    _iosFsEl.style.cssText=_iosFsEl.dataset._origStyle||'';
    _iosFsEl=null;
    document.body.style.overflow='';
  }
  _syncFsBtns(false);
}
function _syncFsBtns(inFs){
  document.querySelectorAll('[data-fs-btn]').forEach(btn=>{
    btn.innerHTML=(inFs?_FS_EXIT:_FS_ENTER)+(btn.dataset.fsBtnLabel?' '+(inFs?'Exit fullscreen':'Fullscreen'):'');
    btn.title=inFs?'Exit fullscreen  (Esc)':'Go fullscreen';
  });
}
function _fsApiAvailable(){
  return !!(document.fullscreenEnabled||document.webkitFullscreenEnabled||document.mozFullScreenEnabled||document.msFullscreenEnabled);
}
function _requestFs(el){
  if(el.requestFullscreen)return el.requestFullscreen();
  if(el.webkitRequestFullscreen)return el.webkitRequestFullscreen();
  if(el.mozRequestFullScreen)return el.mozRequestFullScreen();
  if(el.msRequestFullscreen)return el.msRequestFullscreen();
  return Promise.reject(new Error('no_api'));
}
function _exitFs(){
  if(document.exitFullscreen)return document.exitFullscreen();
  if(document.webkitExitFullscreen)return document.webkitExitFullscreen();
  if(document.mozCancelFullScreen)return document.mozCancelFullScreen();
  if(document.msExitFullscreen)return document.msExitFullscreen();
  return Promise.resolve();
}
function _inNativeFs(){
  return !!(document.fullscreenElement||document.webkitFullscreenElement||document.mozFullScreenElement||document.msFullscreenElement);
}
function toggleFullscreen(){
  if(_iosFsEl){_iosExitFs();return;} // iOS CSS-fs active — close it
  if(_inNativeFs()){_exitFs();return;}
  const el=document.documentElement;
  if(_fsApiAvailable()){
    _requestFs(el).catch(()=>{
      // API exists but blocked (e.g. iframe) — fall back to CSS
      _iosEnterFs(el);
    });
  }else{
    // iOS Safari / no Fullscreen API — CSS fallback
    _iosEnterFs(el);
  }
}
// Kiosk-specific fullscreen — targets the kiosk root div, not the whole document.
function toggleKioskFullscreen(){
  if(_iosFsEl){_iosExitFs();return;}
  if(_inNativeFs()){_exitFs();return;}
  const el=document.getElementById('kiosk-root')||document.documentElement;
  if(_fsApiAvailable()){
    _requestFs(el).catch(()=>_iosEnterFs(el));
  }else{
    _iosEnterFs(el);
  }
}
// Keep every fullscreen button icon in sync whenever native fullscreen state changes
document.addEventListener('fullscreenchange',()=>_syncFsBtns(_inNativeFs()));
document.addEventListener('webkitfullscreenchange',()=>_syncFsBtns(_inNativeFs()));
// Esc key exits iOS CSS-fs too
document.addEventListener('keydown',(e)=>{if(e.key==='Escape'&&_iosFsEl)_iosExitFs();});

// ─── Square Payment Sync ──────────────────────────────────────────────────────
async function syncSquarePayments(invoiceId){
  const inv=invoices.find(i=>i.id===invoiceId);if(!inv)return;
  const apiKey=state.settings.squareApiKey;
  if(!apiKey){showToast('Add your Square API key in Settings first','#F97316');return;}
  const cl=clients.find(c=>c.id===inv.clientId);if(!cl){showToast('Client not found','#EF4444');return;}
  showToast('Syncing from Square…','#0EA5E9');
  try{
    // Step 1: find Square customer by email
    const searchResp=await fetch('https://connect.squareup.com/v2/customers/search',{
      method:'POST',
      headers:{'Authorization':`Bearer ${apiKey}`,'Content-Type':'application/json','Square-Version':'2024-01-18'},
      body:JSON.stringify({query:{filter:{email_address:{exact:cl.email}}}})
    });
    if(!searchResp.ok)throw new Error(`Square search: ${searchResp.status}`);
    const searchData=await searchResp.json();
    const customers=searchData.customers||[];
    if(!customers.length){showToast(`No Square customer found for ${cl.email}`,'#F97316');return;}
    const customerId=customers[0].id;
    // Step 2: get completed payments for this customer
    const payResp=await fetch(`https://connect.squareup.com/v2/payments?customer_id=${customerId}&sort_order=DESC&limit=50`,{
      headers:{'Authorization':`Bearer ${apiKey}`,'Square-Version':'2024-01-18'}
    });
    if(!payResp.ok)throw new Error(`Square payments: ${payResp.status}`);
    const payData=await payResp.json();
    const completed=(payData.payments||[]).filter(p=>p.status==='COMPLETED');
    const totalPaidCents=completed.reduce((s,p)=>s+(p.total_money?.amount||0),0);
    const squarePaid=totalPaidCents/100;
    // Update invoice
    inv.paid=squarePaid;
    const totalReceived=squarePaid+(inv.externalPaid||0);
    if(totalReceived>=inv.amount)inv.status='paid';
    else if(totalReceived>0)inv.status='partial';
    else if(inv.dueDate&&inv.dueDate<TODAY)inv.status='overdue';
    else inv.status='unpaid';
    // Update the input field live if modal is still open
    const el=document.getElementById('einv-paid');if(el)el.value=squarePaid.toFixed(2);
    render();
    try{await persistInvoices();}catch(e){}
    showToast(`Square sync: $${squarePaid.toFixed(2)} found across ${completed.length} payment${completed.length===1?'':'s'}`);
  }catch(err){
    showToast('Square sync failed: '+err.message,'#EF4444');
  }
}

async function confirmClientCancel(bookingId){
  const b=bookings.find(bk=>bk.id===bookingId||bk.id==bookingId);
  if(!b)return;
  b.status='cancelled';
  const ov=document.getElementById('np-client-cancel-confirm');
  if(ov)ov.remove();
  render();
  try{
    // Client role: write through proxy since their token can't edit the sheet directly
    if((state.role==='client'||state.role==='onboarding')&&state.mode==='live'){
      await proxyClientWrite('cancelBooking',{bookingId:String(b.id)});
    }else{
      await persistBookings();
    }
    showToast('Booking cancelled');
  }catch(e){
    showToast('Cancelled locally — sync failed','#F97316');
  }
}

// Read a Sheets range using a public API key (no OAuth — works 24/7 on the lobby tablet)
async function readRangeWithApiKey(range){
  const key=CONFIG.KIOSK_API_KEY;const sheetId=CONFIG.SHEET_ID;
  if(!key||!sheetId)throw new Error('KIOSK_API_KEY or SHEET_ID not set in CONFIG');
  const url=`${CONFIG.API_BASE}/${sheetId}/values/${encodeURIComponent(range)}?key=${encodeURIComponent(key)}`;
  const r=await fetch(url);const d=await r.json();
  if(d.error)throw new Error('Sheets API: '+(d.error.message||JSON.stringify(d.error)));
  return d.values||[];
}
let _kioskRefreshTimer=null,_kioskClockTimer=null;
async function loadKioskData(){
  const today=new Date().toISOString().split('T')[0];
  try{
    const[bR,dR,cR]=await Promise.all([
      readRangeWithApiKey('Bookings!A2:L'),
      readRangeWithApiKey('Dogs!A2:M'),
      readRangeWithApiKey('Clients!A2:E'),
    ]);
    const dogMap={};(dR||[]).forEach(r=>{if(r[0])dogMap[+r[0]]={name:r[2]||'',breed:r[3]||'',photoLink:r[11]||''};});
    const clientMap={};(cR||[]).forEach(r=>{if(r[0])clientMap[+r[0]]=r[1]||'';});
    state.kioskDogs=(bR||[]).filter(r=>{
      if(!r[0])return false;
      const ci=r[5]||'',co=r[6]||ci;
      return ci&&co&&ci<=today&&today<=co&&(r[8]||'').toLowerCase()!=='cancelled';
    }).map(r=>({
      dogId:+r[2],dogName:r[3]||(dogMap[+r[2]]?.name)||'Unknown',
      breed:dogMap[+r[2]]?.breed||'',clientName:r[4]||(clientMap[+r[1]])||'',
      checkIn:sheetDateStr(r[5]),checkOut:sheetDateStr(r[6]),
    }));
    // De-duplicate today's dogs (same dog may have multiple bookings)
    const seen=new Set();state.kioskDogs=state.kioskDogs.filter(d=>{if(seen.has(d.dogId))return false;seen.add(d.dogId);return true;});
    // Also capture upcoming 7 days (arrivals and departures)
    const next7=new Date();next7.setDate(next7.getDate()+7);
    const sevenStr=next7.toISOString().split('T')[0];
    state.kioskUpcoming=(bR||[]).filter(r=>{
      if(!r[0])return false;
      const ci=sheetDateStr(r[5])||'',co=sheetDateStr(r[6])||ci,status=(r[8]||'').toLowerCase();
      return status!=='cancelled'&&ci&&((ci>today&&ci<=sevenStr)||(co>today&&co<=sevenStr));
    }).map(r=>({
      dogId:+r[2],dogName:r[3]||(dogMap[+r[2]]?.name)||'Unknown',
      breed:dogMap[+r[2]]?.breed||'',clientName:r[4]||(clientMap[+r[1]])||'',
      checkIn:sheetDateStr(r[5]),checkOut:sheetDateStr(r[6])||sheetDateStr(r[5]),
    }));
    lastSynced=Date.now();
    render();
    const el=document.getElementById('kiosk-sync');if(el)el.textContent='✓ Updated '+new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  }catch(e){
    console.error('Kiosk data load failed:',e);
    const el=document.getElementById('kiosk-sync');if(el)el.textContent='⚠️ '+e.message;
  }
}
function startKioskTimers(){
  if(!_kioskClockTimer){
    _kioskClockTimer=setInterval(()=>{const el=document.getElementById('kiosk-clock');if(el)el.textContent=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});},1000);
  }
  if(!_kioskRefreshTimer){
    _kioskRefreshTimer=setInterval(loadKioskData,5*60*1000); // refresh every 5 min
  }
}

function buildKioskView(adminPreview=false){

      .filter((d,i,a)=>a.findIndex(x=>x.dogId===d.dogId)===i)

    ?bookings.filter(b=>b.status!=='cancelled'&&b.checkIn&&((b.checkIn>today&&b.checkIn<=sevenStr)||(b.checkOut>today&&b.checkOut<=sevenStr)))
      .map(b=>({dogId:b.dogId,dogName:b.dogName||'?',breed:'',clientName:b.clientName||'',checkIn:b.checkIn,checkOut:b.checkOut||b.checkIn}))
    :state.kioskUpcoming||[];
  // Build day-by-day upcoming schedule for next 7 days

  for(let i=1;i<=7;i++){

    :'position:fixed;inset:0;background:linear-gradient(135deg,#3d1a08,#5C3317,#3d1a08);overflow:auto;';

      <div style="display:flex;align-items:center;gap:1rem;">

        <div>
          <div style="color:white;font-size:${adminPreview?'1.25rem':'1.6rem'};font-weight:800;letter-spacing:-0.5px;">${state.settings.businessName||"Nigel's Place"}</div>
          <div style="color:rgba(255,200,100,0.7);font-size:0.8rem;margin-top:2px;">${dateStr}</div>
        </div>
      </div>
      <div style="text-align:right;">
        <div id="kiosk-clock" style="color:white;font-size:${adminPreview?'1.8rem':'3rem'};font-weight:200;letter-spacing:3px;font-variant-numeric:tabular-nums;">${timeStr}</div>
      </div>
    </div>
    <!-- Two-column body: today's guests + upcoming week -->
    <div style="flex:1;display:flex;overflow:hidden;">

    document.getElementById('app').innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#3d1a08;color:white;font-family:sans-serif;text-align:center;padding:2rem;">
      <div style="font-size:3rem;margin-bottom:1rem;">⚙️</div>
      <div style="font-size:1.4rem;font-weight:700;margin-bottom:.75rem;">Kiosk Not Configured</div>
      <div style="color:rgba(255,255,255,.5);max-width:420px;line-height:1.6;">Set <code>KIOSK_API_KEY</code> and ensure <code>SHEET_ID</code> are filled in the CONFIG section of the HTML file. Then share your Google Sheet as "Anyone with link can view".</div>
    </div>`;
  }else{
    state.role='kiosk';
    render();
    startKioskTimers();
    loadKioskData();
  }
}else{
  // If we have a cached token (valid) or a saved email (will try silent),
  // show a loading screen immediately so the user never sees a login flash.
  const _preTok=localStorage.getItem('np_access_token');
  const _preExp=parseInt(localStorage.getItem('np_token_expiry')||'0');
  const _preEmail=localStorage.getItem('np_email');
  if((_preTok&&_preExp>Date.now()&&_preEmail)||_preEmail){
    state.isLoading=true;
    state.loadingMsg='Signing you in...';
    // Safety net — mobile browsers sometimes block the silent sign-in without
    // ever firing the onToken callback, leaving the loader stuck forever.
    // Cancelled immediately inside onToken() if the callback fires normally.
    // Only triggers (10 s) when the browser truly swallows the auth callback.
    _safetyNetTimer=setTimeout(()=>{
      _safetyNetTimer=null;
      if(state.isLoading){
        state.isLoading=false;
        render();
      }
    },10000);
  }
  initGoogleAuth();
  render();
}
</script>
</body>
</html>
