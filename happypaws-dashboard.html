// Returns the "What's New" entries the client hasn't seen yet
function getUnseenChangelog(email){
  let storedVer=0;
  try{storedVer=parseInt(localStorage.getItem(`np_profile_v_${email}`)||'0');}catch(e){}
  const unseen=[];
  for(let v=storedVer+1;v<=APP_PROFILE_VERSION;v++){
    if(PROFILE_CHANGELOG[v])unseen.push({version:v,...PROFILE_CHANGELOG[v]});
  }
  return unseen;
}
function markChangelogSeen(email){
  try{localStorage.setItem(`np_profile_v_${email}`,String(APP_PROFILE_VERSION));}catch(e){}
}
// Checks whether a client's profile has all currently-required fields filled
function profileRequiredFieldsMissing(cl){
  if(!cl)return[];
  const missing=[];
  const activeDogs=(cl.dogs||[]).filter(d=>!d.deceased);
  if(activeDogs.length>0){
    const dogsWithNoVet=activeDogs.filter(d=>!d.vetName||!d.vetName.trim());
    if(dogsWithNoVet.length>0){
      missing.push({
        field:'vetName',
        label:'Veterinary clinic not on file',
        detail:`${dogsWithNoVet.map(d=>d.name).join(', ')} need${dogsWithNoVet.length===1?'s':''} a verified vet clinic before booking can be unlocked.`,
        action:'mydog',
        actionLabel:'Go to My Pet →',
      });
    }
  }
  return missing;
}

// Use local date components — toISOString() is UTC and shifts the date for US evening timezones
const _tNow=new Date();

// Convert a Google Sheets date value to a YYYY-MM-DD string.
// UNFORMATTED_VALUE returns dates as serial numbers (days since Dec 30 1899).
// If v is already a string that looks like a date, return it as-is.
function sheetDateStr(v){
  if(v===null||v===undefined||v==='')return'';
  if(typeof v==='number'){
    // Sheets serial: days since Dec 30, 1899; convert to YYYY-MM-DD
    const d=new Date(Math.round((v-25569)*864e5));
    return d.toISOString().split('T')[0];
  }
  return String(v);
}

function sheetsDateStr(val){

// Vaccine helpers
function vaccDaysLeft(expiry){
  if(!expiry)return null;
  return Math.round((new Date(expiry+'T00:00:00')-new Date(TODAY+'T00:00:00'))/864e5);
}
// Returns one entry per vaccine TYPE — the one with the latest (highest) expiry date.
function getLatestVaccsByType(dog){
  const vx=dog.vaccines||[];
  const map={};
  vx.forEach(v=>{
    const k=(v.name||'Unknown').trim();
    if(!map[k]||(v.expiry||'0000')>(map[k].expiry||'0000'))map[k]=v;
  });
  return Object.values(map);
}
function vaccStatus(dog){
  const latest=getLatestVaccsByType(dog);
  if(!latest.length){return dog.vaccinated?'ok':'none';}
  let worst='ok';
  for(const v of latest){
    const d=vaccDaysLeft(v.expiry);
    if(d===null)continue;
    if(d<0){worst='expired';break;}
    if(d<=60&&worst==='ok')worst='expiring';
  }
  return worst;
}

// NOTE: must use !== undefined check, NOT ||, because 0 (blocked/closed) is a valid override value
function getEffectiveCap(ds){

  return v!==undefined?v:state.settings.dailyCapacity;
}

  return`<span class="inline-block text-xs px-2.5 py-0.5 rounded-full bg-gray-100 text-gray-500">No vaccine records</span>`;
}
// Returns true if dog has current (non-expired) records for ALL required vaccines.
// If requiredVaccines list is empty, falls back to the generic vaccStatus check.
function hasRequiredVaccines(dog){
  // Admin vaccine override: if set and not yet expired, bypass all vaccine checks.
  if(dog.vaccOverride){
    try{
      const ov=JSON.parse(dog.vaccOverride);
      if(ov&&ov.until){
        if(ov.until==='indefinite')return true;
        if(String(ov.until)>=TODAY)return true; // extended until a future date
      }
    }catch(e){}
  }
  const required=state.settings.requiredVaccines||[];
  if(!required.length)return vaccStatus(dog)==='ok';
  const latest=getLatestVaccsByType(dog);
  // Map vaccine names lowercased for case-insensitive matching
  const latestMap={};
  latest.forEach(v=>{latestMap[(v.name||'').toLowerCase().trim()]=v;});
  for(const req of required){
    const match=latestMap[req.toLowerCase().trim()];
    if(!match)return false; // missing this vaccine
    const days=vaccDaysLeft(match.expiry);
    if(days!==null&&days<0)return false; // expired
  }
  return true;
}
// Returns true if ANY of the client's active dogs are missing required vaccines.
function clientHasVaccineIssue(cl){
  if(!cl)return false;
  const activeDogs=(cl.dogs||[]).filter(d=>!d.deceased);
  if(!activeDogs.length)return false; // no dogs = no issue (but onboarding checklist handles this)
  return activeDogs.some(d=>!hasRequiredVaccines(d));
}

async function initVetAutocomplete(nameInputId, phoneInputId, websiteDisplayId){

// Google Places Text Search (New API) — more reliable than Gemini for real business lookups
async function lookupVetWithPlacesAPI(vetName, apiKey){
  if(!vetName||!apiKey)return null;
  try{
    const r=await fetch('https://places.googleapis.com/v1/places:searchText',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'X-Goog-Api-Key':apiKey,
        'X-Goog-FieldMask':'places.displayName,places.formattedAddress,places.nationalPhoneNumber,places.websiteUri'
      },
      body:JSON.stringify({textQuery:vetName+' veterinarian',maxResultCount:1})
    });
    const d=await r.json();
    if(d.error||!d.places||!d.places[0])return null;
    const p=d.places[0];
    return{
      found:true,
      name:p.displayName?.text||vetName,
      phone:p.nationalPhoneNumber||'',
      website:p.websiteUri||'',
      city:p.formattedAddress||''
    };
  }catch(e){console.warn('[PawDesk] Places text search failed:',e);return null;}
}
// Gemini fallback: given a free-text vet name, look up phone + website
// NOTE: Gemini is a language model — it may not know specific local clinic phone numbers.
// It works best for large regional chains. Use lookupVetWithPlacesAPI when a Maps key exists.
async function lookupVetWithGemini(vetName){
  const key=state.settings.geminiApiKey;
  if(!key||!vetName.trim())return null;
  try{
    const model=await getGeminiModel(key);
    const prompt=`You are a veterinary clinic directory assistant. If you have confident knowledge of the following veterinary clinic's real phone number, return ONLY valid JSON with no markdown:
{"name":"official clinic name","phone":"xxx-xxx-xxxx","website":"https://...","city":"city, state","found":true}
If you do NOT have confident, accurate knowledge of this specific clinic's contact info (e.g. it is a small local clinic you may not have data for), return: {"found":false}
Do NOT guess or hallucinate phone numbers. Only return found:true if you are highly confident.
Clinic to look up: "${vetName.replace(/"/g,'\\"')}"`;
    const r=await fetch(`https://generativelanguage.googleapis.com/v1/models/${model}:generateContent?key=${key}`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})
    });
    const d=await r.json();
    if(d.error)return null;
    const text=d.candidates?.[0]?.content?.parts?.[0]?.text||'{}';
    const clean=text.replace(/```json?|```/g,'').trim();
    const result=JSON.parse(clean);
    return result.found?result:null;
  }catch(e){console.warn('[PawDesk] Gemini vet lookup failed:',e);return null;}
}

// Lightweight fingerprint — catches additions, removals, status changes,
// and booking date changes without full JSON serialisation.
function dataFingerprint(){
  const bk=bookings.map(b=>b.id+':'+( b.status||'')+':'+(b.date||b.checkIn||'')).join(',');
  const cl=clients.map(c=>c.id+':'+(c.name||'')).join(',');
  const iv=invoices.map(i=>i.id+':'+(i.status||'')).join(',');
  const pk=packages.map(p=>p.id+':'+(p.remaining??'')).join(',');
  return `${clients.length}|${bookings.length}|${invoices.length}|${packages.length}||${bk}||${cl}||${iv}||${pk}`;
}

function startAutoRefresh(){
  if(autoRefreshTimer)clearInterval(autoRefreshTimer);
  autoRefreshTimer=setInterval(silentRefresh,60000);
}

async function silentRefresh(){
  if(state.mode!=='live'||state.isLoading)return;
  try{
    // Clients can't read the private sheet directly — use the proxy instead.
    // This prevents loadAllData() from wiping local client state on a 403.
    if(state.role==='client'){
      await loadClientDataViaProxy();
      const fp=dataFingerprint();
      if(fp===_lastDataFingerprint)return;
      _lastDataFingerprint=fp;
      render(); // silently apply — clients don't need a countdown pill
      return;
    }
    await loadAllData();
    lastSynced=Date.now();
    const fp=dataFingerprint();
    if(fp===_lastDataFingerprint)return; // nothing changed — no render, no flash
    _lastDataFingerprint=fp;

    if(state.role==='kiosk'){
      renderWithFade();           // Layer 3: soft crossfade for kiosk live board
    }else if(state.role==='admin'){
      showUpdatePill();           // Layer 2: unobtrusive pill for admin
    }else{
      render();
    }
  }catch(e){/* silent */}
}

// Cache Drive image blob URLs by fileId — avoids re-fetching on every render()
const _driveImgCache={};
// Build an <img> tag for a Drive-stored image. Accepts raw file IDs or webViewLinks.
// Renders immediately if already cached; otherwise shows placeholder and loads async via hydrateImages().
function driveImgTag(link,cssClass,alt='',extraStyle=''){
  if(!link)return'';
  // Extract Drive file ID from various link formats, or use raw ID directly
  let fileId=null;
  if(/^[A-Za-z0-9_-]{25,60}$/.test(link))fileId=link;                // bare file ID
  else{const m=link.match(/\/d\/([A-Za-z0-9_-]{25,60})/);if(m)fileId=m[1];}  // webViewLink
  if(fileId){
    const src=_driveImgCache[fileId]||'';
    // Merge extraStyle with the display:none for uncached images
    const styleAttr=src?(extraStyle?` style="${extraStyle}"`:''): ` style="display:none${extraStyle?';'+extraStyle:''}"`;
    return`<img data-driveid="${fileId}" src="${src}" alt="${alt||''}" class="${cssClass}"${styleAttr} onerror="this.style.display='none'">`;
  }
  // Non-Drive URL (legacy or external) — render directly
  const styleAttr=extraStyle?` style="${extraStyle}"`:''
  return`<img src="${link}" alt="${alt||''}" class="${cssClass}"${styleAttr} onerror="this.style.display='none'">`;
}
// Fetch Drive image content using the current access token and cache as blob URLs.
// Called after every render() so new images appear without a full page reload.
async function hydrateImages(){
  if(!state.accessToken)return;
  const imgs=[...document.querySelectorAll('img[data-driveid]')];
  const needed=[...new Set(imgs.map(i=>i.dataset.driveid).filter(id=>id&&!_driveImgCache[id]))];
  if(!needed.length)return;
  await Promise.all(needed.map(async fileId=>{
    try{
      const r=await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,
        {headers:{Authorization:`Bearer ${state.accessToken}`}});
      if(!r.ok)return;
      const blob=await r.blob();
      if(!blob.type.startsWith('image/'))return;
      _driveImgCache[fileId]=URL.createObjectURL(blob);
      // Patch every img with this fileId currently in the DOM
      document.querySelectorAll(`img[data-driveid="${fileId}"]`).forEach(img=>{
        img.src=_driveImgCache[fileId];img.style.display='';
      });
    }catch(e){console.warn('Drive image hydration failed:',fileId,e);}
  }));
}
// ─── Image Compression ───────────────────────────────────────────────────────
// Shrinks a photo file before uploading to Drive — faster upload, less storage,
// snappier display. Returns a JPEG File. Falls back to original on any error.
async function compressImage(file, maxPx=800, quality=0.82){
  return new Promise(resolve=>{
    const url=URL.createObjectURL(file);
    const img=new Image();
    img.onload=()=>{
      URL.revokeObjectURL(url);
      let w=img.naturalWidth,h=img.naturalHeight;
      if(w>maxPx||h>maxPx){if(w>h){h=Math.round(h*maxPx/w);w=maxPx;}else{w=Math.round(w*maxPx/h);h=maxPx;}}
      const canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      canvas.toBlob(blob=>{
        if(!blob){resolve(file);return;}
        resolve(new File([blob],file.name.replace(/\.[^.]+$/,'')+'.jpg',{type:'image/jpeg',lastModified:Date.now()}));
      },'image/jpeg',quality);
    };
    img.onerror=()=>{URL.revokeObjectURL(url);resolve(file);};
    img.src=url;
  });
}

      const reposBtn=mkLbBtn('↔ Reposition','rgba(255,255,255,0.12)','rgba(255,255,255,0.25)');
      const saveBtn=mkLbBtn('✓ Save Position','#7B4015','#6A3511');
      saveBtn.style.display='none';

      let reposMode=false;
      let dragging=false;
      let dragStart={x:0,y:0,ox:50,oy:50};

      const startDrag=e=>{
        if(!reposMode)return;
        e.preventDefault();
        dragging=true;
        const pt=e.touches?e.touches[0]:e;
        dragStart={x:pt.clientX,y:pt.clientY,ox:cur.x,oy:cur.y};
        img.style.cursor='grabbing';
      };
      const moveDrag=e=>{
        if(!dragging)return;
        e.preventDefault();
        const pt=e.touches?e.touches[0]:e;
        // Dragging the photo: move in drag direction → focal point follows cursor
        const dx=(pt.clientX-dragStart.x)/CIRCLE*80;
        const dy=(pt.clientY-dragStart.y)/CIRCLE*80;
        cur.x=Math.max(0,Math.min(100,dragStart.ox-dx));
        cur.y=Math.max(0,Math.min(100,dragStart.oy-dy));
        img.style.objectPosition=`${cur.x}% ${cur.y}%`;
      };
      const endDrag=()=>{dragging=false;if(reposMode)img.style.cursor='grab';};

      img.addEventListener('mousedown',startDrag);
      img.addEventListener('touchstart',startDrag,{passive:false});
      document.addEventListener('mousemove',moveDrag);
      document.addEventListener('touchmove',moveDrag,{passive:false});
      document.addEventListener('mouseup',endDrag);
      document.addEventListener('touchend',endDrag);

      reposBtn.onclick=()=>{
        reposMode=!reposMode;
        if(reposMode){
          reposBtn.textContent='✕ Cancel Reposition';
          reposBtn.style.background='rgba(195,148,42,0.35)';
          reposBtn.style.borderColor='#C4952A';
          img.style.cursor='grab';
          hint.style.display='block';
          saveBtn.style.display='inline-block';
        }else{
          reposBtn.textContent='↔ Reposition';
          reposBtn.style.background='rgba(255,255,255,0.12)';
          reposBtn.style.borderColor='rgba(255,255,255,0.25)';
          img.style.cursor='default';
          hint.style.display='none';
          saveBtn.style.display='none';
          // Revert to saved offset
          cur={...( dog.photoOffset||{x:50,y:50})};
          img.style.objectPosition=`${cur.x}% ${cur.y}%`;
        }
      };

      saveBtn.onclick=async()=>{
        dog.photoOffset={...cur};
        // Clean up listeners before closing
        document.removeEventListener('mousemove',moveDrag);
        document.removeEventListener('touchmove',moveDrag);
        document.removeEventListener('mouseup',endDrag);
        document.removeEventListener('touchend',endDrag);
        ov.remove();
        render();
        try{await persistClients();showToast(`📸 ${dog.name}'s photo repositioned!`);}
        catch(e){showToast('Saved locally; sheet sync failed.','#F97316');}
      };

      // Clean up listeners when overlay closes any other way
      ov.addEventListener('click',()=>{
        document.removeEventListener('mousemove',moveDrag);
        document.removeEventListener('touchmove',moveDrag);
        document.removeEventListener('mouseup',endDrag);
        document.removeEventListener('touchend',endDrag);
      });

      btnRow.appendChild(replaceBtn);
      btnRow.appendChild(reposBtn);
      btnRow.appendChild(saveBtn);
      wrap.appendChild(circleWrap);
      wrap.appendChild(nameLbl);
      wrap.appendChild(hint);
      wrap.appendChild(btnRow);
    }else{
      // Client / no-photo fallback — view only
      wrap.appendChild(circleWrap);
      if(name){wrap.appendChild(nameLbl);}
    }
  }else{
    // No photo — admin sees upload prompt
    const fallback=document.createElement('div');
    fallback.style.cssText=`width:${CIRCLE}px;height:${CIRCLE}px;border-radius:50%;background:rgba(255,255,255,0.06);border:4px solid rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;font-size:4rem;`;
    fallback.textContent='🐾';
    circleWrap.appendChild(fallback);
    wrap.appendChild(circleWrap);
    if(name){
      const nameLbl=document.createElement('div');
      nameLbl.style.cssText='color:#fff;font-size:1.4rem;font-weight:700;text-align:center;';
      nameLbl.textContent=name;
      wrap.appendChild(nameLbl);
    }
    if(isAdmin&&dog){
      const uploadBtn=mkLbBtn('📸 Upload Photo','rgba(255,255,255,0.12)','rgba(255,255,255,0.25)');
      uploadBtn.onclick=()=>{ov.remove();handleDogPhotoUpload(clientId,dogId);};
      const uploadRow=document.createElement('div');uploadRow.appendChild(uploadBtn);
      wrap.appendChild(uploadRow);
    }
  }

  // ── Close button ──────────────────────────────────────────────────────────
  const closeBtn=mkLbBtn('✕  Close','rgba(255,255,255,0.08)','rgba(255,255,255,0.15)');
  closeBtn.onclick=()=>{
    document.removeEventListener('mousemove',()=>{});
    ov.remove();
  };
  closeBtn.style.marginTop='0';

  ov.appendChild(wrap);
  ov.appendChild(closeBtn);
}
function mkLbBtn(label,bg,border){

  btn.style.cssText=`background:${bg};border:1px solid ${border};color:#fff;border-radius:10px;padding:8px 18px;font-size:0.82rem;cursor:pointer;font-weight:600;transition:background 0.15s;white-space:nowrap;`;
  btn.onmouseover=()=>btn.style.background=bg.replace('0.12','0.22').replace('0.08','0.16');

function initGoogleAuth(){
  if(typeof google==='undefined'){setTimeout(initGoogleAuth,300);return;}
  // Seed CONFIG.APPS_SCRIPT_URL from localStorage if it wasn't baked into the HTML.
  // This is written by saveSettings() every time the admin saves the proxy URL, so any
  // browser the admin has used will have a cached copy — new clients on the same device
  // (or who receive a link from a browser where the admin has logged in) benefit from this.
  if(!CONFIG.APPS_SCRIPT_URL){try{const _ls=localStorage.getItem('np_apps_script_url');if(_ls)CONFIG.APPS_SCRIPT_URL=_ls;}catch(e){}}
  // Single token client — Sheets + Drive + userinfo in ONE request.
  // This means one Google sign-in permission prompt ever, and zero separate Drive popup on upload.
  tokenClient=google.accounts.oauth2.initTokenClient({
    client_id:CONFIG.CLIENT_ID,
    scope:'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/userinfo.email https://www.googleapis.com/auth/drive',
    callback:onToken,
  });
  const savedEmail=localStorage.getItem('np_email');
  // Try cached access token first — if it's still valid, skip the sign-in round-trip entirely
  const cachedTok=localStorage.getItem('np_access_token');
  const cachedExp=parseInt(localStorage.getItem('np_token_expiry')||'0');
  if(cachedTok&&cachedExp>Date.now()&&savedEmail){
    onToken({access_token:cachedTok,expires_in:Math.floor((cachedExp-Date.now())/1000)});
    return;
  }
  if(savedEmail){silentSignIn=true;tokenClient.requestAccessToken({prompt:'none',login_hint:savedEmail});}
}
async function onToken(resp){
  // Cancel the mobile safety-net timer — we're inside the callback so sign-in
  // succeeded; let loadAllData() run to its own 25-second timeout instead.
  if(_safetyNetTimer){clearTimeout(_safetyNetTimer);_safetyNetTimer=null;}
  if(resp.error){
    if(silentSignIn){
      // Silent attempt failed (token expired / no Google session) —
      // drop back to login screen so user can click the button.
      silentSignIn=false;
      state.isLoading=false;
      render();
      return;
    }
    showToast('Sign-in failed: '+resp.error,'#EF4444');return;
  }
  silentSignIn=false;
  state.accessToken=resp.access_token;
  driveToken=resp.access_token; // consolidated — same token covers Drive scope too
  state.tokenExpiry=Date.now()+(resp.expires_in*1000);
  // Cache token so the next refresh within ~1 hour skips the sign-in popup entirely
  try{
    localStorage.setItem('np_access_token',resp.access_token);
    localStorage.setItem('np_token_expiry',String(state.tokenExpiry-30000)); // 30s safety buffer
  }catch(e){}
  state.mode='live';state.isLoading=true;state.loadingMsg='Connecting to Google...';render();
  try{
    const info=await fetch('https://www.googleapis.com/oauth2/v3/userinfo',
      {headers:{Authorization:`Bearer ${state.accessToken}`}}).then(r=>r.json());
    state.userEmail=info.email;
    localStorage.setItem('np_email',info.email);
    if(!state.sheetId){
      state.loadingMsg='Creating your spreadsheet...';render();
      state.sheetId=await createSpreadsheet();
      state.sheetUrl=`https://docs.google.com/spreadsheets/d/${state.sheetId}`;
      await initSheetHeaders();
      services=DEFAULT_SERVICES.map(s=>({...s}));
      await persistServices();
      showToast('Spreadsheet created in your Google Drive!');
    }else{
      state.loadingMsg='Loading your data...';render();
      state.sheetUrl=`https://docs.google.com/spreadsheets/d/${state.sheetId}`;
      await Promise.race([
        loadAllData(),
        new Promise((_,rej)=>setTimeout(()=>rej(new Error('Loading timed out — please refresh the page.')),25000))
      ]);
    }
    lastSynced=Date.now();
    _lastDataFingerprint=dataFingerprint(); // baseline — first poll won't false-trigger
    startAutoRefresh();
    const email=state.userEmail.toLowerCase();
    if(CONFIG.ADMIN_EMAILS.map(e=>e.toLowerCase()).includes(email)){
      state.role='admin';state.view='dashboard';state.adminViewAsClient=false;
      // Restore client-view mode if admin refreshed while previewing client experience
      if(localStorage.getItem('np_admin_as_client')==='1'){
        state.adminViewAsClient=true;
        const savedCid=parseInt(localStorage.getItem('np_admin_client_id')||'0');
        state.currentClientId=savedCid||null;
        state.clientView='home';
      }
    }else{
      // For clients, loadAllData() fails (their token can't read the private sheet).
      // Try loading via the proxy instead — this fetches their data, dogs, bookings
      // and safe settings. If that also fails they'll see onboarding.
      state.loadingMsg='Loading your profile…';render();
      const proxyStatus=await loadClientDataViaProxy();
      const cl=clients.find(c=>c.email.toLowerCase()===email);
      if(cl){
        state.role='client';state.currentClientId=cl.id;
        // Seed browser history so back-button stays within the portal, not the login page
        try{history.replaceState({role:'client',clientView:'home'},'',' ');}catch(e){}
        // Check for unseen changelog entries or missing required fields → show What's New popup
        checkWhatsNewOnLogin();
      }
      else if(proxyStatus==='error'){
        // Proxy unreachable — show a reconnect screen rather than onboarding.
        // Store error detail so the debug UI can show it.
        state._proxyErrorMsg=state._lastProxyError||'Unknown error';
        showToast('Could not reach the client portal. Please try again.','#EF4444');
        state.role='client_error';
      }
      else{
        // Proxy responded successfully but this email has no record — genuinely new client.
        state.role='onboarding';
        state.onboardingStep=1;
        state.onboardingData={};
      }
    }
    // Restore last-viewed section so refreshing the page lands back where you were
    if(state.role==='admin'){
      const sv=localStorage.getItem('np_view');
      const validViews=['dashboard','calendar','clients','dogs','invoices','settings','services'];
      if(sv&&validViews.includes(sv))state.view=sv;
      const sd=parseInt(localStorage.getItem('np_dog_id')||'0');
      if(sd&&state.view==='dogs')state.selectedDogId=sd;
    }
  }catch(e){showToast('Error: '+e.message,'#EF4444');console.error(e);state.role='login';}
  state.isLoading=false;render();
}
function googleSignIn(){
  if(!tokenClient){showToast('Auth loading, try again','#EF4444');return;}
  const savedEmail=localStorage.getItem('np_email');
  // Returning user: pass login_hint so Google can skip the account picker
  // when the user already has an active session in this browser.
  // New user: fall back to select_account so they can choose which account.
  if(savedEmail){
    tokenClient.requestAccessToken({prompt:'',login_hint:savedEmail});
  }else{
    tokenClient.requestAccessToken({prompt:'select_account'});
  }
}

function signOut(){
  // Soft sign-out: keep the cached access token so returning within ~1 hour
  // skips the Google account picker entirely (silent re-auth).
  if(autoRefreshTimer)clearInterval(autoRefreshTimer);
  Object.assign(state,{role:'login',mode:null,accessToken:null,userEmail:null,
    sheetId:CONFIG.SHEET_ID||null,sheetUrl:null,showModal:null,currentClientId:null,
    _proxyErrorMsg:null,_lastProxyError:null});
  // Keep np_email + np_access_token + np_token_expiry for 1-hour silent re-auth.
  localStorage.removeItem('np_admin_as_client');
  localStorage.removeItem('np_admin_client_id');
  clients=[];bookings=[];invoices=[];services=[];lastSynced=null;render();
}
function switchAccount(){
  // Hard sign-out: revoke the token, clear ALL cached credentials.
  // Forces the Google account picker on next sign-in so a different account can be used.
  try{if(state.accessToken&&typeof google!=='undefined')google.accounts.oauth2.revoke(state.accessToken,()=>{});}catch(e){}
  if(autoRefreshTimer)clearInterval(autoRefreshTimer);
  Object.assign(state,{role:'login',mode:null,accessToken:null,userEmail:null,
    sheetId:CONFIG.SHEET_ID||null,sheetUrl:null,showModal:null,currentClientId:null,
    _proxyErrorMsg:null,_lastProxyError:null});
  // Clear everything — next sign-in MUST go through the Google account picker.
  localStorage.removeItem('np_email');
  localStorage.removeItem('np_access_token');
  localStorage.removeItem('np_token_expiry');
  localStorage.removeItem('np_admin_as_client');
  localStorage.removeItem('np_admin_client_id');
  clients=[];bookings=[];invoices=[];services=[];lastSynced=null;
  // If Google Identity Services is loaded, revoke any cached session too
  try{if(typeof google!=='undefined')google.accounts.id.disableAutoSelect();}catch(e){}
  render();
}
async function retryClientLogin(){
  // Used by the Connection Problem screen — retries the proxy without a full page reload.
  state.role='login';state.isLoading=true;state.loadingMsg='Retrying…';render();
  try{
    const proxyStatus=await loadClientDataViaProxy();
    const email=(state.userEmail||'').toLowerCase();
    const cl=clients.find(c=>c.email.toLowerCase()===email);
    if(cl){
      state.role='client';state.currentClientId=cl.id;
      try{history.replaceState({role:'client',clientView:'home'},'',' ');}catch(e){}
    }else if(proxyStatus==='not_registered'){
      state.role='onboarding';state.onboardingStep=1;state.onboardingData={};
    }else{
      state._proxyErrorMsg=state._lastProxyError||'Unknown error';
      state.role='client_error';
    }
  }catch(e){
    state._proxyErrorMsg=e.message;state.role='client_error';
  }
  state.isLoading=false;render();
}

async function sheetsReq(url,opts={}){
  const r=await fetch(url,{...opts,headers:{Authorization:`Bearer ${state.accessToken}`,'Content-Type':'application/json',...(opts.headers||{})}});
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e?.error?.message||`HTTP ${r.status}`);}
  return r.json();
}
async function readRange(range){
  const d=await sheetsReq(`${CONFIG.API_BASE}/${state.sheetId}/values/${encodeURIComponent(range)}?valueRenderOption=UNFORMATTED_VALUE`);
  return d.values||[];
}
async function readRangeSafe(range){try{return await readRange(range);}catch(e){return[];}}
async function writeRange(range,values){
  await sheetsReq(`${CONFIG.API_BASE}/${state.sheetId}/values/${encodeURIComponent(range)}?valueInputOption=USER_ENTERED`,
    {method:'PUT',body:JSON.stringify({values})});

async function clearRange(range){

async function loadAllData(){

  ]);
  const svR=await readRangeSafe('Services!A2:F');
  const pkR=await readRangeSafe('Packages!A2:K');

  // local data, the read likely failed (e.g. 403 for a non-admin token). Don't wipe
  // the existing state — silentRefresh for clients should use loadClientDataViaProxy
  // instead, but this is a belt-and-suspenders safety net.
  if(!(sR?.length)&&(clients.length>0||bookings.length>0))return;

    if(!vaccines.length&&vaccExpiry){vaccines=[{name:'Vaccines',expiry:vaccExpiry}];}
    let playPhotos=[];try{if(r[12])playPhotos=JSON.parse(r[12]);}catch(e){}
    let photoOffset={x:50,y:50};try{if(r[13]){const p=String(r[13]).split(',');if(p.length===2)photoOffset={x:+p[0]||50,y:+p[1]||50};}}catch(e){}
    const emergencyVetLimit=String(r[14]||'');
    const deceased=String(r[15]||'').toLowerCase()==='true';
    const vaccOverride=String(r[16]||'');
    const vetName=String(r[17]||'');
    const vetPhone=String(r[18]||'');
    const vetWebsite=String(r[19]||'');
    const dog={id:+r[0],name:String(r[2]||''),breed:String(r[3]||''),age:+r[4]||0,vaccinated:String(r[5]).toLowerCase()==='true',notes:String(r[6]||''),birthday,vaccExpiry,vaccines,driveFileLink:String(r[10]||''),photoLink:String(r[11]||''),playPhotos,photoOffset,emergencyVetLimit,deceased,vaccOverride,vetName,vetPhone,vetWebsite};
    const cl=clients.find(c=>c.id===+r[1]);if(cl)cl.dogs.push(dog);
  });
  bookings.length=0;
  const statusWords=['confirmed','cancelled','pending'];
  (bR||[]).forEach(r=>{
    if(!r[0])return;
    const isOld=statusWords.includes(String(r[6]).toLowerCase());
    if(isOld){
      const ci5=sheetDateStr(r[5]);
      bookings.push({id:+r[0],clientId:+r[1],dogId:+r[2],dogName:String(r[3]||''),clientName:String(r[4]||''),
        checkIn:ci5,checkOut:ci5,nights:1,status:String(r[6]||'confirmed'),
        service:String(r[7]||'Full Day'),addons:'',price:+r[8]||0});
    }else{

function blockDateRange(){
  const start=document.getElementById('block-start')?.value;
  const end=document.getElementById('block-end')?.value||start;
  if(!start){showToast('Please select a start date.','#EF4444');return;}
  if(end<start){showToast('End date must be on or after start date.','#EF4444');return;}
  if(!state.settings.capacityOverrides)state.settings.capacityOverrides={};
  let d=new Date(start+'T00:00:00'),count=0;
  const last=new Date(end+'T00:00:00');
  while(d<=last){
    const ds=d.toISOString().split('T')[0];
    state.settings.capacityOverrides[ds]=0;
    d.setDate(d.getDate()+1);count++;
  }
  showToast(`🔒 Blocked ${count} day${count!==1?'s':''}!`,'#7B4015');
  render();
  try{persistSettings();}catch(e){}
}
async function parseBlockDatesAI(){
  const text=(document.getElementById('block-ai-text')?.value||'').trim();
  if(!text){showToast('Type or speak something first.','#EF4444');return;}
  const apiKey=state.settings.geminiApiKey;
  if(!apiKey){showToast('Add your Gemini API key in Settings first.','#F97316');return;}
  const statusEl=document.getElementById('block-ai-status');
  if(statusEl)statusEl.textContent='✨ Parsing with AI…';
  try{
    const today=TODAY;
    const prompt=`Today is ${today}. The user wants to block these days at a doggy daycare (no bookings allowed): "${text}"\n\nReturn ONLY a JSON array of date strings in YYYY-MM-DD format. Include every individual date in any mentioned range. Example: ["2026-03-15","2026-03-16","2026-03-17"]\n\nDo not include any other text, explanation, or markdown — just the JSON array.`;
    const model=await getGeminiModel(apiKey);
    const resp=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({contents:[{parts:[{text:prompt}]}]}),
    });
    const json=await resp.json();
    const raw=(json.candidates?.[0]?.content?.parts?.[0]?.text||'').trim().replace(/^```[a-z]*\n?/,'').replace(/\n?```$/,'');
    const dates=JSON.parse(raw);
    if(!Array.isArray(dates)||dates.length===0)throw new Error('No dates found.');
    if(!state.settings.capacityOverrides)state.settings.capacityOverrides={};
    dates.forEach(ds=>{if(/^\d{4}-\d{2}-\d{2}$/.test(ds))state.settings.capacityOverrides[ds]=0;});
    if(statusEl)statusEl.textContent=`✅ Blocked ${dates.length} date${dates.length!==1?'s':''}!`;
    showToast(`🔒 AI blocked ${dates.length} day${dates.length!==1?'s':''}!`,'#7B4015');
    const inp=document.getElementById('block-ai-text');if(inp)inp.value='';
    render();
    try{persistSettings();}catch(e){}
  }catch(err){
    if(statusEl)statusEl.textContent='❌ Could not parse dates: '+err.message;
    showToast('AI parsing failed: '+err.message,'#EF4444');
  }
}

// ─── Apps Script proxy ───────────────────────────────────────────────────────
// Used when a client/onboarding user needs to write to the sheet.
// Their own OAuth token has no write access, so we POST to an Apps Script Web App
// that runs as Elyse (the sheet owner), verifies the token, then writes for them.
// Silently refreshes the OAuth2 token if it's expired or within 2 minutes of expiry.
// Called before every proxy write so clients never see a stale-token error mid-session.
async function ensureValidToken(){
  // Token still good (with a 2-minute safety buffer)
  if(state.accessToken&&state.tokenExpiry&&state.tokenExpiry>Date.now()+120000)return;
  if(!tokenClient)throw new Error('Auth not initialized — please reload the page.');
  const savedEmail=localStorage.getItem('np_email')||state.userEmail||'';
  return new Promise((resolve,reject)=>{
    const prev=tokenClient.callback;
    tokenClient.callback=(resp)=>{
      tokenClient.callback=prev; // restore
      if(resp.error){
        reject(new Error('Your session expired — please sign out and sign back in.'));
        return;
      }
      state.accessToken=resp.access_token;
      driveToken=resp.access_token;
      state.tokenExpiry=Date.now()+(resp.expires_in*1000);
      try{
        localStorage.setItem('np_access_token',resp.access_token);
        localStorage.setItem('np_token_expiry',String(state.tokenExpiry-30000));
      }catch(e){}
      resolve();
    };
    tokenClient.requestAccessToken({prompt:'',login_hint:savedEmail});
  });
}
async function proxyClientWrite(action, payload){
  // Resolution order for the proxy URL:
  //   1. CONFIG.APPS_SCRIPT_URL  — baked into the HTML file (works for new clients who
  //      can't read the sheet yet, because they don't have access to the admin's sheet)
  //   2. localStorage fallback   — saved by the admin the last time they saved Settings
  //      on this browser (covers the case where CONFIG wasn't updated but the admin's
  //      browser set the cached value)
  //   3. state.settings           — loaded from sheet (works for admin + existing clients)
  const _lsUrl=(()=>{try{return localStorage.getItem('np_apps_script_url')||'';}catch(e){return'';}})();
  const url=(CONFIG.APPS_SCRIPT_URL||_lsUrl||state.settings.appsScriptUrl||'').trim();
  if(!url)throw new Error('No Apps Script proxy URL configured — ask your admin to add it in Settings (and set CONFIG.APPS_SCRIPT_URL in the HTML file for new client registration).');
  // Auto-refresh the token if it has expired — prevents "Invalid or expired token" errors
  // after a client has been on the page for more than ~1 hour.
  try{await ensureValidToken();}catch(e){throw new Error('Session expired — please sign out and sign back in.');}
  const token=state.accessToken;
  if(!token)throw new Error('Not signed in.');
  // MUST use text/plain — application/json triggers a CORS preflight OPTIONS request
  // that Google Apps Script silently ignores, causing "Failed to fetch" before the
  // POST even leaves the browser. Body is still JSON; Apps Script parses it fine.
  const resp=await fetch(url,{
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify({action,token,...payload}),
  });
  if(!resp.ok)throw new Error(`Proxy HTTP ${resp.status}`);
  const json=await resp.json();
  if(!json.ok)throw new Error(json.error||'Proxy returned an error');
  return json;
}

// ─── Proxy-based client data loader ──────────────────────────────────────────
// Called after a client signs in and on every silent refresh (instead of
// loadAllData, which fails 403 because clients can't read the private sheet).
// Fetches this client's own record, dogs, bookings + safe settings via the proxy.
// Returns: 'found' | 'not_registered' | 'error'
// 'error'          → proxy is unreachable or URL not set — do NOT drop into onboarding
// 'not_registered' → proxy responded but no record for this email — safe to onboard
// 'found'          → data loaded successfully
async function loadClientDataViaProxy(){
  try{
    const result=await proxyClientWrite('getClientData',{});
    if(!result.ok){
      // Proxy responded but says this email isn't in the system — genuinely new client
      return 'not_registered';
    }

    const cr=result.client; // array: [id, name, email, phone, photoConsent]
    const actualCid=+cr[0];

    // Rebuild the dog objects from the raw sheet rows
    const serverDogs=(result.dogs||[]).map(r=>{
      let vaccines=[];try{if(r[9])vaccines=JSON.parse(r[9]);}catch(e){}
      vaccines=vaccines.map(v=>({...v,expiry:String(v.expiry||'')}));
      let playPhotos=[];try{if(r[12])playPhotos=JSON.parse(r[12]);}catch(e){}
      let photoOffset={x:50,y:50};
      try{if(r[13]){const p=String(r[13]).split(',');if(p.length===2)photoOffset={x:+p[0]||50,y:+p[1]||50};}}catch(e){}
      return{
        id:+r[0],clientId:+r[1],name:String(r[2]||''),breed:String(r[3]||''),
        age:+r[4]||0,vaccinated:String(r[5]).toLowerCase()==='true',
        notes:String(r[6]||''),birthday:String(r[7]||''),vaccExpiry:String(r[8]||''),
        vaccines,driveFileLink:String(r[10]||''),photoLink:String(r[11]||''),
        playPhotos,photoOffset,emergencyVetLimit:String(r[14]||''),
        deceased:String(r[15]).toLowerCase()==='true',
        vaccOverride:String(r[16]||''),
        vetName:String(r[17]||''),vetPhone:String(r[18]||''),vetWebsite:String(r[19]||''),
      };
    });

    const serverClient={
      id:actualCid,name:String(cr[1]||''),email:String(cr[2]||''),
      phone:String(cr[3]||''),photoConsent:String(cr[4]).toLowerCase()==='true',
      dogs:serverDogs,
    };

    // Replace or insert this client in the local array (leave other clients untouched)
    const idx=clients.findIndex(c=>String(c.email).toLowerCase()===String(cr[2]).toLowerCase());
    if(idx>=0)clients[idx]=serverClient;else clients.push(serverClient);
    state.currentClientId=actualCid;

    // Merge bookings: keep other clients' bookings, replace this client's
    const otherBks=bookings.filter(b=>b.clientId!==actualCid);
    bookings.length=0;
    otherBks.forEach(b=>bookings.push(b));
    const statusWords=['confirmed','cancelled','pending'];
    (result.bookings||[]).forEach(r=>{
      if(!r[0])return;
      const isOld=statusWords.includes(String(r[6]).toLowerCase());
      if(isOld){
        bookings.push({id:+r[0],clientId:+r[1],dogId:+r[2],dogName:r[3]||'',clientName:r[4]||'',
          checkIn:r[5]||'',checkOut:r[5]||'',nights:1,status:r[6]||'confirmed',
          service:r[7]||'Full Day',addons:'',price:+r[8]||0});
      }else{
        bookings.push({id:+r[0],clientId:+r[1],dogId:+r[2],dogName:r[3]||'',clientName:r[4]||'',
          checkIn:r[5]||'',checkOut:r[6]||r[5]||'',nights:+r[7]||1,status:r[8]||'confirmed',
          service:r[9]||'Full Day',addons:r[10]||'',price:+r[11]||0});
      }
    });

    // Apply safe settings subset (no API keys returned)
    const s=result.settings||{};
    if(s.businessName)state.settings.businessName=String(s.businessName);
    if(s.dailyCapacity)state.settings.dailyCapacity=+s.dailyCapacity||state.settings.dailyCapacity;
    if(s.fullDayRate!==undefined)state.settings.fullDayRate=+s.fullDayRate||0;
    if(s.halfDayRate!==undefined)state.settings.halfDayRate=+s.halfDayRate||0;
    if(s.groomingAddOn!==undefined)state.settings.groomingAddOn=+s.groomingAddOn||0;
    if(s.venmoHandle)state.settings.venmoHandle=String(s.venmoHandle);
    if(s.squareLink)state.settings.squareLink=String(s.squareLink);
    if(s.capacityOverrides){try{state.settings.capacityOverrides=JSON.parse(s.capacityOverrides)||{};}catch(e){}}
    if(s.requiredVaccines){try{const rv=JSON.parse(s.requiredVaccines);if(Array.isArray(rv))state.settings.requiredVaccines=rv;}catch(e){}}
    // Accept API keys from server — only set if not already configured locally so admin
    // overrides from localStorage take precedence, but clients get keys via proxy.
    if(s.geminiApiKey&&!state.settings.geminiApiKey)state.settings.geminiApiKey=String(s.geminiApiKey);
    if(s.googleMapsApiKey&&!state.settings.googleMapsApiKey)state.settings.googleMapsApiKey=String(s.googleMapsApiKey);

    // Cache client email so we recognise this user on next sign-in even if proxy is slow
    try{if(cr[2])localStorage.setItem('np_client_email',String(cr[2]).toLowerCase());}catch(e){}
    return 'found';

  }catch(e){
    // proxyClientWrite throws for BOTH network failures AND Apps Script {ok:false} responses.
    // We must distinguish them so a "no account yet" doesn't look like a broken connection.
    const msg=(e.message||'').toLowerCase();
    const isNotRegistered=
      msg.includes('no client record')||
      msg.includes('complete registration')||
      msg.includes('not yet registered')||
      msg.includes('no client found');
    if(isNotRegistered){
      console.log('loadClientDataViaProxy: email not yet registered → onboarding');
      return 'not_registered';
    }
    // True error: network down, CORS, bad HTTP status, proxy URL missing, etc.
    console.warn('loadClientDataViaProxy error:',e.message);
    state._lastProxyError=e.message; // captured for the error screen debug info
    return 'error';
  }
}

  if(state.mode!=='live')return;
  const overridesJson=JSON.stringify(state.settings.capacityOverrides||{});

async function persistServices(){

async function refreshData(){
  if(state.mode!=='live')return;

function render(){
  try{
    document.getElementById('app').innerHTML=buildApp();
    // Async: load any Drive images that aren't cached yet (no-op if all cached)
    hydrateImages();
  }
  catch(e){
    console.error('Render error:',e);
    state.isLoading=false;
    document.getElementById('app').innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:sans-serif;color:#7B4015;background:#FEF3C7">
      <div style="font-size:3rem">🐾</div>
      <div style="font-weight:700;font-size:1.2rem;margin:8px 0">Something went wrong</div>
      <div style="color:#92400E;font-size:.9rem;margin-bottom:16px">${e.message}</div>
      <button onclick="location.reload()" style="background:#7B4015;color:white;border:none;padding:10px 24px;border-radius:12px;cursor:pointer;font-size:.9rem">Refresh Page</button>
    </div>`;
  }
}
function buildApp(){
  if(state.isLoading)return buildLoader();
  if(state.role==='kiosk')return buildKioskView();
  if(state.role==='login')return buildLogin();
  if(state.role==='onboarding')return buildOnboarding();
  if(state.role==='client_error')return buildClientError();
  if(state.role==='admin'&&state.adminViewAsClient)return buildAdminAsClientLayout();
  if(state.role==='admin')return buildAdminLayout();
  if(state.role==='client')return buildClientLayout();
  return'';
}

function toggleAdminClientView(){
  if(!state.adminViewAsClient){
    // Switching TO client view — try to find admin's own client record first,
    // but always allow selector so admin can preview any client
    const email=state.userEmail?.toLowerCase()||'';
    const matched=clients.find(c=>c.email.toLowerCase()===email);
    // Default to matched client if found, otherwise first client, otherwise null
    state.currentClientId=matched?.id||(clients[0]?.id||null);
    state.clientView='home';
    // Persist so a page refresh lands back in client view
    try{localStorage.setItem('np_admin_as_client','1');
        localStorage.setItem('np_admin_client_id',String(state.currentClientId||''));}catch(e){}
  }else{
    // Switching BACK to admin — clear persisted flag
    try{localStorage.removeItem('np_admin_as_client');
        localStorage.removeItem('np_admin_client_id');}catch(e){}
  }
  state.adminViewAsClient=!state.adminViewAsClient;
  state.showModal=null;
  render();
}
function adminSwitchViewAsClient(id){
  state.currentClientId=+id||null;

  try{localStorage.setItem('np_admin_client_id',String(state.currentClientId||''));}catch(e){}
  render();
}

function onboardingNext(fromStep){
  const d=state.onboardingData;
  if(fromStep===1){
    const name=(document.getElementById('ob-name')?.value||'').trim();
    const phone=(document.getElementById('ob-phone')?.value||'').trim();
    if(!name){showToast('Please enter your name.','#EF4444');return;}
    if(!phone){showToast('Please enter your phone number.','#EF4444');return;}
    d.ownerName=name;d.phone=phone;
    state.onboardingStep=2;
  }else if(fromStep===2){
    const dogName=(document.getElementById('ob-dogname')?.value||'').trim();
    if(!dogName){showToast("Please enter your pet's name.",'#EF4444');return;}
    d.dogName=dogName;
    d.dogBreed=getBreedValue('ob-breed','ob-breed-other');
    d.dogAge=parseFloat(document.getElementById('ob-age')?.value)||0;
    d.dogGender=document.getElementById('ob-gender')?.value||'';
    d.dogNotes=(document.getElementById('ob-notes')?.value||'').trim();
    d.vetName=(document.getElementById('ob-vet-name')?.value||'').trim();
    d.vetPhone=(document.getElementById('ob-vet-phone')?.value||'').trim();
    state.onboardingStep=3;
  }
  render();
}

function onboardingCancel(){
  // Clear cached email so the login screen forces the full Google account picker,
  // allowing the user to sign in with a different account.
  try{
    localStorage.removeItem('np_email');
    localStorage.removeItem('np_access_token');
    localStorage.removeItem('np_token_expiry');
  }catch(e){}
  state.role='login';
  state.accessToken=null;
  state.userEmail=null;
  state.onboardingStep=1;
  state.onboardingData={};
  render();
}

async function submitOnboarding(){
  const d=state.onboardingData;
  // Collect step-3 fields
  d.ecName=(document.getElementById('ob-ec-name')?.value||'').trim();
  d.ecPhone=(document.getElementById('ob-ec-phone')?.value||'').trim();
  d.agreeTerms=document.getElementById('ob-agree-terms')?.checked||false;
  d.agreeLiability=document.getElementById('ob-agree-liability')?.checked||false;
  d.agreeMedical=document.getElementById('ob-agree-medical')?.checked||false;
  d.vetLimit=document.getElementById('ob-vet-limit')?.value||'';
  d.photoConsent=document.getElementById('ob-photo-consent')?.checked||false;

  if(!d.agreeTerms||!d.agreeLiability||!d.agreeMedical){
    showToast('Please accept all required agreements to continue.','#EF4444');
    return;
  }

  // Disable submit button while working
  const btn=document.getElementById('ob-submit-btn');
  if(btn){btn.disabled=true;btn.textContent='Creating your profile…';}

  try{
    const newClientId=nextId(clients);
    const allDogs=clients.flatMap(c=>c.dogs);
    const newDogId=nextId(allDogs.length>0?allDogs:[{id:0}]);

    // Build dog notes — combine user-entered notes with emergency contact and gender
    let dogNotes=d.dogNotes||'';
    if(d.dogGender)dogNotes=(dogNotes?dogNotes+'\n':'')+'Gender: '+d.dogGender;
    if(d.ecName||d.ecPhone)dogNotes=(dogNotes?dogNotes+'\n':'')+'Emergency Contact: '+(d.ecName||'')+(d.ecPhone?' — '+d.ecPhone:'');

    const newClient={
      id:newClientId,
      name:d.ownerName,
      email:state.userEmail,
      phone:d.phone,
      photoConsent:d.photoConsent,
      dogs:[{
        id:newDogId,
        clientId:newClientId,
        name:d.dogName,
        breed:d.dogBreed||'Mixed Breed',
        age:d.dogAge||0,
        vaccinated:false,
        notes:dogNotes,
        birthday:'',
        vaccExpiry:'',
        vaccines:[],
        driveFileLink:'',
        photoLink:'',
        playPhotos:[],
        photoOffset:{x:50,y:50},
        emergencyVetLimit:d.vetLimit||'',
        deceased:false,
        vetName:d.vetName||'',
        vetPhone:d.vetPhone||'',
      }],
    };

    clients.push(newClient);

    // New clients use the Apps Script proxy — their token can't write to Elyse's sheet directly.
    // The proxy assigns IDs server-side and returns them so we can sync local state.
    if(state.mode==='live'){
      const regResult=await proxyClientWrite('registerClient',{
        client:{
          id:newClientId,name:newClient.name,email:newClient.email,
          phone:newClient.phone,photoConsent:newClient.photoConsent,
        },
        dog:{
          id:newDogId,clientId:newClientId,
          name:newClient.dogs[0].name,breed:newClient.dogs[0].breed,
          age:newClient.dogs[0].age,notes:newClient.dogs[0].notes,
          emergencyVetLimit:newClient.dogs[0].emergencyVetLimit,
          vetName:newClient.dogs[0].vetName||'',vetPhone:newClient.dogs[0].vetPhone||'',
        },
      });
      // Update local state with the server-assigned IDs to avoid ID collisions
      if(regResult.clientId){
        const actualCid=regResult.clientId;
        const actualDid=regResult.dogId||newDogId;
        newClient.id=actualCid;
        newClient.dogs[0].id=actualDid;
        newClient.dogs[0].clientId=actualCid;
        // Update the entry we just pushed
        clients[clients.length-1]=newClient;
      }
    }

    // Log them in as a new client using the (possibly server-corrected) ID
    state.role='client';
    state.currentClientId=newClient.id;
    state.clientView='home';
    state.onboardingStep=1;
    state.onboardingData={};
    // Cache this email so future sign-ins recognise them as a returning client
    try{localStorage.setItem('np_client_email',newClient.email.toLowerCase());}catch(e){}
    // Seed history so back-button stays in portal
    try{history.replaceState({role:'client',clientView:'home'},'',' ');}catch(e){}
    // Immediately sync full data from the proxy (gets dogs, bookings, settings)
    await loadClientDataViaProxy();
    showToast(`Welcome, ${d.ownerName}! Your profile is all set. 🐾`);
    render();
  }catch(e){
    if(btn){btn.disabled=false;btn.textContent='🐾 Create My Profile';}
    showToast('Error creating profile: '+e.message,'#EF4444');
  }
}

  const monthBks=bookings.filter(b=>(b.checkIn||'').startsWith(monthPfx)&&b.status!=='cancelled').length;
  const overdue=invoices.filter(i=>i.status==='overdue').reduce((s,i)=>s+(i.amount-i.paid),0);
  const upcoming=bookings.filter(b=>String(b.checkIn||'')>TODAY&&b.status==='confirmed').sort((a,b)=>String(a.checkIn||'').localeCompare(String(b.checkIn||''))).slice(0,5);
  // Next 3 days — use local date components to avoid UTC timezone shift skipping days

        <div class="text-2xl font-bold text-gray-800">${activeDogs}</div>

              hasBoarding?`<span class="text-[10px] px-1.5 py-0.5 rounded-full bg-blue-100 text-blue-700 font-medium">🏨 Boarding</span>`:'',
            ].filter(Boolean).join('');
            const isClosed=cap===0;

          <button onclick="setView('invoices')" class="mt-2 w-full text-xs text-amber-700 hover:underline">View All →</button>
        </div>
      </div>
    </div>
  </div>`;
}

                <span class="${!clientPast&&unavailable?'text-sm font-medium text-gray-300':'text-sm font-medium text-gray-600'}">${day}</span>

            </div>`;}

          // ── ADMIN VIEW: full detail ──
          // Same-day bookings are blocked (like client view). After 5 PM Pacific, next day is also blocked.
          const adminBookingBlocked=ds<=TODAY||(AFTER_BOOKING_CUTOFF&&ds===TOMORROW);
          const adminEffPast=isPast||isToday||(AFTER_BOOKING_CUTOFF&&ds===TOMORROW);
          return`
          <div class="day-cell border-b border-r border-gray-100 p-2 relative ${wknd?'weekend-day':''} ${adminEffPast&&!isToday?'past-day':''}"
               style="border-top:3px solid ${cap===0?'#9CA3AF':n>0?c.bar:adminEffPast?'#E5E7EB':'transparent'}${cap===0?';background:#F9FAFB':adminEffPast&&!isToday?';background:#FAFAFA;':''}"
               onclick="openDayModal('${ds}')">

              ${n>0&&cap!==0?`<span class="text-xs font-bold" style="color:${c.txt}">${n}/${cap}</span>`:''}
            </div>
            ${cap===0
              ?`<div class="flex flex-col items-center justify-center py-1.5">
                  <span style="font-size:20px;line-height:1.1" title="Closed">🔒</span>
                  <span class="text-xs font-semibold text-gray-400 mt-1">Closed</span>
                </div>`

                ?`${n>0?`<div class="cap-bar mt-1"><div class="cap-fill" style="width:${Math.min(100,n/cap*100)}%;background:${c.bar}"></div></div>`:''}
                  <div class="text-xs mt-1 text-gray-400">🚫 Same-day</div>`
              :AFTER_BOOKING_CUTOFF&&ds===TOMORROW
                ?`${n>0?`<div class="cap-bar mt-1"><div class="cap-fill" style="width:${Math.min(100,n/cap*100)}%;background:${c.bar}"></div></div>`:''}
                  <div class="text-xs mt-1 text-gray-400">⏰ After cutoff</div>`
              :n>0?`<div class="cap-bar mt-1"><div class="cap-fill" style="width:${Math.min(100,n/cap*100)}%;background:${c.bar}"></div></div>
              <div class="text-xs mt-1" style="color:${c.txt}">${full?'🚫 Full':`${cap-n} left`}</div>`
            :`<div class="text-xs text-gray-200 mt-1">${isPast?'—':'Open'}</div>`}
            ${!adminEffPast?`<button class="absolute bottom-1 right-1 text-gray-200 hover:text-amber-600 transition-colors" style="font-size:11px;line-height:1;padding:1px 3px;background:none;border:none;cursor:pointer;" onclick="event.stopPropagation();showDayQuickMenu('${ds}',event)" title="Quick edit">⚙</button>`:''}
          </div>`;
        }).join('')}
      </div>
    </div>
    </div><!-- /min-width -->
    </div><!-- /overflow-x-auto -->
    ${isClient?`
      <div class="mt-3 flex items-center gap-5 px-1 text-xs text-gray-400">
        <div class="flex items-center gap-1.5">

// ─── VET CLINICS ADMIN VIEW ────────────────────────────────────────────────────
function buildVetClinicsView(){
  // ── 1. Aggregate clinics from client pet profiles ──────────────────────────
  const clinicMap=new Map(); // key = normalised clinic name
  clients.forEach(cl=>{
    (cl.dogs||[]).filter(d=>!d.deceased&&d.vetName&&d.vetName.trim()).forEach(dog=>{
      const key=(dog.vetName||'').trim().toLowerCase();
      if(!clinicMap.has(key)){
        clinicMap.set(key,{name:dog.vetName.trim(),phone:dog.vetPhone||'',website:dog.vetWebsite||'',clients:[],manual:false});
      }
      const entry=clinicMap.get(key);
      if(!entry.phone&&dog.vetPhone)entry.phone=dog.vetPhone;
      if(!entry.website&&dog.vetWebsite)entry.website=dog.vetWebsite;
      if(!entry.clients.find(c=>c.id===cl.id))
        entry.clients.push({id:cl.id,name:cl.name,dogName:dog.name});
    });
  });

  // ── 2. Merge manually-added partner clinics ────────────────────────────────
  const manuals=state.settings.manualVetClinics||[];
  manuals.forEach(m=>{
    const key=(m.name||'').trim().toLowerCase();
    if(!key)return;
    if(clinicMap.has(key)){
      // Enrich aggregated entry with any manual data
      const entry=clinicMap.get(key);
      if(!entry.phone&&m.phone)entry.phone=m.phone;
      if(!entry.website&&m.website)entry.website=m.website;
      entry.manualId=m.id; // track so we can delete it
      entry.notes=m.notes||'';
      entry.manual=true;
    }else{
      clinicMap.set(key,{id:m.id,name:m.name.trim(),phone:m.phone||'',website:m.website||'',notes:m.notes||'',clients:[],manual:true,manualId:m.id});
    }
  });

  const clinics=[...clinicMap.values()].sort((a,b)=>a.name.localeCompare(b.name));
  const total=clinics.length;
  const totalPets=clinics.reduce((s,c)=>s+c.clients.length,0);

  const clinicCards=clinics.length===0
    ?`<div class="col-span-2 text-center py-16 text-gray-400">
        <div class="text-4xl mb-3">🏥</div>
        <div class="font-semibold text-lg mb-1">No vet clinics on file yet</div>
        <div class="text-sm">Clinics appear here once clients add their vet in My Pet → Edit, or you add one manually above.</div>
      </div>`
    :clinics.map(c=>`
      <div class="bg-white rounded-2xl border p-4 shadow-sm hover:shadow-md transition-shadow ${c.manual?'border-amber-200':'border-gray-100'}">
        <div class="flex items-start justify-between gap-3">
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2 flex-wrap">
              <div class="font-bold text-gray-800 text-base truncate">${c.name}</div>
              ${c.manual?`<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-semibold" style="background:#FEF3C7;color:#92400E;">🤝 Partner</span>`:''}
            </div>
            ${c.phone?`<div class="text-sm text-gray-500 mt-0.5">📞 ${fmtPhone(c.phone)}</div>`:''}
            ${c.website?`<div class="mt-0.5"><a href="${c.website.startsWith('http')?c.website:'https://'+c.website}" target="_blank" rel="noopener" class="text-xs text-blue-500 hover:underline">🔗 ${c.website.replace(/^https?:\/\//,'').split('/')[0]}</a></div>`:'<div class="text-xs text-gray-300 mt-0.5 italic">No website on file</div>'}
            ${c.notes?`<div class="text-xs text-gray-400 mt-1 italic">${c.notes}</div>`:''}
          </div>
          <div class="flex flex-col items-end gap-1.5 flex-shrink-0">
            ${c.clients.length>0?`<span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold" style="background:#EFF6FF;color:#1D4ED8;">${c.clients.length} client${c.clients.length===1?'':'s'}</span>`:''}
            ${c.manualId!==undefined?`<button onclick="deleteManualVetClinic(${c.manualId})" title="Remove partner clinic" class="inline-flex items-center px-2 py-0.5 rounded-lg text-xs text-red-400 hover:bg-red-50 border border-red-200">🗑️ Remove</button>`:''}
          </div>
        </div>
        ${c.clients.length>0?`
        <div class="mt-3 pt-3 border-t border-gray-50">
          <div class="text-xs text-gray-400 mb-1.5 font-semibold uppercase tracking-wide">Clients using this clinic</div>
          <div class="flex flex-wrap gap-1.5">
            ${c.clients.map(cl=>`<button onclick="viewClientProfile(${cl.id})" class="text-xs px-2.5 py-1 rounded-full border hover:bg-amber-50 transition-colors" style="border-color:#D4A96B;color:#7B4015;background:white;">🐾 ${cl.name} · ${cl.dogName}</button>`).join('')}
          </div>
        </div>`:''}
      </div>`).join('');

  return`
  <div class="p-4 sm:p-6 max-w-4xl mx-auto">
    <div class="flex items-center justify-between mb-5">
      <div>
        <h1 class="text-2xl font-bold text-gray-800">🏥 Vet Clinics</h1>
        <p class="text-sm text-gray-400 mt-0.5">${total} clinic${total===1?'':'s'} on file · ${manuals.length} partner${manuals.length===1?'':'s'} · ${totalPets} pet${totalPets===1?'':'s'}</p>
      </div>
      <button onclick="state.showModal={type:'addVetClinic'};render()"
        class="px-4 py-2 rounded-xl text-white text-sm font-semibold shadow-sm hover:opacity-90 transition-opacity"
        style="background:#7B4015;">+ Add Partner Clinic</button>
    </div>

    <div class="mb-5 rounded-2xl p-4 border" style="background:#F0F9FF;border-color:#BAE6FD;">
      <div class="flex items-start gap-2.5">
        <span class="text-lg flex-shrink-0">ℹ️</span>
        <div class="text-sm text-blue-800">
          Clinics are auto-aggregated from client pet profiles <em>and</em> any partner clinics you add manually. Partner clinics show a 🤝 badge and can be removed here at any time.
        </div>
      </div>
    </div>

    <div class="grid gap-3 sm:grid-cols-2">
      ${clinicCards}
    </div>
  </div>`;
}

async function submitAddVetClinic(){
  const name=(document.getElementById('avc-name')?.value||'').trim();
  if(!name){showToast('Clinic name is required.','#EF4444');return;}
  const phone=(document.getElementById('avc-phone')?.value||'').trim();
  const website=(document.getElementById('avc-website')?.value||'').trim();
  const notes=(document.getElementById('avc-notes')?.value||'').trim();
  const existing=state.settings.manualVetClinics||[];
  // Prevent exact-name duplicates
  if(existing.some(c=>c.name.toLowerCase()===name.toLowerCase())){
    showToast('A clinic with that name already exists.','#F97316');return;
  }
  const newId=Date.now();
  existing.push({id:newId,name,phone,website,notes});
  state.settings.manualVetClinics=existing;
  state.showModal=null;
  render();
  try{await persistSettings();showToast(`✅ ${name} added to your clinic directory!`);}
  catch(e){showToast('Saved locally — sheet sync failed.','#F97316');}
}
async function deleteManualVetClinic(id){
  if(!confirm('Remove this partner clinic from your directory?'))return;
  state.settings.manualVetClinics=(state.settings.manualVetClinics||[]).filter(c=>c.id!==id);
  render();
  try{await persistSettings();showToast('✅ Partner clinic removed and directory updated.');}
  catch(e){showToast('Removed locally — sheet sync failed.','#F97316');}
}

function buildWhatsNewModal(){
  const m=state.showModal;if(!m||m.type!=='whatsNew')return'';
  const unseen=m.unseen||[];
  const missing=m.missing||[];
  const hasRequired=missing.length>0;
  const allItems=unseen.flatMap(u=>u.items);
  const requiredItems=allItems.filter(i=>i.required);
  const optionalItems=allItems.flatMap(()=>[]).concat(allItems.filter(i=>!i.required));
  return`<div class="modal-overlay" style="z-index:9999;" onclick="if(event.target===this&&!${hasRequired}){closeWhatsNew();}">
  <div class="modal-box" style="max-width:460px;">
    <!-- Header -->
    <div style="text-align:center;padding-bottom:1.25rem;border-bottom:1px solid #F3F4F6;margin-bottom:1.25rem;">
      <div style="font-size:2.5rem;margin-bottom:.5rem;">✨</div>
      <h2 style="font-size:1.15rem;font-weight:700;color:#1F2937;margin:0 0 .3rem;">What's New in Your Portal</h2>
      <p style="font-size:.78rem;color:#6B7280;margin:0;">Here's what changed since your last visit, ${(clients.find(c=>c.id===state.currentClientId)?.name||'').split(' ')[0]||'there'}.</p>
    </div>
    <!-- Changelog items -->
    ${unseen.map(u=>`
    <div style="margin-bottom:1rem;">
      <p style="font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#9CA3AF;margin:0 0 .6rem;">Update</p>
      ${u.items.map(item=>`
      <div style="display:flex;gap:.75rem;align-items:flex-start;padding:.7rem .85rem;border-radius:12px;margin-bottom:.5rem;background:${item.required?'#FEF2F2':'#F9FAFB'};border:1px solid ${item.required?'#FECACA':'#F3F4F6'};">
        <div style="font-size:1.25rem;flex-shrink:0;line-height:1.3;">${item.icon}</div>
        <div>
          <div style="font-size:.82rem;color:#374151;line-height:1.45;">${item.text}</div>
          ${item.required?`<div style="margin-top:.3rem;font-size:.7rem;font-weight:700;color:#DC2626;">● Required before booking</div>`:''}
        </div>
      </div>`).join('')}
    </div>`).join('')}
    <!-- Missing required fields -->
    ${missing.length>0?`
    <div style="background:#FEF2F2;border:1px solid #FECACA;border-radius:14px;padding:1rem;margin-bottom:1.25rem;">
      <p style="font-size:.8rem;font-weight:700;color:#DC2626;margin:0 0 .5rem;">⚠️ Action Required — Booking is Locked</p>
      ${missing.map(m=>`
      <div style="font-size:.78rem;color:#374151;margin-bottom:.5rem;line-height:1.4;">
        <strong>${m.label}</strong><br>${m.detail}
      </div>`).join('')}
    </div>`:''}
    <!-- CTAs -->
    <div style="display:flex;gap:.75rem;">
      ${missing.length>0?`
      <button onclick="closeWhatsNew('mydog')" style="flex:2;background:#7B4015;color:white;border:none;border-radius:14px;padding:.75rem;font-size:.88rem;font-weight:600;cursor:pointer;">
        🐾 Update My Pet's Profile
      </button>
      <button onclick="closeWhatsNew(null,true)" style="flex:1;background:#F9FAFB;color:#6B7280;border:1px solid #E5E7EB;border-radius:14px;padding:.75rem;font-size:.88rem;font-weight:600;cursor:pointer;">
        Remind Later
      </button>
      `:`
      <button onclick="closeWhatsNew()" style="flex:1;background:#7B4015;color:white;border:none;border-radius:14px;padding:.75rem;font-size:.88rem;font-weight:600;cursor:pointer;">
        Got it — let's go! 🐾
      </button>
      `}
    </div>
    ${missing.length>0?`<p style="font-size:.68rem;color:#9CA3AF;text-align:center;margin:.75rem 0 0;">You can still browse your bookings. Booking new stays is unlocked once required fields are saved.</p>`:''}
  </div>
</div>`;
}
function closeWhatsNew(nav, remindLater=false){
  const email=(state.userEmail||'').toLowerCase();
  // Always mark informational changelog as seen — even on "Remind Later" —
  // so they don't repeat. Required-field prompts (vet clinic, etc.) are driven by
  // live data checks in profileRequiredFieldsMissing(), not the version number,
  // so the action-required alert will still appear next login if fields are still empty.
  markChangelogSeen(email);
  state.showModal=null;
  if(nav)setClientView(nav);
  else render();
}
// Called after a successful client login to check if the "What's New" modal should appear
function checkWhatsNewOnLogin(){
  const cl=clients.find(c=>c.id===state.currentClientId);
  const email=(cl?.email||state.userEmail||'').toLowerCase();
  if(!email)return;
  const unseen=getUnseenChangelog(email);
  const missing=profileRequiredFieldsMissing(cl);
  // Show if there are unseen changelog entries OR required fields are missing
  if(unseen.length>0||missing.length>0){
    state.showModal={type:'whatsNew',unseen,missing};
  }
}
function buildClientHome(){

  </div>`:'';

function buildClientBookings(){

  const sCls={confirmed:'bg-amber-100 text-amber-800',pending:'bg-yellow-100 text-yellow-700',cancelled:'bg-red-100 text-red-600'};
  return`

async function submitUpdateProfile(e){
  e.preventDefault();
  const cl=clients.find(c=>c.id===state.currentClientId);if(!cl)return;
  const email=(document.getElementById('acct-email')?.value||'').trim();
  const phone=(document.getElementById('acct-phone')?.value||'').trim();
  const photoConsent=document.getElementById('acct-photo')?.checked||false;
  if(!email){showToast('Email is required.','#EF4444');return;}
  const btn=document.getElementById('acct-save-btn');
  if(btn){btn.disabled=true;btn.textContent='Saving…';}
  try{
    const result=await proxyClientWrite('updateProfile',{email,phone,photoConsent});
    if(!result.ok)throw new Error(result.error||'Could not save.');
    cl.email=email;cl.phone=phone;cl.photoConsent=photoConsent;
    render();showToast('Profile updated! ✓');
  }catch(err){
    showToast('Error: '+err.message,'#EF4444');
    if(btn){btn.disabled=false;btn.textContent='Save Changes';}
  }
}

async function submitEditMyDog(e,dogId){
  e.preventDefault();
  const cl=clients.find(c=>c.id===state.currentClientId);if(!cl)return;
  const dog=cl.dogs.find(d=>d.id===dogId);if(!dog)return;
  const breed=getBreedValue('emydog-breed','emydog-breed-other')||dog.breed||'Mixed Breed';
  const birthday=(document.getElementById('emydog-birthday')?.value||'').trim();
  // Auto-calculate age from birthday when one is set; fall back to manual entry
  let age;
  if(birthday){
    age=Math.max(0,Math.floor((Date.now()-new Date(birthday+'T00:00:00'))/(365.25*864e5)));
  }else{
    age=parseInt(document.getElementById('emydog-age')?.value)||0;
  }
  const notes=(document.getElementById('emydog-notes')?.value||'').trim();
  const emergencyVetLimit=document.getElementById('emydog-vet')?.value||'';
  const vetName=(document.getElementById('emydog-vet-name')?.value||'').trim();
  const vetPhone=(document.getElementById('emydog-vet-phone')?.value||'').trim();
  const vetWebsite=(document.getElementById('emydog-vet-website')?.value||'').trim();
  const btn=document.getElementById('emydog-submit');
  if(btn){btn.disabled=true;btn.textContent='Saving…';}
  try{
    const result=await proxyClientWrite('updateDog',{dogId,breed,age,birthday,notes,emergencyVetLimit,vetName,vetPhone,vetWebsite});
    if(!result.ok)throw new Error(result.error||'Could not save.');
    dog.breed=breed;dog.age=age;dog.birthday=birthday;dog.notes=notes;dog.emergencyVetLimit=emergencyVetLimit;
    dog.vetName=vetName;dog.vetPhone=vetPhone;dog.vetWebsite=vetWebsite;
    state.showModal=null;render();showToast(`${dog.name} updated! ✓`);
  }catch(err){
    showToast('Error: '+err.message,'#EF4444');
    if(btn){btn.disabled=false;btn.textContent='Save Changes';}
  }
}

async function updateClientVetLimit(clientId,dogId,value){

  dog.emergencyVetLimit=value;
  render(); // re-render to update the badge instantly
  try{
    // Client role: write through proxy since their token can't edit the sheet directly
    if((state.role==='client'||state.role==='onboarding')&&state.mode==='live'){
      await proxyClientWrite('updateVetLimit',{dogId,vetLimit:value});
    }else{
      await persistClients();
    }
    showToast('Emergency care preference saved ✓');
  }catch(e){showToast('Saved locally; sync failed.','#F97316');}
}

      </div>
      ${visibleBks.length>0?`<div class="space-y-1.5 mb-4 max-h-52 overflow-y-auto">
        ${visibleBks.map(b=>`<div class="flex items-start gap-2.5 p-2.5 bg-gray-50 rounded-xl">
          <span class="text-lg mt-0.5">🐶</span>
          <div class="flex-1 min-w-0">
            <span class="text-sm font-semibold text-gray-700">${b.dogName}</span>
            ${isAdm?`<span class="text-xs text-gray-400 ml-1.5">${b.clientName} · ${b.service}</span>`:''}
            ${b.checkIn!==b.checkOut?`<div class="text-xs text-amber-700 mt-0.5">📅 ${fmtDateShort(b.checkIn)} → ${fmtDateShort(b.checkOut)} (${b.nights} days)</div>`:''}
            ${b.addons?`<div class="text-xs text-gray-400">✨ ${b.addons}</div>`:''}
          </div>
          <div class="flex flex-col items-end gap-1">
            ${isAdm?`<span class="text-sm text-gray-600 font-medium whitespace-nowrap">$${b.price}</span>`:''}
            ${isAdm?`<button onclick="cancelBooking(${b.id})" class="text-xs text-red-400 hover:text-red-600 whitespace-nowrap" title="Cancel booking">✕ Cancel</button>`:''}
          </div>
        </div>`).join('')}</div>`
        :!isAdm&&!isClosed&&!full?''  /* client: no own bookings — just fall through to book button */
        :`<p class="text-gray-300 text-sm text-center py-4 mb-4">No bookings yet.</p>`}
      ${(()=>{
        const bookingCutoffHit=ds===TODAY||(AFTER_BOOKING_CUTOFF&&ds===TOMORROW);
        return`<div class="flex gap-2">
        ${isClosed
          ?`<div class="flex-1 py-2.5 bg-gray-100 text-gray-400 rounded-xl text-sm text-center font-medium">🔒 Day Closed${isAdm?` — <button onclick="removeCapOverride('${ds}');closeModal()" class="underline text-gray-500 hover:text-gray-700">Unblock</button>`:''}
          </div>`
          :bookingCutoffHit
            ?`<div class="flex-1 py-2.5 bg-gray-50 text-gray-400 rounded-xl text-sm text-center font-medium border border-gray-100">
                ${ds===TODAY
                  ?'🚫 Same-day bookings are closed.'
                  :'⏰ Booking cutoff passed (5 PM Pacific) — book for a later date.'}
              </div>`
            :isPast
              ?''
              :!full
                ?`<button onclick="openBookingModal('${ds}')" class="flex-1 py-2.5 text-white rounded-xl text-sm font-semibold" style="background:#7B4015" onmouseover="this.style.background='#6A3511'" onmouseout="this.style.background='#7B4015'">${isAdm?'+ Add Booking':'📅 Book This Day'}</button>`
                :`<div class="flex-1 py-2.5 bg-red-50 text-red-400 rounded-xl text-sm text-center font-medium">Day Fully Booked</div>`}
        <button onclick="closeModal()" class="px-4 py-2.5 border border-gray-200 rounded-xl text-sm text-gray-500 hover:bg-gray-50">Close</button>
      </div>`;})()}
    </div>
  </div>`;
}
function getDaycareTier(qty){
  if(qty>=20)return{price:35,label:'20+ sessions',badge:'Best Value 🏆'};
  if(qty>=15)return{price:40,label:'15–19 sessions',badge:'Great Value ⭐'};
  if(qty>=5) return{price:45,label:'5–14 sessions',badge:'Save $10/session 💛'};
  return{price:55,label:'1–4 sessions',badge:'Drop-in rate'};
}
function setBkMain(type){
  _bookingMain=type;
  // Update type button styles
  ['boarding','daycare','combo'].forEach(t=>{
    const btn=document.getElementById(`bk-type-${t}`);
    if(!btn)return;
    const a=t===type;
    btn.style.background=a?'#7B4015':'#F9FAFB';
    btn.style.color=a?'#fff':'#6B7280';
    btn.style.borderColor=a?'#7B4015':'#E5E7EB';
  });
  const bSec=document.getElementById('bk-boarding-section');
  const dSec=document.getElementById('bk-daycare-section');
  const pkgRow=document.getElementById('bk-pkg-mode-row');
  const pkgPicker=document.getElementById('bk-session-picker');
  const datesSec=document.getElementById('bk-daycare-dates');
  // Boarding section: visible for boarding or combo
  if(bSec)bSec.style.display=(type==='boarding'||type==='combo')?'':'none';
  // Daycare section: visible for daycare or combo
  if(dSec)dSec.style.display=(type==='daycare'||type==='combo')?'':'none';
  // Package mode toggle only available for pure daycare
  if(pkgRow)pkgRow.style.display=type==='daycare'?'':'none';
  // Combo always uses schedule mode (package can't be combined with boarding)
  if(type==='combo'){
    if(_daycareMode==='package'){_daycareMode='schedule';}
    if(pkgPicker)pkgPicker.style.display='none';
    if(datesSec)datesSec.style.display='';
  }
  // Update section header labels
  const bLabel=document.getElementById('bk-boarding-label');
  if(bLabel)bLabel.textContent=type==='combo'?'Boarding Nights':'Boarding Dates';
  const dLabel=document.getElementById('bk-daycare-label');
  if(dLabel)dLabel.textContent=type==='combo'?'Daycare Days':'Daycare Sessions';
  // For pure boarding: also keep _dailySchedule in sync (legacy)
  if(type==='boarding'){
    const ci=document.getElementById('bk-board-checkin')?.value;
    const co=document.getElementById('bk-board-checkout')?.value||ci;
    if(ci){getDatesInRange(ci,co||ci).forEach(ds=>{_dailySchedule[ds]='Boarding';});}
  }
  updateBookingPrice();
}
function setDaycareMode(mode){
  _daycareMode=mode;
  ['schedule','package'].forEach(m=>{
    const btn=document.getElementById(`bk-mode-${m}`);
    if(!btn)return;
    const a=m===mode;
    btn.style.background=a?'#7B4015':'#F9FAFB';
    btn.style.color=a?'#fff':'#6B7280';
    btn.style.borderColor=a?'#7B4015':'#E5E7EB';
  });
  const pkgPicker=document.getElementById('bk-session-picker');
  const datesSec=document.getElementById('bk-daycare-dates');
  if(pkgPicker)pkgPicker.style.display=mode==='package'?'':'none';
  if(datesSec)datesSec.style.display=mode==='schedule'?'':'none';
  updateBookingPrice();
}
function stepSessions(delta){
  _sessionQty=Math.max(1,(_sessionQty||1)+delta);
  const el=document.getElementById('bk-session-qty');if(el)el.textContent=_sessionQty;
  const tier=getDaycareTier(_sessionQty);
  const tierEl=document.getElementById('bk-tier-label');
  if(tierEl)tierEl.innerHTML=`<span class="font-bold text-amber-800 text-sm">$${tier.price}/session</span><span class="text-gray-300 mx-1">·</span><span class="text-amber-600 text-xs">${tier.badge}</span>`;
  // Refresh tier pill highlights
  [[1,4],[5,14],[15,19],[20,999]].forEach(([lo,hi],i)=>{
    const pill=document.getElementById(`bk-tier-pill-${i}`);
    if(!pill)return;
    const a=_sessionQty>=lo&&_sessionQty<=hi;
    pill.style.background=a?'#FDE68A':'#F3F4F6';
    pill.style.color=a?'#78350F':'#9CA3AF';
  });
  updateBookingPrice();
}
function buildBookingModal(selectedDate){

        <!-- ⑦ PRICE SUMMARY ─────────────────────────────────────── -->

function toggleMobileMenu(open){

function setView(v){
  // Close mobile drawer when navigating
  _mobileMenuOpen=false;
  document.getElementById('admin-sidebar')?.classList.remove('mob-open');
  document.getElementById('mob-overlay')?.classList.remove('mob-open');
  document.body.style.overflow='';
  state.view=v;state.showModal=null;
  if(v!=='dogs')state.selectedDogId=null;

  // Persist so a page refresh returns to the same section
  try{localStorage.setItem('np_view',v);if(v!=='dogs')localStorage.removeItem('np_dog_id');}catch(e){}
  render();

  if(v==='kiosk')startKioskTimers();
}

// ── Required Vaccine Settings Helpers ─────────────────────────────────────────
function addRequiredVaccine(){
  const inp=document.getElementById('new-vacc-input');
  const val=(inp?.value||'').trim();
  if(!val)return;
  if(!state.settings.requiredVaccines)state.settings.requiredVaccines=[];
  // Prevent duplicates (case-insensitive)
  const existing=state.settings.requiredVaccines.map(v=>v.toLowerCase());
  if(existing.includes(val.toLowerCase())){showToast('Already in the list.','#F97316');return;}
  state.settings.requiredVaccines.push(val);
  render();
}
function deleteRequiredVaccine(index){
  if(!state.settings.requiredVaccines)return;
  state.settings.requiredVaccines.splice(index,1);
  render();
}
function toggleRequiredVaccine(index,checked){
  // Toggle: unchecked = remove from list temporarily. We rebuild the list.
  // For simplicity: unchecking disables (removes), re-checking re-adds.
  // Since checkbox is rendered from the live array, unchecking means delete.
  if(!checked)deleteRequiredVaccine(index);
  // If checked, it's already in the list so nothing to do.
}
